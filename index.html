        sliders: '<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>',
        shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/>',
        target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
        barchart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
        plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
        x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
        cap: '<path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>',
        check: '<polyline points="20 6 9 17 4 12"/>',
        grip: '<polyline points="8 9 12 5 16 9" stroke-width="2" fill="none"/><polyline points="8 15 12 19 16 15" stroke-width="2" fill="none"/>',
        cleft: '<polyline points="15 18 9 12 15 6"/>',
        cright: '<polyline points="9 18 15 12 9 6"/>',
        cdown: '<polyline points="6 9 12 15 18 9"/>',
      };
      return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;display:inline-block;vertical-align:middle">${d[name] || ''}</svg>`;
    }

    function statusDot(state) {
      if (state === 'ok') return `<span class="status-dot ok">${ic('check', 11)}</span>`;
      if (state === 'no') return `<span class="status-dot no">${ic('x', 11)}</span>`;
      return `<span class="status-dot pend">·</span>`;
    }

    /* ── Grade Hero ── */
    function gradeHero(k, pass, badgeHtml) {
      const grade = k.avgGraded;
      const gc = gClass(grade, pass);
      const pctEval = k.totalW > 0 ? Math.min(100, Math.max(0, (k.gradedW / k.totalW) * 100)) : 0;
      const coverW = (100 - pctEval).toFixed(2);
      const pend = k.pending.length;
      const rendPct = Math.round(pctEval);
      return `
  <div class="grade-hero" data-gc="${gc}">
    <div class="gh-header">
      <span class="gh-label">NOTA DE PRESENTACIÓN</span>
      ${badgeHtml || ''}
    </div>
    <div class="gh-top">
      <div class="gh-grade ${gc}">${fmt(grade)}</div>
      <div class="gh-grade-info">
        <span class="gh-sub">${fmtW(k.gradedW)}% del ramo evaluado · ${pend} pendiente${pend !== 1 ? 's' : ''}</span>
      </div>
    </div>
    <div class="gh-bar-track" title="${rendPct}% del ramo rendido">
      <div class="gh-bar-cover" style="width:${coverW}%"></div>
    </div>
    <div class="gh-bar-footer">
      <span class="gh-bar-scale">0%</span>
      <span class="gh-meta">${rendPct}% rendido</span>
      <span class="gh-bar-scale">100%</span>
    </div>
  </div>`;
    }

    /* ── Storage ── */
    const KEY = 'gradecalc_v2';
    const Store = {
      async load() {
        try { if (window.storage) { const r = await window.storage.get(KEY); return r ? JSON.parse(r.value) : null; } } catch (e) { }
        try { const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; } catch (e) { }
        return null;
      },
      async save(s) {
        const j = JSON.stringify(s);
        try { if (window.storage) { await window.storage.set(KEY, j); return; } } catch (e) { }
        try { localStorage.setItem(KEY, j); } catch (e) { }
      }
    };
    let saveTimer = null;
    function persist() {
      state.updatedAt = Date.now();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => Store.save(state), 250);
      syncToFirestore();
    }

    /* ── Estado ── */
    const DEFAULT_CATS = ['Prueba', 'Control', 'Tarea', 'Proyecto', 'Laboratorio', 'Otro'];
    let state = { courses: [], active: null, categories: [...DEFAULT_CATS], ui: { config: false, exem: false }, theme: 'light' };

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    const COURSE_PALETTE = [
      '#6366f1', /* índigo   */
      '#3b82f6', /* azul     */
      '#06b6d4', /* cyan     */
      '#10b981', /* esmeralda*/
      '#f59e0b', /* ámbar    */
      '#ef4444', /* rojo     */
      '#ec4899', /* rosa     */
      '#8b5cf6', /* violeta  */
      '#f97316', /* naranja  */
      '#14b8a6', /* teal     */
      '#84cc16', /* lima     */
      '#e879f9', /* fucsia   */
      '#0ea5e9', /* sky      */
      '#a3e635', /* verde lima*/
      '#fb7185', /* rosa claro*/
      '#a78bfa', /* lavanda  */
    ];
    function nextColor() {
      const used = state.courses.length;
      return COURSE_PALETTE[used % COURSE_PALETTE.length];
    }

    function newCourse(name, color) {
      return {
        id: uid(), name: name || 'Nuevo ramo', pass: 4.0,
        hasExam: true, npWeight: 60, examWeight: 40, examGrade: null,
        weightMode: 'eval', catWeights: {}, decimals: 1,
        color: color || nextColor(),
        evals: [], exemption: { enabled: true, rules: [{ conds: [] }] }
      };
    }
    function demoCourse() {
      const c = newCourse('Estadística');
      c.evals = [
        { id: uid(), name: 'Prueba 1', cat: 'Prueba', weight: 25, grade: '5.5' },
        { id: uid(), name: 'Prueba 2', cat: 'Prueba', weight: 25, grade: '' },
        { id: uid(), name: 'Prueba 3', cat: 'Prueba', weight: 25, grade: '' },
        { id: uid(), name: 'Controles', cat: 'Control', weight: 10, grade: '6.2' },
        { id: uid(), name: 'Proyecto', cat: 'Proyecto', weight: 15, grade: '' },
      ];
      c.exemption = {
        enabled: true, rules: [
          { conds: [{ type: 'catAvg', cat: 'Prueba', op: '>=', val: '4.5' }] },
          { conds: [{ type: 'minAll', op: '>=', val: '4.0' }] },
        ]
      };
      return c;
    }
    function ensureFields(c, i) {
      if (!c.weightMode) c.weightMode = 'eval';
      if (!c.catWeights) c.catWeights = {};
      if (c.decimals == null) c.decimals = 1;
      if (!c.pass) c.pass = 4.0;
      if (!c.exemption) c.exemption = { enabled: false, rules: [{ conds: [] }] };
      if (c.examGrade === undefined) c.examGrade = null;
      if (c.hasExam === undefined) c.hasExam = true;
      if (!c.color) c.color = COURSE_PALETTE[(i || 0) % COURSE_PALETTE.length];
    }
    function ensureUI() { if (!state.ui) state.ui = { config: false, exem: false }; }

    /* ── Utils ── */
    let DEC = 1;
    const rN = (x, d) => Math.round((x + 1e-9) * Math.pow(10, d)) / Math.pow(10, d);
    const r1 = x => Math.round((x + 1e-9) * 10) / 10;
    const r2 = x => Math.round((x + 1e-9) * 100) / 100;
    const num = v => { const n = parseFloat(String(v ?? '').replace(/,/g, '.')); return isFinite(n) ? n : null; };
    function fmt(x) { return x == null ? '—' : rN(x, DEC).toFixed(DEC); }
    function fmtD(x, d) { return x == null ? '—' : rN(x, d).toFixed(d); }
    function fmtW(x) { const r = r1(x); return Math.round(r) === r ? r.toFixed(0) : r.toFixed(1); }
    function passOf(c) { return num(c.pass) ?? 4.0; }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m])); }
    function escA(s) { return esc(s).replace(/'/g, '&#39;'); }
    function mergedCats(c) { const s = [...state.categories]; c.evals.forEach(e => { if (e.cat && !s.includes(e.cat)) s.push(e.cat); }); return s; }
    function usedCats(c) { const s = []; c.evals.forEach(e => { if (e.cat && !s.includes(e.cat)) s.push(e.cat); }); return s; }
    function catOpts(sel, c) { return mergedCats(c).map(x => `<option ${x === sel ? 'selected' : ''}>${esc(x)}</option>`).join('') + `<option value="__add__">+ Nueva categoría…</option>`; }
    function catColor(cat) {
      if (/prueba/i.test(cat)) return '#60a5fa';
      if (/control|quiz/i.test(cat)) return '#a78bfa';
      if (/proyecto|trabajo|tarea/i.test(cat)) return '#34d399';
      if (/solemne|examen/i.test(cat)) return '#f87171';
      if (/lab/i.test(cat)) return '#fbbf24';
      return 'var(--tc, #6366f1)';
    }

    /* ── Pesos ── */
    function effWeights(c) {
      const map = {};
      if (c.weightMode === 'category') {
        const byCat = {};
        c.evals.forEach(ev => { (byCat[ev.cat] = byCat[ev.cat] || []).push(ev); });
        Object.keys(byCat).forEach(cat => {
          const total = num((c.catWeights || {})[cat]) || 0, members = byCat[cat];
          let sum = 0; members.forEach(ev => { sum += (num(ev.share) || 1); });
          members.forEach(ev => { map[ev.id] = sum > 0 ? total * ((num(ev.share) || 1) / sum) : 0; });
        });
      } else { c.evals.forEach(ev => { map[ev.id] = num(ev.weight) || 0; }); }
      return map;
    }

    /* ── Cálculos ── */
    function calc(c) {
      const ew = effWeights(c);
      let totalW = 0, gradedW = 0, gradedSum = 0;
      const graded = [], pending = [];
      c.evals.forEach(ev => {
        const w = ew[ev.id] || 0; totalW += w;
        const g = num(ev.grade);
        if (g != null) { gradedW += w; gradedSum += (w / 100) * g; graded.push({ ev, w, g }); }
        else if (w > 0) { pending.push({ ev, w }); }
      });
      const avgGraded = gradedW > 0 ? gradedSum / (gradedW / 100) : null;
      const allGraded = pending.length === 0 && c.evals.length > 0;
      const npEst = c.evals.length === 0 ? null : (allGraded ? gradedSum : avgGraded);
      return { ew, totalW, gradedW, pendingW: totalW - gradedW, gradedSum, avgGraded, allGraded, npEst, graded, pending };
    }
    function catAverage(c, cat, ew) {
      let w = 0, s = 0, anyPending = false, count = 0;
      c.evals.forEach(ev => {
        if (ev.cat !== cat) return; count++;
        const g = num(ev.grade), wt = (ew ? ew[ev.id] : num(ev.weight)) || 0;
        if (g == null) anyPending = true; else { w += wt; s += wt * g; }
      });
      if (count === 0) return { avg: null, empty: true, anyPending };
      return { avg: w > 0 ? s / w : null, empty: false, anyPending };
    }
    function evalCond(c, cd, k) {
      const val = num(cd.val);
      if (val == null) return { state: 'pend', text: 'Sin configurar', label: 'Condición incompleta', sub: 'Ingresa un valor mínimo requerido' };
      const r = n => Math.round(n * 10) / 10;
      if (cd.type === 'np') {
        const np = k.npEst;
        if (np == null) return { state: 'pend', text: 'NP: sin notas', label: 'Nota de Presentación (NP)', sub: 'Sin evaluaciones ingresadas aún' };
        const ok = r(np) >= r(val);
        const st = k.allGraded ? (ok ? 'ok' : 'no') : 'pend';
        return {
          state: st, text: `NP: ${fmt(np)} ≥ ${fmt(val)}`, label: 'Nota de Presentación (NP)',
          sub: `Actual: ${fmt(np)} — Requiere: ≥ ${fmt(val)}${!k.allGraded ? ' — faltan evaluaciones' : ''}`
        };
      }
      if (cd.type === 'minAll') {
        if (k.graded.length === 0) return { state: 'pend', text: 'Mínima: sin notas', label: 'Mínima en todas las evaluaciones', sub: 'Sin notas ingresadas aún' };
        const min = Math.min(...k.graded.map(x => x.g)), ok = r(min) >= r(val);
        const pend = k.pending.length > 0;
        return {
          state: pend ? (ok ? 'pend' : 'no') : (ok ? 'ok' : 'no'),
          text: `Mínima: ${fmt(min)} ≥ ${fmt(val)}`, label: 'Mínima en todas las evaluaciones',
          sub: `Nota más baja: ${fmt(min)} — Requiere: ≥ ${fmt(val)}${pend ? ' — faltan evaluaciones' : ''}`
        };
      }
      if (cd.type === 'catAvg') {
        const ca = catAverage(c, cd.cat, k.ew);
        if (ca.empty) return { state: 'pend', text: `Prom. ${cd.cat}: sin eval.`, label: `Promedio de ${cd.cat}`, sub: 'Sin evaluaciones de esta categoría' };
        if (ca.avg == null) return { state: 'pend', text: `Prom. ${cd.cat}: sin notas`, label: `Promedio de ${cd.cat}`, sub: 'Sin notas ingresadas en esta categoría' };
        const ok = r(ca.avg) >= r(val);
        return {
          state: ca.anyPending ? (ok ? 'pend' : 'no') : (ok ? 'ok' : 'no'),
          text: `Prom. ${cd.cat}: ${fmt(ca.avg)} ≥ ${fmt(val)}`, label: `Promedio de ${cd.cat}`,
          sub: `Promedio actual: ${fmt(ca.avg)} — Requiere: ≥ ${fmt(val)}${ca.anyPending ? ' — faltan evaluaciones' : ''}`
        };
      }
      if (cd.type === 'eval') {
        const ev = c.evals.find(e => e.id === cd.evalId);
        if (!ev) return { state: 'pend', text: 'Evaluación no encontrada', label: 'Evaluación específica', sub: 'La evaluación ya no existe' };
        const g = num(ev.grade);
        if (g == null) return { state: 'pend', text: `${ev.name}: sin nota`, label: ev.name, sub: 'Sin nota ingresada' };
        return {
          state: r(g) >= r(val) ? 'ok' : 'no', text: `${ev.name}: ${fmt(g)} ≥ ${fmt(val)}`, label: ev.name,
          sub: `Nota obtenida: ${fmt(g)} — Requiere: ≥ ${fmt(val)}`
        };
      }
      return { state: 'pend', text: '—', label: '—', sub: '' };
    }
    function exemStatus(c, k) {
      if (!c.exemption.enabled || c.exemption.rules.every(r => r.conds.length === 0)) return { overall: 'off', groups: [] };
      let anyOk = false, anyPend = false;
      const groups = c.exemption.rules.map(rule => {
        if (rule.conds.length === 0) return { state: 'empty', conds: [] };
        const cs = rule.conds.map(cd => ({ cd, res: evalCond(c, cd, k) }));
        let g = 'ok';
        if (cs.some(x => x.res.state === 'no')) g = 'no';
        else if (cs.some(x => x.res.state === 'pend')) g = 'pend';
        if (g === 'ok') anyOk = true; if (g === 'pend') anyPend = true;
        return { state: g, conds: cs };
      });
      return { overall: anyOk ? 'ok' : (anyPend ? 'pend' : 'no'), groups };
    }

    /* ── Tema ── */
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.colorScheme = t;
      const btn = document.getElementById('btnTheme');
      if (btn) btn.innerHTML = t === 'dark' ? ic('sun', 15) : ic('moon', 15);
    }

    /* ── Helpers ── */
    function activeCourse() { return state.courses.find(c => c.id === state.active); }
    function gClass(g, pass) {
      if (g == null) return 'nd';
      const r = n => Math.round(n * 10) / 10;
      if (r(g) === r(pass)) return 'warn';
      return r(g) > r(pass) ? 'ok' : 'no';
    }
    function colorizeGrade(input, pass) {
      const v = num(input.value);
      input.classList.remove('g-ok', 'g-warn', 'g-no', 'g-inv');
      if (!input.value.trim()) return;
      if (v == null) { input.classList.add('g-inv'); return; }
      const cl = gClass(v, pass);
      input.classList.add(cl === 'ok' ? 'g-ok' : cl === 'warn' ? 'g-warn' : 'g-no');
    }
    function wSumChip(c) {
      const sum = c.evals.reduce((a, e) => a + (num(e.weight) || 0), 0);
      return Math.abs(r1(sum) - 100) < 0.05
        ? `<span class="chip ok">✓ ${fmtW(sum)}%</span>`
        : `<span class="chip warn">⚠ ${fmtW(sum)}% · debe ser 100</span>`;
    }
    function cwSumChip(c) {
      const sum = usedCats(c).reduce((a, cat) => a + (num(c.catWeights[cat]) || 0), 0);
      return Math.abs(r1(sum) - 100) < 0.05
        ? `<span class="chip ok">✓ ${fmtW(sum)}%</span>`
        : `<span class="chip warn">⚠ ${fmtW(sum)}% · debe ser 100</span>`;
    }
    function condChip(res) {
      return res.state === 'ok' ? `<span class="chip ok">${ic('check', 10)} cumple</span>`
        : res.state === 'no' ? '<span class="chip no">no cumple</span>'
          : '<span class="chip neu">pendiente</span>';
    }

    /* ── Custom dialog para categorías ── */
    let catDialogCb = null;
    function showCatDialog(cb) {
      catDialogCb = cb;
      const inp = document.getElementById('catDialogInput');
      inp.value = '';
      document.getElementById('catDialogOverlay').classList.remove('hidden');
      setTimeout(() => inp.focus(), 50);
    }
    function closeCatDialog(name) {
      document.getElementById('catDialogOverlay').classList.add('hidden');
      if (catDialogCb) { catDialogCb(name); catDialogCb = null; }
    }
    function initCatDialog() {
      document.getElementById('catDialogConfirm').onclick = () => {
        const n = document.getElementById('catDialogInput').value.trim();
        if (!n) { document.getElementById('catDialogInput').focus(); return; }
        if (!state.categories.includes(n)) state.categories.push(n);
        closeCatDialog(n);
      };
      document.getElementById('catDialogCancel').onclick = () => closeCatDialog(null);
      document.getElementById('catDialogInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('catDialogConfirm').click();
        if (e.key === 'Escape') closeCatDialog(null);
      });
      document.getElementById('catDialogOverlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeCatDialog(null);
      });
    }

    /* ── Tabs ── */
    function renderTabs() {
      const bar = document.getElementById('tabsBar');
      bar.innerHTML = '';
      state.courses.forEach(c => {
        const k = calc(c), pass = passOf(c);
        const g = k.npEst, gc = gClass(g, pass);
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (c.id === state.active ? ' active' : '');
        btn.style.setProperty('--tc', c.color || '#6366f1');
        btn.innerHTML = `<span class="tab-dot"></span><span>${esc(c.name || 'Ramo')}</span><span class="tab-grade ${g != null ? gc : ''}">${g != null ? fmtD(g, +c.decimals || 1) : '·'}</span><span class="tab-x" title="Eliminar">${ic('x', 11)}</span>`;
        btn.onclick = e => { if (!e.target.closest('.tab-x') && !e.target.closest('.tab-dot')) { state.active = c.id; persist(); render(); } };
        btn.querySelector('.tab-x').onclick = e => { e.stopPropagation(); deleteCourse(c.id); };
        btn.querySelector('.tab-dot').onclick = e => {
          e.stopPropagation();
          const picker = document.getElementById('colorPickerInput');
          picker.value = c.color || '#6366f1';
          picker.oninput = ev => {
            c.color = ev.target.value;
            btn.style.setProperty('--tc', c.color);
            btn.querySelector('.tab-dot').style.background = c.color;
          };
          picker.onchange = () => { persist(); };
          picker.click();
        };
        bar.appendChild(btn);
      });
      const add = document.createElement('button');
      add.className = 'tab-add';
      add.innerHTML = `${ic('plus', 11)} Ramo`;
      add.onclick = () => { const c = newCourse(); state.courses.push(c); state.active = c.id; persist(); render(); };
      bar.appendChild(add);
    }

    /* ── Evaluaciones ── */
    function evalsCard(c) {
      const ew = effWeights(c), isCat = c.weightMode === 'category';
      const rows = c.evals.map((ev, i) => `
    <tr data-i="${i}" draggable="true">
      <td class="ev-grip">${ic('grip', 14)}</td>
      <td class="ev-name"><input data-f="name" value="${escA(ev.name)}" placeholder="Nombre"></td>
      <td><select data-f="cat" style="width:auto;min-width:84px">${catOpts(ev.cat, c)}</select></td>
      <td>${isCat
          ? `<span class="autow" data-evid="${ev.id}">${fmtW(ew[ev.id] || 0)}%</span>`
          : `<input class="num-inp" data-f="weight" inputmode="decimal" value="${ev.weight ?? ''}" placeholder="%">`}</td>
      <td class="ev-nota"><input class="num-inp" data-f="grade" inputmode="decimal" value="${ev.grade ?? ''}" placeholder="—"></td>
      <td><button class="btn btn-sm btn-ghost btn-danger" data-del="${i}">${ic('x', 12)}</button></td>
    </tr>`).join('');
      const foot = isCat ? '' : `&nbsp;&nbsp;${wSumChip(c)}`;
      return `
  <div class="block">
    <div class="block-title"><span class="block-title-icon">${ic('list', 12)}</span> Evaluaciones</div>
    <div class="seg">
      <button class="seg-btn ${isCat ? '' : 'on'}" data-mode="eval">Por evaluación</button>
      <button class="seg-btn ${isCat ? 'on' : ''}" data-mode="category">Por grupo</button>
    </div>
    <p class="modehint">${isCat
          ? 'Asigna un % a cada grupo; se reparte automáticamente entre sus evaluaciones.'
          : 'Cada evaluación lleva su propio porcentaje.'}</p>
    ${isCat ? catPanel(c) : ''}
    <table>
      <thead><tr><th></th><th>Evaluación</th><th>Categoría</th><th>Ponderación %</th><th class="ev-nota">Nota</th><th></th></tr></thead>
      <tbody id="evBody">${rows || `<tr><td colspan="6" class="muted small" style="padding:12px 0">Sin evaluaciones. Agrega la primera.</td></tr>`}</tbody>
      <tfoot><tr><td colspan="6"><div style="display:flex;align-items:center;gap:8px"><button class="btn btn-sm" id="addEv">${ic('plus', 12)} Agregar evaluación</button>${foot}<span class="ev-empty-hint">nota vacía → aún no rendida</span></div></td></tr></tfoot>
    </table>
    ${mobileEvList(c)}
  </div>`;
    }
    function mobileEvList(c) {
      const ew = effWeights(c), isCat = c.weightMode === 'category';
      const pass = passOf(c);
      const totalW = c.evals.reduce((s, ev) => s + (num(isCat ? ew[ev.id] : ev.weight) || 0), 0);
      const pctOk = Math.abs(totalW - 100) < 0.5;
      const pctColor = pctOk ? 'var(--good)' : 'var(--warn)';
      if (!c.evals.length) {
        return `<div id="mobileEvList">
  <div class="mev-header"><span class="mev-label">Evaluaciones</span></div>
  <div class="mev-container">
    <div style="padding:20px 16px;text-align:center;color:var(--muted);font-size:13px">Sin evaluaciones</div>
    <button class="mev-add" id="mobileAddEv">${ic('plus', 14)} Agregar evaluación</button>
  </div>
</div>`;
      }
      const rows = c.evals.map((ev, i) => {
        const w = num(isCat ? ew[ev.id] : ev.weight) || 0;
        const isLast = i === c.evals.length - 1;
        return `<div class="mev-item" data-mi="${i}">
    <div class="mev-dot" style="background:${catColor(ev.cat || '')}"></div>
    <input class="mev-name-inp" data-mi="${i}" data-f="name" value="${escA(ev.name || '')}" placeholder="Sin nombre">
    ${isCat
      ? `<span class="mev-pct">${fmtW(w)}%</span>`
      : `<span class="mev-pct-wrap"><input class="mev-pct-inp" data-mi="${i}" inputmode="decimal" value="${escA(ev.weight ?? '')}" placeholder="—">%</span>`}
    <input class="mev-grade-inp" data-mi="${i}" data-f="grade" inputmode="decimal" value="${escA(ev.grade ?? '')}" placeholder="—">
  </div>${!isLast ? '\n  <div class="mev-sep"></div>' : ''}`;
      }).join('\n  ');
      return `<div id="mobileEvList">
  <div class="mev-header">
    <span class="mev-label">Evaluaciones</span>
    <span class="mev-total" style="color:${pctColor}">${fmtW(totalW)}% ponderado</span>
  </div>
  <div class="mev-container">
    ${rows}
    <button class="mev-add" id="mobileAddEv">${ic('plus', 14)} Agregar evaluación</button>
  </div>
</div>`;
    }
    function catPanel(c) {
      const cats = usedCats(c);
      const rows = cats.map(cat => {
        const count = c.evals.filter(e => e.cat === cat).length;
        return `<div class="cat-row">
      <span class="cn">${esc(cat)}</span>
      <input class="num-inp" data-cw="${escA(cat)}" inputmode="decimal" value="${c.catWeights[cat] ?? ''}" placeholder="%">
      <span class="cc">${count} eval.</span>
    </div>`;
      }).join('') || '<p class="small muted">Agrega evaluaciones para asignar pesos por categoría.</p>';
      return `<div class="cat-panel">
    <div class="cat-panel-t">Ponderación de cada grupo (debe sumar 100%)</div>
    ${rows}<div id="catSum">${cwSumChip(c)}</div>
  </div>`;
    }

    /* ── Configuración ── */
    function cfgSum(c) {
      const pass = passOf(c).toFixed(1);
      if (!c.hasExam) return `Aprob. ${pass} · Sin examen`;
      const np = r1(num(c.npWeight) || 0), ex = r1(num(c.examWeight) || 0);
      return `Aprob. ${pass} · NP ${np}% / Ex ${ex}%`;
    }
    function settingsCard(c) {
      const open = !!(state.ui && state.ui.config);
      const hasExam = c.hasExam !== false;
      const fmlText = hasExam
        ? `NF = ${((num(c.npWeight) || 0) / 100).toFixed(2)}·NP + ${((num(c.examWeight) || 0) / 100).toFixed(2)}·E`
        : 'NF = NP (sin examen)';
      return `
  <div class="block coll ${open ? 'open' : ''}">
    <button class="c-head" data-toggle="config">
      <span class="c-icon">${ic('sliders', 12)}</span><span>Configuración del ramo</span>
      <span class="c-sum">${esc(cfgSum(c))}</span>
      <span class="c-chev">▾</span>
    </button>
    <div class="c-body"><div class="c-in">
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;font-size:13px;color:var(--ink-2);user-select:none">
        <input type="checkbox" id="sHasExam" class="cb-circle" ${hasExam ? 'checked' : ''}>
        Este ramo tiene examen final
      </label>
      <div id="examWeightFields" style="${!hasExam ? 'display:none' : ''}">
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
          <div style="flex:1;display:flex;flex-direction:column;gap:5px"><label class="small muted">Aprob.</label><input id="sPass" class="num-inp" style="width:100%" inputmode="decimal" value="${c.pass}"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:5px"><label class="small muted">Peso NP (%)</label><input id="sNp" class="num-inp" style="width:100%" inputmode="decimal" value="${c.npWeight}"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:5px"><label class="small muted">Peso Examen (%)</label><input id="sEx" class="num-inp" style="width:100%" inputmode="decimal" value="${c.examWeight}"></div>
        </div>
        <p class="fml" id="fmlNF">${fmlText}</p>
      </div>
      <div id="noExamFields" style="${hasExam ? 'display:none' : ''}">
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
          <div style="flex:1;display:flex;flex-direction:column;gap:5px"><label class="small muted">Aprob.</label><input id="sPass" class="num-inp" style="width:100%" inputmode="decimal" value="${c.pass}"></div>
        </div>
        <p class="fml">NF = NP (la nota final es tu promedio de evaluaciones)</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;margin-top:10px">
        <div style="flex:1;display:flex;flex-direction:column;gap:5px"><label class="small muted">Decimales</label>
          <select id="sDec">
            <option value="1" ${(+c.decimals || 1) === 1 ? 'selected' : ''}>1 decimal (4.5)</option>
            <option value="2" ${(+c.decimals || 1) === 2 ? 'selected' : ''}>2 decimales (4.47)</option>
          </select></div>
        <div style="flex:2"></div>
      </div>
    </div></div>
  </div>`;
    }

    /* ── Eximición ── */
    function condShort(c, cd) {
      const v = (cd.val !== '' && cd.val != null) ? fmt(num(cd.val)) : '—';
      if (cd.type === 'np') return `NP ≥ ${v}`;
      if (cd.type === 'minAll') return `Todas ≥ ${v}`;
      if (cd.type === 'catAvg') return `Prom. ${cd.cat} ≥ ${v}`;
      if (cd.type === 'eval') { const e = c.evals.find(x => x.id === cd.evalId); return `${e ? e.name : 'Eval'} ≥ ${v}`; }
      return '';
    }
    function exemSum(c) {
      if (!c.exemption.enabled) return 'Desactivada · siempre examen';
      const nC = c.exemption.rules.reduce((a, r) => a + r.conds.length, 0);
      if (nC === 0) return 'Sin reglas · siempre examen';
      const st = exemStatus(c, calc(c)).overall;
      const label = st === 'ok' ? 'Eximido' : st === 'no' ? 'No eximido' : 'Depende de pendientes';
      const brief = c.exemption.rules.length === 1 && c.exemption.rules[0].conds.length === 1
        ? condShort(c, c.exemption.rules[0].conds[0])
        : `${c.exemption.rules.length} regla${c.exemption.rules.length > 1 ? 's' : ''}`;
      return `${brief} · ${label}`;
    }
    function condRow(c, cd, gi, ci) {
      const types = [['np', 'NP estimado'], ['minAll', 'Todas las notas'], ['catAvg', 'Prom. categoría'], ['eval', 'Una evaluación']];
      const typeSel = `<select class="sub" data-cf="type" data-g="${gi}" data-c="${ci}">${types.map(t => `<option value="${t[0]}" ${cd.type === t[0] ? 'selected' : ''}>${t[1]}</option>`).join('')}</select>`;
      let extra = '';
      if (cd.type === 'catAvg') extra = `<select data-cf="cat" data-g="${gi}" data-c="${ci}" style="width:auto">${catOpts(cd.cat, c)}</select>`;
      else if (cd.type === 'eval') extra = `<select data-cf="evalId" data-g="${gi}" data-c="${ci}" style="width:auto">${c.evals.map(e => `<option value="${e.id}" ${e.id === cd.evalId ? 'selected' : ''}>${esc(e.name)}</option>`).join('') || '<option>—</option>'}</select>`;
      const res = evalCond(c, cd, calc(c));
      return `<div class="cond-item" data-g="${gi}" data-c="${ci}">
    <div class="cond-fields">${typeSel}${extra}<span class="op">≥</span><input data-cf="val" data-g="${gi}" data-c="${ci}" class="num-inp" inputmode="decimal" value="${cd.val ?? ''}" placeholder="${passOf(c).toFixed(1)}"></div>
    <div class="cond-status">${condChip(res)}<span class="small muted" style="font-size:11px;white-space:nowrap">${esc(res.text)}</span></div>
    <button class="btn btn-sm btn-ghost btn-danger" data-delcond="${gi}.${ci}" style="padding:4px 6px">${ic('x', 12)}</button>
  </div>`;
    }
    function exemCard(c) {
      const open = !!(state.ui && state.ui.exem), on = c.exemption.enabled;
      const k = calc(c);
      const groups = c.exemption.rules.map((rule, gi) => {
        const cs = rule.conds.map((cd, ci) => condRow(c, cd, gi, ci)).join('');
        const ruleState = exemStatus(c, k).groups[gi];
        const ruleChip = !ruleState || ruleState.state === 'empty' ? ''
          : ruleState.state === 'ok' ? '<span class="chip ok" style="margin-left:auto">se cumple</span>'
            : ruleState.state === 'no' ? '<span class="chip no" style="margin-left:auto">no se cumple</span>'
              : '<span class="chip neu" style="margin-left:auto">pendiente</span>';
        return `<div class="rule-card" data-g="${gi}">
      <div class="rule-card-head">
        <span class="rule-num">Regla ${gi + 1}</span>
        <span class="rule-logic muted small">— todas las condiciones</span>
        ${ruleChip}
        ${c.exemption.rules.length > 1 ? `<button class="btn btn-sm btn-ghost btn-danger" data-delrule="${gi}">${ic('x', 11)}</button>` : ''}
      </div>
      <div class="rule-card-body">
        ${cs || '<p class="small muted" style="padding:6px 0">Sin condiciones. Agrega una.</p>'}
        <button class="btn btn-sm" data-addcond="${gi}" style="margin-top:10px">${ic('plus', 12)} Agregar condición</button>
      </div>
    </div>`;
      });
      const orSeps = groups.map((g, i) => i < groups.length - 1 ? [g, '<div class="or-sep-wrap"><span class="or-pill">O</span></div>'] : [g]).flat();
      return `
  <div class="block coll ${open ? 'open' : ''}">
    <button class="c-head" data-toggle="exem">
      <span class="c-icon">${ic('shield', 12)}</span><span>Reglas de eximición</span>
      <span class="c-sum">${esc(exemSum(c))}</span>
      <span class="c-chev">▾</span>
    </button>
    <div class="c-body"><div class="c-in">
      <label class="small" style="display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;cursor:pointer">
        <input type="checkbox" id="exOn" class="cb-circle" ${on ? 'checked' : ''}>Activar reglas de eximición</label>
      <div id="exBody" class="${on ? '' : 'hidden'}">
        ${orSeps.join('')}
        <button class="btn btn-sm" id="addRule" style="margin-top:8px">${ic('plus', 12)} Regla alternativa (O)</button>
        <p class="small muted" style="margin-top:10px">Eximido si se cumple <b>cualquiera</b> de las reglas.</p>
      </div>
      ${on ? '' : '<p class="small muted">Desactivada: siempre se rinde examen.</p>'}
    </div></div>
  </div>`;
    }

    /* ── Mobile Results Card (Figma-style) ── */
    function mobileResultsCard(c) {
      const k = calc(c), pass = passOf(c), ex = exemStatus(c, k);
      const hasExam = c.hasExam !== false;
      const npW = hasExam ? (num(c.npWeight) || 0) / 100 : 1;
      const exW = hasExam ? (num(c.examWeight) || 0) / 100 : 0;
      const np = k.npEst;
      const npCl = np != null ? gClass(np, pass) : 'nd';
      const npFmt = np != null ? fmt(np) : '—';
      const pct = k.totalW > 0 ? Math.min(100, (k.gradedW / k.totalW) * 100) : 0;
      const R = 36, circ = 2 * Math.PI * R;
      const dash = (pct / 100) * circ;
      const ringColor = npCl === 'ok' ? 'var(--good)' : npCl === 'warn' ? 'var(--warn)' : npCl === 'no' ? 'var(--bad)' : 'var(--muted)';
      // Badge eximición
      let exemBadge = '';
      if (c.exemption && c.exemption.enabled) {
        if (ex.overall === 'ok')        exemBadge = `<div class="mcr-badge ok">${ic('check',11)} Eximido</div>`;
        else if (ex.overall === 'pend') exemBadge = `<div class="mcr-badge pend">${ic('clock',11)} Pendiente</div>`;
        else if (ex.overall === 'no')   exemBadge = `<div class="mcr-badge no">${ic('x',11)} No eximido</div>`;
      }
      // Barra de fórmula NP + Ex = NF
      let formulaBar = '';
      if (hasExam && exW > 0 && np != null) {
        const eg = c.examGrade != null ? num(c.examGrade) : null;
        const egCl = eg != null ? gClass(eg, pass) : 'nd';
        const egFmt = eg != null ? fmt(eg) : 'E';
        const isExempt = ex.overall === 'ok';
        const nf = eg != null ? npW * np + exW * eg : null;
        const nfCl = nf != null ? gClass(nf, pass) : 'nd';
        const realNf = isExempt ? np : nf;
        const realNfCl = isExempt ? npCl : nfCl;
        const realNfLbl = isExempt ? 'Eximido' : 'Nota Final';
        formulaBar = `<div class="mcr-formula">
  <div class="mcr-fterm">
    <span class="mcr-fterm-lbl">NP ${(npW*100).toFixed(0)}%</span>
    <span class="mcr-fterm-val ${npCl}">${npFmt}</span>
  </div>
  <span class="mcr-fop">+</span>
  <div class="mcr-fterm">
    <span class="mcr-fterm-lbl">Ex ${(exW*100).toFixed(0)}%</span>
    <span class="mcr-fterm-val ${egCl}">${egFmt}</span>
  </div>
  <span class="mcr-fop">=</span>
  <div class="mcr-fterm${realNfCl === 'ok' ? ' mcr-fterm-ok' : ''}">
    <span class="mcr-fterm-lbl">${realNfLbl}</span>
    <span class="mcr-fterm-val ${realNfCl}">${realNf != null ? fmt(realNf) : '—'}</span>
  </div>
</div>`;
      }
      // Breakdown reglas de eximición
      let breakdown = '';
      if (hasExam && ex.overall !== 'off') {
        const icons = { ok: '✓', no: '✗', pend: '·' };
        const chipLbl = { ok: 'cumple', no: 'no cumple', pend: 'pendiente' };
        const lines = ex.groups.map((g, i) => {
          if (g.state === 'empty') return '';
          const chipCl = g.state === 'ok' ? 'ok' : g.state === 'no' ? 'no' : 'neu';
          const notifs = g.conds.map(x => `
    <div class="cond-notif ${x.res.state}">
      <span class="cond-notif-icon">${icons[x.res.state] || '·'}</span>
      <div class="cond-notif-body">
        <div class="cond-notif-title">${esc(x.res.label || x.res.text)}</div>
        ${x.res.sub ? `<div class="cond-notif-sub">${esc(x.res.sub)}</div>` : ''}
      </div>
    </div>`).join('');
          return `<div class="exem-rule-result ${g.state}">
    <div class="exem-rule-header">
      <span class="exem-rule-num">Regla ${i+1}</span>
      <span class="chip ${chipCl}" style="margin-left:auto">${chipLbl[g.state] || 'pendiente'}</span>
    </div>
    <div class="exem-conds">${notifs}</div>
  </div>`;
        }).filter(Boolean);
        if (lines.length) {
          const open = !!(state.ui && state.ui.breakdown);
          breakdown = `<div class="coll${open ? ' open' : ''}" id="mcrBreakdownColl">
  <button class="mcr-coll-hdr" data-toggle="breakdown">
    <span>Reglas de eximición</span>
    <span class="c-chev">${ic('chevron-down', 12)}</span>
  </button>
  <div class="c-body"><div class="c-in">
    <div class="exem-breakdown" style="margin-top:10px">${lines.join('')}</div>
  </div></div>
</div>`;
        }
      }
      // Escenarios NF (eximido + con examen)
      let scenarios = '';
      if (np != null && hasExam && exW > 0) {
        const eg = c.examGrade != null ? num(c.examGrade) : null;
        const npCl2 = gClass(np, pass);
        const nf = eg != null ? npW * np + exW * eg : null;
        const nfCl = nf != null ? gClass(nf, pass) : 'nd';
        const isExempt = ex.overall === 'ok';
        const showExim = ex.overall === 'ok' || ex.overall === 'pend';
        const eximCard = showExim ? `
    <div class="nf-scenario${isExempt ? ' nf-scenario-active' : ''}">
      <div class="nf-scen-lbl">Eximido del examen${isExempt ? ' <span class="chip ok" style="font-size:9px;padding:1px 6px">tu caso</span>' : ''}</div>
      <div class="nf-scen-val ${npCl2}">${fmt(np)}</div>
      <div class="nf-scen-sub">NF = NP · sin rendir examen</div>
    </div>` : '';
        const openScen = !!(state.ui && state.ui.scenarios);
        scenarios = `<div class="coll${openScen ? ' open' : ''}">
  <button class="mcr-coll-hdr" data-toggle="scenarios">
    <span>${ic('trending-up', 12)} Escenarios de nota final</span>
    <span class="c-chev">${ic('chevron-down', 12)}</span>
  </button>
  <div class="c-body"><div class="c-in">
    <div class="nf-scenarios" style="margin-top:10px">
      ${eximCard}
      <div class="nf-scenario${isExempt ? ' nf-scenario-muted' : ''}"${!showExim ? ' style="grid-column:1/-1"' : ''}>
        <div class="nf-scen-lbl">${isExempt ? 'Si rindieras examen' : 'Con examen'}</div>
        <div class="nf-scen-val ${nfCl}" id="examNfVal">${nf != null ? fmt(nf) : '—'}</div>
        <div class="nf-scen-sub">
          <div class="exam-sim-row">
            <span>Nota examen:</span>
            <input id="examSimInputM" inputmode="decimal" placeholder="${pass.toFixed(1)}" value="${eg != null ? eg : ''}">
          </div>
          <div>${npW.toFixed(2)}·${fmt(np)} + ${exW.toFixed(2)}·${eg != null ? fmt(eg) : 'E'}</div>
        </div>
      </div>
    </div>
  </div></div>
</div>`;
      } else if (np != null && !hasExam) {
        const openScen = !!(state.ui && state.ui.scenarios);
        scenarios = `<div class="coll${openScen ? ' open' : ''}">
  <button class="mcr-coll-hdr" data-toggle="scenarios">
    <span>${ic('trending-up', 12)} Nota final</span>
    <span class="c-chev">${ic('chevron-down', 12)}</span>
  </button>
  <div class="c-body"><div class="c-in">
    <div class="nf-scenarios" style="margin-top:10px">
      <div class="nf-scenario" style="grid-column:1/-1">
        <div class="nf-scen-lbl">Nota final</div>
        <div class="nf-scen-val ${gClass(np,pass)}">${fmt(np)}</div>
        <div class="nf-scen-sub">NF = NP · sin examen final</div>
      </div>
    </div>
  </div></div>
</div>`;
      }
      return `<div class="mcr-card">
  <div class="mcr-blob"></div>
  <div class="mcr-hdr">
    <span class="mcr-hdr-lbl">${ic('bar-chart-2',13)} Resultado</span>
    ${exemBadge}
  </div>
  <div class="mcr-main">
    <div class="mcr-ring-wrap">
      <div class="mcr-ring-inner">
        <span class="mcr-ring-val" style="color:${ringColor}">${npFmt}</span>
        <span class="mcr-ring-sub">NP</span>
      </div>
    </div>
    <div class="mcr-stats">
      <div>
        <p class="mcr-stat-lbl">Progreso del semestre</p>
        <div class="mcr-pbar-row">
          <div class="mcr-pbar-track"><div class="mcr-pbar-fill" style="width:${pct.toFixed(1)}%"></div></div>
          <span class="mcr-pbar-pct">${pct.toFixed(0)}%</span>
        </div>
      </div>
      <div class="mcr-nums">
        <div><span class="mcr-num">${k.graded.length}</span><span class="mcr-numlbl">rendidas</span></div>
        <div><span class="mcr-num warn">${k.pending.length}</span><span class="mcr-numlbl">pendientes</span></div>
      </div>
    </div>
  </div>
  ${formulaBar}
  ${breakdown}
  ${scenarios}
</div>`;
    }

    /* ── Resultados ── */
    function resultsCard(c) {
      const hasExam = c.hasExam !== false;
      const k = calc(c), ex = exemStatus(c, k), pass = passOf(c);
      const npW = hasExam ? (num(c.npWeight) || 0) / 100 : 1;
      const exW = hasExam ? (num(c.examWeight) || 0) / 100 : 0;
      const npCl = gClass(k.npEst, pass), avgCl = gClass(k.avgGraded, pass);

      // Banner eximición (solo si tiene examen)
      let banner = '';
      let heroBadge = '';
      if (hasExam) {
        if (ex.overall === 'off') banner = '<div class="banner neu">Sin reglas · siempre se rinde examen</div>';
        else if (ex.overall === 'ok') {
          banner = '<div class="banner ok">¡Estás eximido del examen!</div>';
          heroBadge = `<span class="gh-exem-badge ok">${ic('check', 11)} Eximido</span>`;
        } else if (ex.overall === 'no') {
          banner = '<div class="banner no">Debes rendir el examen</div>';
          heroBadge = `<span class="gh-exem-badge no">${ic('x', 11)} Debe examen</span>`;
        } else {
          banner = '<div class="banner warn">Depende de notas pendientes</div>';
          heroBadge = `<span class="gh-exem-badge warn">· Pendiente</span>`;
        }
      }

      // Breakdown de reglas — tarjetas de notificación (solo con examen)
      let breakdown = '';
      if (hasExam && ex.overall !== 'off') {
        const icons = { ok: '✓', no: '✗', pend: '·' };
        const chipLbl = { ok: 'cumple', no: 'no cumple', pend: 'pendiente' };
        const lines = ex.groups.map((g, i) => {
          if (g.state === 'empty') return '';
          const chipCl = g.state === 'ok' ? 'ok' : g.state === 'no' ? 'no' : 'neu';
          const notifs = g.conds.map(x => `
        <div class="cond-notif ${x.res.state}">
          <span class="cond-notif-icon">${icons[x.res.state] || '·'}</span>
          <div class="cond-notif-body">
            <div class="cond-notif-title">${esc(x.res.label || x.res.text)}</div>
            ${x.res.sub ? `<div class="cond-notif-sub">${esc(x.res.sub)}</div>` : ''}
          </div>
        </div>`).join('');
          return `<div class="exem-rule-result ${g.state}">
        <div class="exem-rule-header">
          <span class="exem-rule-num">Regla ${i + 1}</span>
          <span class="chip ${chipCl}" style="margin-left:auto">${chipLbl[g.state] || 'pendiente'}</span>
        </div>
        <div class="exem-conds">${notifs}</div>
      </div>`;
        }).filter(Boolean);
        const hasNP = c.exemption.rules.some(r => r.conds.some(cd => cd.type === 'np'));
        const legend = `<div class="exem-legend">
      <strong>Referencias:</strong>
      NP = Nota de Presentación${exW > 0 ? ' · E = Examen · NF = Nota Final' : ''}${hasNP ? '' : ' · NP = promedio ponderado de todas tus evaluaciones'}
    </div>`;
        if (lines.length) breakdown = `<div class="exem-breakdown">${lines.join('')}${legend}</div>`;
      }

      // Nota final - formula + escenarios
      let notaFinal = '';
      if (k.npEst != null) {
        const np = k.npEst;
        const npCl2 = gClass(np, pass);
        if (!hasExam) {
          notaFinal = `
      <span class="sec-lbl">Nota final</span>
      <div class="nf-formula">
        <div class="nf-term">
          <div class="nf-val ${npCl2}">${fmt(np)}</div>
          <div class="nf-lbl">Nota final</div>
        </div>
      </div>
      <div class="nf-scenarios">
        <div class="nf-scenario" style="grid-column:1/-1">
          <div class="nf-scen-lbl">Resultado</div>
          <div class="nf-scen-val ${npCl2}">${fmt(np)}</div>
          <div class="nf-scen-sub">NF = NP · sin examen final</div>
        </div>
      </div>`;
        } else {
          const eg = c.examGrade != null ? num(c.examGrade) : null;
          const egCl = eg != null ? gClass(eg, pass) : 'nd';
          const nf = eg != null ? npW * np + exW * eg : null;
          const nfCl = nf != null ? gClass(nf, pass) : 'nd';
          const isExempt = ex.overall === 'ok';
          // Cuando eximido, la NF real = NP; el cálculo con examen es hipotético
          const realNf = isExempt ? np : nf;
          const realNfCl = isExempt ? npCl2 : nfCl;
          const realNfLbl = isExempt ? 'Nota final (eximido)' : 'Nota final';
          notaFinal = `
    <span class="sec-lbl">Nota final</span>
    <div class="nf-formula">
      <div class="nf-term">
        <div class="nf-val ${npCl2}">${fmt(np)}</div>
        <div class="nf-lbl">NP × ${(npW * 100).toFixed(0)}%</div>
      </div>
      ${exW > 0 ? `
      <div class="nf-op">+</div>
      <div class="nf-term">
        <div class="nf-val ${egCl}" id="formulaE">${eg != null ? fmt(eg) : 'E'}</div>
        <div class="nf-lbl">Examen × ${(exW * 100).toFixed(0)}%</div>
      </div>
      <div class="nf-op">=</div>
      <div class="nf-term">
        <div class="nf-val ${realNfCl}" id="formulaNF">${realNf != null ? fmt(realNf) : 'NF'}</div>
        <div class="nf-lbl">${realNfLbl}</div>
      </div>`: ''}
    </div>
    ${exW > 0 ? (() => {
              const showExim = ex.overall === 'ok' || ex.overall === 'pend';
              const eximCard = showExim ? `
      <div class="nf-scenario${isExempt ? ' nf-scenario-active' : ''}">
        <div class="nf-scen-lbl">Eximido del examen${isExempt ? ' <span class="chip ok" style="font-size:9px;padding:1px 6px">tu caso</span>' : ''}</div>
        <div class="nf-scen-val ${npCl2}">${fmt(np)}</div>
        <div class="nf-scen-sub">NF = NP · sin rendir examen</div>
      </div>` : '';
              return `<div class="nf-scenarios">
        ${eximCard}
        <div class="nf-scenario${isExempt ? ' nf-scenario-muted' : ''}"${!showExim ? ' style="grid-column:1/-1"' : ''}>
          <div class="nf-scen-lbl">${isExempt ? 'Si rindieras examen' : 'Con examen'}</div>
          <div class="nf-scen-val ${nfCl}" id="examNfVal">${nf != null ? fmt(nf) : '—'}</div>
          <div class="nf-scen-sub">
            <div class="exam-sim-row">
              <span>Nota examen:</span>
              <input id="examSimInput" inputmode="decimal" placeholder="${pass.toFixed(1)}" value="${eg != null ? eg : ''}">
            </div>
            <div>${(npW).toFixed(2)}·${fmt(np)} + ${exW.toFixed(2)}·${eg != null ? fmt(eg) : 'E'}</div>
          </div>
        </div>
      </div>`;
            })()
              : `<div class="nf-scenarios"><div class="nf-scenario">
        <div class="nf-scen-lbl">Nota final</div>
        <div class="nf-scen-val ${npCl2}">${fmt(np)}</div>
        <div class="nf-scen-sub">Sin examen</div>
      </div></div>`}`;
        } // fin else hasExam
      } else {
        notaFinal = '<p class="small muted" style="margin-top:8px">Ingresa notas para ver la nota final estimada.</p>';
      }

      return `
  <div class="block">
    <div class="block-title"><span class="block-title-icon">${ic('barchart', 12)}</span> Resultados</div>
    ${gradeHero(k, pass, heroBadge)}
    ${banner}
    ${breakdown}
    ${notaFinal}
  </div>`;
    }

    /* ── ¿Qué nota necesito? ── */
    function exemCalcBlock(c, k, pass) {
      const ex = exemStatus(c, k);
      if (ex.overall === 'off') return '';
      if (ex.overall === 'ok') {
        return `<div class="calc-blk done">
      <div class="calc-q">Para eximirte del examen</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="calc-big ok" style="font-size:22px">✓</span>
        <span class="small muted">¡Eximido! Tu NP (${fmt(k.npEst)}) cumple las condiciones.</span>
      </div>
    </div>`;
      }
      const rules = ex.groups.map((g, i) => {
        if (g.state === 'empty') return '';
        if (g.state === 'ok') {
          return `<div class="exim-need-rule">
        <div class="exim-need-hdr" style="color:var(--good)">${ic('check', 10)} Regla ${i + 1} — ya cumplida</div>
      </div>`;
        }
        const lines = g.conds.map(({ cd, res }) => {
          if (res.state === 'ok') return null;
          const val = num(cd.val); if (val == null) return null;

          // Condition already determined impossible by evalCond
          if (res.state === 'no') {
            if (cd.type === 'np') {
              return { impossible: true, msg: `NP actual (${fmt(k.npEst)}) no puede alcanzar ${fmt(val)}` };
            }
            if (cd.type === 'minAll') {
              const worst = k.graded.length > 0 ? k.graded.reduce((a, b) => a.g <= b.g ? a : b) : null;
              return {
                impossible: true, msg: worst
                  ? `${esc(worst.ev.name)} tiene ${fmt(worst.g)}, no alcanza ${fmt(val)}`
                  : `Una nota ya ingresada no alcanza ${fmt(val)}`
              };
            }
            if (cd.type === 'eval') {
              const ev = c.evals.find(e => e.id === cd.evalId);
              const g = ev ? num(ev.grade) : null;
              return {
                impossible: true, msg: ev && g != null
                  ? `${esc(ev.name)} (${fmt(g)}) no alcanza ${fmt(val)}`
                  : `Condición no cumplida`
              };
            }
            // catAvg 'no': recalculate below to see if pending evals can still save it
          }

          // Calculate what's needed
          if (cd.type === 'np') {
            if (k.pendingW <= 0) return { impossible: true, msg: `NP actual (${fmt(k.npEst)}) no alcanza ${fmt(val)}` };
            const need = (val - k.gradedSum) * 100 / k.pendingW;
            if (need > 7.0) return { impossible: true, msg: `Imposible alcanzar NP ${fmt(val)} con lo que queda` };
            if (need <= 1.0) return { msg: `Con cualquier nota alcanzas NP ≥ ${fmt(val)}` };
            if (k.pending.length === 1) return { msg: `Necesitas <strong>${fmt(need)}</strong> en ${esc(k.pending[0].ev.name)}` };
            return { msg: `Promedia <strong>${fmt(need)}</strong> en las evaluaciones pendientes (NP ≥ ${fmt(val)})` };
          }
          if (cd.type === 'minAll') {
            if (k.pending.length === 1) return { msg: `Necesitas <strong>≥ ${fmt(val)}</strong> en ${esc(k.pending[0].ev.name)}` };
            return { msg: `Todas las evaluaciones pendientes deben ser <strong>≥ ${fmt(val)}</strong>` };
          }
          if (cd.type === 'catAvg') {
            let pendW = 0, totalCatW = 0, catGradedS = 0;
            const pendCatEvs = [];
            c.evals.forEach(ev => {
              if (ev.cat !== cd.cat) return;
              const w = k.ew[ev.id] || 0; totalCatW += w;
              const g = num(ev.grade);
              if (g != null) catGradedS += w * g;
              else { pendW += w; pendCatEvs.push(ev); }
            });
            if (pendW <= 0) return { impossible: true, msg: `Promedio de ${esc(cd.cat)} no puede mejorar — sin evaluaciones pendientes` };
            const need = (val * totalCatW - catGradedS) / pendW;
            if (need > 7.0) return { impossible: true, msg: `Imposible alcanzar prom. ${fmt(val)} en ${esc(cd.cat)}` };
            if (need <= 1.0) return { msg: `Con cualquier nota en ${esc(cd.cat)} alcanzas el promedio` };
            if (pendCatEvs.length === 1) return { msg: `Necesitas <strong>${fmt(need)}</strong> en ${esc(pendCatEvs[0].name)}` };
            return { msg: `Promedia <strong>${fmt(need)}</strong> en ${esc(cd.cat)} pendiente` };
          }
          if (cd.type === 'eval') {
            const ev = c.evals.find(e => e.id === cd.evalId);
            if (!ev) return null;
            if (num(ev.grade) == null) return { msg: `Necesitas <strong>≥ ${fmt(val)}</strong> en ${esc(ev.name)}` };
            return { impossible: true, msg: `${esc(ev.name)} (${fmt(num(ev.grade))}) no alcanza ${fmt(val)}` };
          }
          return null;
        }).filter(Boolean);

        const isImpossible = g.state === 'no' || lines.every(l => l.impossible);
        const hdrStyle = isImpossible ? 'color:var(--bad)' : '';
        const items = lines.map(l =>
          l.impossible
            ? `<div class="exim-need-item no"><span style="flex-shrink:0">${ic('x', 11)}</span><span class="muted">${l.msg}</span></div>`
            : `<div class="exim-need-item"><span style="color:var(--accent);flex-shrink:0">→</span><span>${l.msg}</span></div>`
        ).join('');
        const ruleStyle = isImpossible ? ' style="opacity:.6"' : '';
        return `<div class="exim-need-rule"${ruleStyle}>
      <div class="exim-need-hdr" style="${hdrStyle}">Regla ${i + 1}${isImpossible ? ' — no es posible' : ''}</div>
      ${items}
    </div>`;
      }).filter(Boolean).join('');
      return `<div class="calc-blk">
    <div class="calc-q">Para eximirte del examen</div>
    ${rules}
  </div>`;
    }

    function calcsCard(c) {
      const k = calc(c), pass = passOf(c), hasExam = c.hasExam !== false;
      const exW = hasExam ? (num(c.examWeight) || 0) / 100 : 0;
      // Bloque 1: evaluaciones pendientes
      const pendState = k.pendingW <= 0 ? 'done' : '';
      const pendBlock = k.pendingW <= 0
        ? `<p class="small" style="color:var(--good);font-weight:600">✓ Todas las evaluaciones están completas.</p>`
        : `<div class="calc-res" id="pendRes"></div><div class="inline-r" style="margin-top:8px"><span class="il muted">NP necesaria:</span><input id="npTarget" inputmode="decimal" value="${pass.toFixed(1)}"><span class="il muted">${fmtW(k.pendingW)}% pendiente</span></div>`;
      // Bloque 2: examen (solo si tiene examen)
      let examSection = '';
      if (hasExam) {
        const examState = '';
        let examBlock;
        if (k.npEst == null) examBlock = '<p class="small muted">Ingresa notas para estimar tu NP primero.</p>';
        else if (exW <= 0) examBlock = '<p class="small muted">El examen pesa 0%.</p>';
        else examBlock = `<div class="calc-res" id="examRes"></div><div class="inline-r" style="margin-top:8px"><span class="il muted">NP:</span><input id="npForExam" inputmode="decimal" value="${fmt(k.npEst)}"><span class="il muted">Nota final deseada:</span><input id="nfTarget" inputmode="decimal" value="${pass.toFixed(1)}"></div>`;
        examSection = `<div class="calc-blk ${examState}"><div class="calc-q">Nota de examen para una nota final objetivo</div>${examBlock}</div>`;
      }
      // Bloque 3: eximición
      const exemSection = (hasExam && c.exemption?.enabled) ? exemCalcBlock(c, k, pass) : '';
      return `
  <div class="block">
    <div class="block-title"><span class="block-title-icon">${ic('target', 12)}</span> ¿Qué nota necesito?</div>
    <div class="calc-blk ${pendState}"><div class="calc-q">Promedio necesario en evaluaciones pendientes</div>${pendBlock}</div>
    ${examSection}
    ${exemSection}
  </div>`;
    }

    /* ── Render principal ── */
    function render() {
      renderTabs();
      renderMobileCourseBar();
      const c = activeCourse();
      if (!c) {
        const isMobile = window.matchMedia('(max-width:600px)').matches;
        const hint = isMobile ? 'Toca el ícono de ramos y luego "Agregar ramo".' : 'Usa el botón + Ramo en la barra superior.';
        document.getElementById('mainPanel').innerHTML = `<div class="empty-state">
      <div class="empty-mark">${ic('cap', 28)}</div>
      <h3>Sin ramos</h3>
      <p>${hint}</p>
      ${isMobile ? '' : `<button class="btn btn-primary" id="btnNewFirst">${ic('plus', 14)} Agregar ramo</button>`}
    </div>`;
        document.getElementById('btnNewFirst')?.addEventListener('click', () => {
          const nc = newCourse(); state.courses.push(nc); state.active = nc.id; persist(); render();
        });
        return;
      }
      ensureFields(c); DEC = +c.decimals || 1;
      const panel = document.getElementById('mainPanel');
      panel.style.setProperty('--tc', c.color || '#6366f1');
      panel.innerHTML = `
    <div class="course-header">
      <input class="course-name-input" id="cName" value="${escA(c.name)}" placeholder="Nombre del ramo">
      <div class="mobile-course-actions">
        <button class="mca-btn" id="mBtnConfig">${ic('sliders', 13)} Configuración</button>
        <button class="mca-btn" id="mBtnExem">${ic('shield', 13)} Eximición</button>
        <button class="mca-btn" id="mBtnCalcs">${ic('target', 13)} Resultados</button>
      </div>
    </div>
    <div class="content-grid">
      <div class="col-left"><div id="mobileResults">${mobileResultsCard(c)}</div>${evalsCard(c)}<div id="results">${resultsCard(c)}</div></div>
      <div class="col-right">${settingsCard(c)}${exemCard(c)}<div id="calcs">${calcsCard(c)}</div></div>
    </div>
    <div id="mobileResumenView"></div>`;
      document.getElementById('cName').oninput = e => { c.name = e.target.value; renderTabs(); renderMobileCourseBar(); persist(); };
      document.getElementById('mBtnConfig')?.addEventListener('click', () => openMobileConfigSheet(c));
      document.getElementById('mBtnExem')?.addEventListener('click', () => openMobileExemSheet(c));
      document.getElementById('mBtnCalcs')?.addEventListener('click', () => openMobileCalcsSheet(c));
      bindEvals(c); bindMobileEvList(c); bindSettings(c); bindExem(c); bindCalcs(c); bindCollapsibles();
      const _k = calc(c), _pass = passOf(c);
      const _npW = (num(c.npWeight) || 0) / 100, _exW = (num(c.examWeight) || 0) / 100;
      if (_k.npEst != null && _exW > 0) bindExamSim(c, _k.npEst, _npW, _exW, _pass);
      const mRes = document.getElementById('mobileResumenView');
      if (mRes) mRes.innerHTML = renderMobileResumen();
    }

    function bindExamSim(c, np, npW, exW, pass) {
      const inp = document.getElementById('examSimInput') || document.getElementById('examSimInputM');
      if (!inp) return;
      inp.addEventListener('input', () => {
        const e = num(inp.value.trim());
        c.examGrade = e ?? null;
        persist();
        const eEl = document.getElementById('formulaE');
        const nfEl = document.getElementById('formulaNF');
        const scEl = document.getElementById('examNfVal');
        const subEl = inp.closest('.nf-scen-sub')?.querySelector('div:last-child');
        if (e == null || inp.value.trim() === '') {
          if (eEl) { eEl.textContent = 'E'; eEl.className = 'nf-val nd'; }
          if (nfEl) { nfEl.textContent = 'NF'; nfEl.className = 'nf-val nd'; }
          if (scEl) { scEl.textContent = '—'; scEl.className = 'nf-scen-val nd'; }
          if (subEl) subEl.textContent = `${npW.toFixed(2)}·${fmt(np)} + ${exW.toFixed(2)}·E`;
        } else {
          const nf = npW * np + exW * e;
          const k2 = calc(c), ex2 = exemStatus(c, k2);
          const isExempt = ex2.overall === 'ok';
          // formulaNF muestra NP cuando eximido (NF real), nf cuando no eximido
          if (eEl) { eEl.textContent = fmt(e); eEl.className = 'nf-val ' + gClass(e, pass); }
          if (nfEl) { nfEl.textContent = isExempt ? fmt(np) : fmt(nf); nfEl.className = 'nf-val ' + (isExempt ? gClass(np, pass) : gClass(nf, pass)); }
          if (scEl) { scEl.textContent = fmt(nf); scEl.className = 'nf-scen-val ' + gClass(nf, pass); }
          if (subEl) subEl.textContent = `${npW.toFixed(2)}·${fmt(np)} + ${exW.toFixed(2)}·${fmt(e)}`;
        }
      });
    }
    function refreshResults(c) {
      renderTabs();
      renderMobileCourseBar();
      const r = document.getElementById('results'); if (r) r.innerHTML = resultsCard(c);
      const cc = document.getElementById('calcs'); if (cc) { cc.innerHTML = calcsCard(c); bindCalcs(c); }
      refreshExemChips(c); updateSums(c);
      const mRes = document.getElementById('mobileResumenView');
      if (mRes) mRes.innerHTML = renderMobileResumen();
      const k = calc(c), pass = passOf(c);
      const npW = (num(c.npWeight) || 0) / 100, exW = (num(c.examWeight) || 0) / 100;
      if (k.npEst != null && exW > 0) bindExamSim(c, k.npEst, npW, exW, pass);
    }
    function refreshExemChips(c) {
      const k = calc(c);
      document.querySelectorAll('.cond-item').forEach(row => {
        const gi = +row.dataset.g, ci = +row.dataset.c;
        const rule = c.exemption.rules[gi]; if (!rule) return;
        const cd = rule.conds[ci]; if (!cd) return;
        const cr = row.querySelector('.cond-status'); if (!cr) return;
        const res = evalCond(c, cd, k);
        cr.innerHTML = `${condChip(res)}<span class="small muted" style="font-size:11px;white-space:nowrap">${esc(res.text)}</span>`;
      });
    }
    function updateSums(c) {
      const a = document.querySelector('[data-toggle="config"]'); if (a) { const s = a.querySelector('.c-sum'); if (s) s.textContent = cfgSum(c); }
      const b = document.querySelector('[data-toggle="exem"]'); if (b) { const s = b.querySelector('.c-sum'); if (s) s.textContent = exemSum(c); }
    }
    function refreshAutoW(c) {
      const ew = effWeights(c);
      document.querySelectorAll('.autow').forEach(s => { const id = s.dataset.evid; s.textContent = fmtW(ew[id] || 0) + '%'; });
      const cs = document.getElementById('catSum'); if (cs) cs.innerHTML = cwSumChip(c);
    }

    /* ── Bindings ── */
    function bindCollapsibles() {
      document.querySelectorAll('[data-toggle]').forEach(btn => {
        btn.onclick = () => {
          const key = btn.dataset.toggle;
          if (!state.ui) state.ui = { config: false, exem: false };
          state.ui[key] = !state.ui[key]; persist();
          btn.closest('.coll').classList.toggle('open', state.ui[key]);
        };
      });
    }
    function newEval(c) { return { id: uid(), name: 'Evaluación ' + (c.evals.length + 1), cat: (usedCats(c)[0] || state.categories[0] || 'Otro'), weight: '', grade: '' }; }
    function switchMode(c, mode) {
      if (mode === c.weightMode) return;
      if (mode === 'category') {
        const cw = { ...(c.catWeights || {}) };
        usedCats(c).forEach(cat => { if (cw[cat] == null || cw[cat] === '') { const s = c.evals.filter(e => e.cat === cat).reduce((a, e) => a + (num(e.weight) || 0), 0); cw[cat] = r1(s); } });
        c.catWeights = cw;
      } else { const ew = effWeights(c); c.evals.forEach(e => { e.weight = r2(ew[e.id] || 0); }); }
      c.weightMode = mode;
    }
    function bindEvals(c) {
      const pass = passOf(c);
      document.querySelectorAll('.seg-btn').forEach(b => b.onclick = () => { switchMode(c, b.dataset.mode); persist(); render(); });
      const add = document.getElementById('addEv'); if (add) add.onclick = () => { c.evals.push(newEval(c)); persist(); render(); };
      document.querySelectorAll('#evBody [data-del]').forEach(b => b.onclick = () => { c.evals.splice(+b.dataset.del, 1); persist(); render(); });
      document.querySelectorAll('[data-cw]').forEach(inp => { inp.addEventListener('input', () => { c.catWeights[inp.dataset.cw] = inp.value; persist(); refreshAutoW(c); refreshResults(c); }); });
      // Drag-to-reorder
      let dragIdx = null;
      document.querySelectorAll('#evBody tr[data-i]').forEach(tr => {
        const idx = +tr.dataset.i;
        tr.addEventListener('dragstart', e => { dragIdx = idx; tr.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
        tr.addEventListener('dragend', () => { tr.classList.remove('dragging'); document.querySelectorAll('#evBody tr').forEach(r => r.classList.remove('drag-over')); dragIdx = null; });
        tr.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; tr.classList.add('drag-over'); });
        tr.addEventListener('dragleave', () => tr.classList.remove('drag-over'));
        tr.addEventListener('drop', e => { e.preventDefault(); tr.classList.remove('drag-over'); if (dragIdx == null || dragIdx === idx) return; const [removed] = c.evals.splice(dragIdx, 1); c.evals.splice(idx, 0, removed); persist(); render(); });
      });
      document.querySelectorAll('#evBody tr[data-i]').forEach(tr => {
        const i = +tr.dataset.i;
        tr.querySelectorAll('[data-f]').forEach(inp => {
          const f = inp.dataset.f;
          if (inp.tagName === 'SELECT') {
            inp.addEventListener('change', () => {
              if (f === 'cat' && inp.value === '__add__') {
                const prev = c.evals[i].cat || state.categories[0] || '';

    function bindMobileEvListDrag(c) {
      const container = document.querySelector('#mobileEvList .mev-container');
      if (!container) return;
      let drag = null;
      function getItems() { return [...container.querySelectorAll('.mev-item')]; }
      function itemAt(y) {
        for (const el of getItems()) {
          const r = el.getBoundingClientRect();
          if (y >= r.top && y < r.bottom) return { el, idx: +el.dataset.mi, mid: r.top + r.height / 2 };
        }
        return null;
      }
      function snapBack(el) {
        el.style.transition = 'transform .2s ease, opacity .2s ease';
        el.style.transform = ''; el.style.opacity = '';
        setTimeout(() => el.style.transition = '', 220);
      }
      getItems().forEach(el => {
        let sx, sy, gesture = null; // gesture: null | 'swipe' | 'drag'
        el.addEventListener('touchstart', e => {
          if (drag?.active) return;
          const t = e.touches[0];
          sx = t.clientX; sy = t.clientY; gesture = null;
          drag = { el, idx: +el.dataset.mi, active: false };
          drag.timer = setTimeout(() => {
            if (gesture === 'swipe') return;
            gesture = 'drag'; drag.active = true;
            el.classList.add('mev-dragging');
            navigator.vibrate?.(40);
          }, 350);
        }, { passive: true });
        el.addEventListener('touchmove', e => {
          if (!drag || drag.el !== el) return;
          const t = e.touches[0];
          const dx = t.clientX - sx, dy = t.clientY - sy;
          // Determinar gesto si aún no está definido
          if (!gesture) {
            if (Math.abs(dx) > 10 && dx < 0 && Math.abs(dx) > Math.abs(dy) * 1.2) {
              gesture = 'swipe'; clearTimeout(drag.timer);
            } else if (Math.abs(dy) > 10 || Math.abs(dx) > 10) {
              gesture = 'scroll'; clearTimeout(drag.timer); drag = null; return;
            }
          }
          if (gesture === 'swipe') {
            e.preventDefault();
            const x = Math.min(0, dx);
            el.style.transform = `translateX(${x}px)`;
            el.style.opacity = String(Math.max(0.15, 1 + x / 100));
          }
          if (gesture === 'drag') {
            e.preventDefault();
            getItems().forEach(it => it.classList.remove('mev-drop-above', 'mev-drop-below'));
            const hit = itemAt(t.clientY);
            if (hit && hit.idx !== drag.idx)
              hit.el.classList.add(t.clientY < hit.mid ? 'mev-drop-above' : 'mev-drop-below');
          }
        }, { passive: false });
        function onEnd(e) {
          if (!drag || drag.el !== el) return;
          clearTimeout(drag.timer);
          const t = e.changedTouches[0];
          const dx = t.clientX - sx;
          if (gesture === 'swipe') {
            if (dx < -80) {
              el.style.transition = 'transform .2s ease, opacity .2s ease';
              el.style.transform = 'translateX(-110%)'; el.style.opacity = '0';
              const i = drag.idx;
              setTimeout(() => { c.evals.splice(i, 1); persist(); render(); }, 210);
            } else { snapBack(el); }
          } else if (gesture === 'drag' && drag.active) {
            el.classList.remove('mev-dragging');
            getItems().forEach(it => it.classList.remove('mev-drop-above', 'mev-drop-below'));
            const hit = itemAt(t.clientY);
            if (hit && hit.idx !== drag.idx) {
              const ins = t.clientY < hit.mid ? hit.idx : hit.idx + 1;
              const [removed] = c.evals.splice(drag.idx, 1);
              c.evals.splice(ins > drag.idx ? ins - 1 : ins, 0, removed);
              persist(); render();
            }
          }
          drag = null; gesture = null;
        }
        el.addEventListener('touchend', onEnd);
        el.addEventListener('touchcancel', e => {
          if (drag?.el === el) { clearTimeout(drag.timer); if (gesture === 'swipe') snapBack(el); if (drag.active) el.classList.remove('mev-dragging'); drag = null; gesture = null; }
        });
      });
    }

      document.getElementById('modalOverlay').classList.add('hidden');

    /* ── Firestore sync ── */

    /* Escribe el estado a Firestore con debounce de 1 s */
    function syncToFirestore() {
      if (!fbDb || !currentUser) return;
      updateSyncStatus('saving');
      clearTimeout(_syncDebounce);
      _syncDebounce = setTimeout(() => writeToFirestore(currentUser.uid), 1000);
    }

    /* Escritura inmediata (sin debounce) */
    async function writeToFirestore(uid) {
      if (!fbDb || !uid) return;
      try {
        const at = state.updatedAt || Date.now();
        _lastWrittenAt = at;
        await setDoc(doc(fbDb, 'users', uid), { data: state, updatedAt: at, version: 1 });
        updateSyncStatus('ok');
      } catch (e) {
        console.warn('[Gradiant] Error escribiendo en Firestore:', e);
        updateSyncStatus(navigator.onLine ? 'saving' : 'offline');
      }
    }

    /* Se llama al cambiar el estado de sesión */
    async function onUserLogin(user) {
      currentUser = user;
      renderAuthArea(user);
      mnavUpdateAvatar();
      renderMobileCourseBar();

      /* Logout: cancelar listener en vivo */
      if (!user) {
        if (_unsubSnapshot) { _unsubSnapshot(); _unsubSnapshot = null; }
        updateSyncStatus('local');
        return;
      }

      /* Login: comparar nube vs local y quedarse con la versión más nueva */
      if (!fbDb) return;
      try {
        const ref = doc(fbDb, 'users', user.uid);
        const snap = await getDoc(ref);
        const localAt = state.updatedAt || 0;

        if (snap.exists()) {
          const remote = snap.data();
          const remoteAt = remote.updatedAt || 0;
          if (remoteAt > localAt) {
            /* La nube es más nueva → actualizar local */
            state = remote.data;
            Store.save(state);
            applyTheme(state.theme || 'light');
            render();
          } else {
            /* Local es más nueva (o igual) → subir local a la nube */
            await writeToFirestore(user.uid);
          }
        } else {
          /* Sin doc en la nube → subir estado local */
          await writeToFirestore(user.uid);
        }

        /* Suscribirse a cambios en vivo desde otros dispositivos
           Nota: last-write-wins; editar offline en dos dispositivos a la vez
           puede sobrescribir cambios del otro. No se implementa merge por ahora. */
        _unsubSnapshot = onSnapshot(ref, remoteSnap => {
          if (!remoteSnap.exists()) return;
          const remote = remoteSnap.data();
          const remoteAt = remote.updatedAt || 0;
          /* Ignorar si no es más nuevo que lo local (cubre ecos propios y datos obsoletos) */
          if (remoteAt <= (state.updatedAt || 0)) return;
          state = remote.data;
          Store.save(state);
          applyTheme(state.theme || 'light');
          render();
        });
      } catch (e) {
        console.warn('[Gradiant] Error al sincronizar con Firestore:', e);
      }
    }

      const greeting = firstName ? `Hola, ${esc(firstName)} 👋` : 'Mis ramos';
      const nps = courses.map(x => calc(x).np).filter(n => n != null);
      const avg = nps.length ? nps.reduce((a, b) => a + b, 0) / nps.length : null;
      const statsLine = courses.length === 0
        ? 'Sin ramos aún'
        : `${courses.length} ramo${courses.length !== 1 ? 's' : ''}${avg != null ? ` · Prom. ${avg.toFixed(1)}` : ''}`;

      if (welcome) {
        welcome.innerHTML = `<div class="mw-greeting">${greeting}</div><div class="mw-stats">${statsLine}</div>`;
      }

      if (hdrLeft) {
        const avatarSvg = currentUser?.photoURL
          ? `<img src="${escA(currentUser.photoURL)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" alt="">`
          : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`;
        hdrLeft.innerHTML = `
          <div class="m-hdr-avatar">${avatarSvg}</div>
          <div class="m-hdr-text">
            <div class="m-hdr-greeting">${greeting}</div>
            <div class="m-hdr-sub">${statsLine}</div>
          </div>`;
      }
    }

    /* ── Popup liquid glass de ramos ── */
    function openRamosPopup() {
      const overlay = document.getElementById('ramosPopup');
      const content = document.getElementById('ramosPopupContent');
      if (!overlay || !content) return;
      const courses = state.courses || [];
      const rows = courses.map(c => {
        const k = calc(c), pass = passOf(c);
        const grade = k.npEst != null ? fmtD(k.npEst, +c.decimals || 1) : '—';
        const active = c.id === state.active;
        return `<button class="ramos-popup-item${active ? ' rp-active' : ''}" data-cid="${escA(c.id)}">
          <label class="rp-dot" style="background:${escA(c.color || '#6366f1')}" title="Cambiar color" onclick="event.stopPropagation()"><input type="color" class="rp-color-inp" data-cid="${escA(c.id)}" value="${escA(c.color || '#6366f1')}" style="opacity:0;width:0;height:0;position:absolute;pointer-events:none"></label>
          <span class="rp-name">${esc(c.name || 'Ramo')}</span>
          <span class="rp-grade">${grade}</span>
          ${active ? ic('check', 14) : ''}
        </button>`;
      }).join('');
      content.innerHTML = `
        <div class="ramos-popup-header">
          <span class="ramos-popup-title">Ramos</span>
          <button class="ramos-popup-close" id="ramosPopupClose" aria-label="Cerrar">${ic('x', 13)}</button>
        </div>
        <div class="ramos-popup-list">${rows || `<p style="padding:20px;color:rgba(255,255,255,.5);font-size:14px">Sin ramos aún.</p>`}</div>
        <div class="ramos-popup-footer">
          <button class="ramos-popup-add" id="ramosPopupAdd">
            ${ic('plus', 15)} Agregar ramo
          </button>
        </div>`;
      overlay.style.display = 'flex';
      requestAnimationFrame(() => overlay.classList.add('open'));
      document.getElementById('ramosPopupClose')?.addEventListener('click', closeRamosPopup);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeRamosPopup(); });
      content.querySelectorAll('.ramos-popup-item').forEach(btn => {
        btn.addEventListener('click', () => {
          state.active = btn.dataset.cid;
          persist(); render();
          closeRamosPopup();
        });
      });
      document.getElementById('ramosPopupAdd')?.addEventListener('click', () => {
        const c = newCourse();
        state.courses.push(c); state.active = c.id;
        persist(); render();
        closeRamosPopup();
      });
      content.querySelectorAll('.rp-color-inp').forEach(inp => {
        inp.addEventListener('input', e => {
          const course = state.courses.find(x => x.id === inp.dataset.cid);
          if (!course) return;
          course.color = e.target.value;
          inp.closest('.rp-dot').style.background = e.target.value;
          persist();
        });
      });
    }

    function closeRamosPopup() {
      const overlay = document.getElementById('ramosPopup');
      if (!overlay) return;
      overlay.classList.remove('open');
      setTimeout(() => { if (!overlay.classList.contains('open')) overlay.style.display = ''; }, 260);
    }


    function renderMobileResumen() {
      let sumNp = 0, count = 0;
      const rHtml = state.courses.map(rc => {
        const rk = calc(rc);
        if (rk.npEst != null) { sumNp += rk.npEst; count++; }
        const np = rk.npEst != null ? fmt(rk.npEst) : '—';
        const cl = rk.npEst != null ? gClass(rk.npEst, passOf(rc)) : '';
        const pct = rk.totalW > 0 ? Math.min(100, Math.round((rk.gradedW / rk.totalW) * 100)) : 0;
        const courseColor = rc.color || '#6366f1';
        return `
          <div style="border-radius:16px; padding:16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <div style="font-size:14px; font-weight:600; color:var(--ink); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:12px">${esc(rc.name)}</div>
              <div style="font-size:22px; font-weight:800; flex-shrink:0" class="${cl}">${np}</div>
            </div>
            <div style="height:3px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden">
              <div style="height:100%; width:${pct}%; background:${courseColor}; border-radius:2px;"></div>
            </div>
          </div>`;
      }).join('');

      const pg = count > 0 ? (sumNp / count) : null;
      const pgStr = pg != null ? fmt(pg) : '—';
      const pgCl = pg != null ? gClass(pg, 4.0) : '';
      const semStr = `${state.courses.length} ${state.courses.length === 1 ? 'ramo' : 'ramos'}`;

      return `
        <div style="padding:16px 20px; display:flex; flex-direction:column; gap:20px; padding-bottom:120px">
          <div style="background:linear-gradient(135deg, rgba(99,102,241,0.22) 0%, rgba(59,130,246,0.12) 100%); border:1px solid rgba(99,102,241,0.22); border-radius:24px; padding:20px; position:relative; overflow:hidden">
            <div style="position:absolute; top:-40px; right:-40px; width:140px; height:140px; border-radius:50%; background:rgba(99,102,241,0.12); pointer-events:none"></div>
            <div style="font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted)">Promedio General</div>
            <div style="font-size:56px; font-weight:800; line-height:1.1; margin-top:6px" class="${pgCl}">${pgStr}</div>
            <div style="font-size:12px; color:var(--muted); margin-top:10px">${semStr} · Semestre actual</div>
          </div>
          <div>
            <div style="font-size:11px; font-weight:700; letter-spacing:0.1em; color:var(--muted); margin-bottom:10px; text-transform:uppercase; padding-left:2px">Estado por Ramo</div>
            <div style="display:flex; flex-direction:column; gap:8px">${rHtml || '<div style="font-size:13px;color:var(--muted);padding:12px 2px">No hay ramos agregados.</div>'}</div>
          </div>
        </div>
      `;
    }
