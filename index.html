<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradiant</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Gradiant">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap"
    rel="stylesheet">
  <style>
    /* ─── TOKENS ─── */
    :root {
      color-scheme: dark;
      --bg: #161920;
      --bg-2: #1c1f28;
      --surface: #20243a;
      --surface-2: #262a3e;
      --border: #333858;
      --border-2: #3e4368;
      --ink: #f0f4f8;
      --ink-2: #9aa8bc;
      --muted: #7282a0;
      --accent: #e2e8f0;
      --accent-d: #b8c4d4;
      --accent-s: rgba(226, 232, 240, .09);
      --good: #4ade80;
      --good-s: rgba(74, 222, 128, .18);
      --good-b: rgba(74, 222, 128, .34);
      --bad: #f87171;
      --bad-s: rgba(248, 113, 113, .18);
      --bad-b: rgba(248, 113, 113, .34);
      --warn: #fb923c;
      --warn-s: rgba(251, 146, 60, .18);
      --warn-b: rgba(251, 146, 60, .34);
      --r: 13px;
      --r2: 9px;
      --font: "Inter", "Segoe UI", system-ui, sans-serif;
      --t: .16s ease;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f8fafc;
      --bg-2: #f1f5f9;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --border-2: #cbd5e1;
      --ink: #0f172a;
      --ink-2: #334155;
      --muted: #64748b;
      --accent: #334155;
      --accent-d: #1e293b;
      --accent-s: rgba(51, 65, 85, .09);
      --good: #16a34a;
      --good-s: #f0fdf4;
      --good-b: #bbf7d0;
      --bad: #dc2626;
      --bad-s: #fff1f2;
      --bad-b: #fecdd3;
      --warn: #d97706;
      --warn-s: #fffbeb;
      --warn-b: #fde68a;
    }

    /* ─── RESET ─── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      transition: background var(--t), color var(--t);
    }

    [data-theme="dark"] body {
      background:
        radial-gradient(ellipse 100% 50% at 50% -10%, rgba(226, 232, 240, .04) 0%, transparent 55%),
        var(--bg);
    }

    /* ─── TOPBAR ─── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 52px;
      background: rgba(10, 12, 16, .92);
      backdrop-filter: blur(16px) saturate(1.6);
      -webkit-backdrop-filter: blur(16px) saturate(1.6);
      border-bottom: 1px solid rgba(226, 232, 240, .08);
      box-shadow: 0 1px 0 rgba(226, 232, 240, .04), 0 4px 20px rgba(0, 0, 0, .5);
      padding: 0 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background var(--t), border-color var(--t);
    }

    [data-theme="light"] .topbar {
      background: rgba(255, 255, 255, .9);
      border-bottom-color: rgba(0, 0, 0, .12);
      box-shadow: 0 1px 0 rgba(0, 0, 0, .05), 0 2px 12px rgba(0, 0, 0, .08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }

    .brand-mark img {
      width: 34px;
      height: 34px;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(15, 22, 35, .4));
    }

    .brand-name {
      font-size: 15.5px;
      font-weight: 800;
      letter-spacing: -.045em;
      color: #0f1623;
      -webkit-text-fill-color: #0f1623;
    }

    [data-theme="dark"] .brand-name {
      color: #eef2ff;
      -webkit-text-fill-color: #eef2ff;
    }

    .topbar-gap {
      flex: 1
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Mobile-only elements: hidden on desktop */
    .m-hdr-left,
    .m-hdr-right,
    .m-page-title {
      display: none;
    }

    /* ── Auth area ── */
    #authArea {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes auth-in {
      from {
        opacity: 0;
        transform: translateX(10px) scale(.93);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .auth-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 3px 3px 3px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      animation: auth-in .3s cubic-bezier(.34, 1.56, .64, 1);
      transition: border-color .15s, background .15s;
    }

    .auth-chip:hover {
      border-color: var(--border-2);
    }

    .auth-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    .auth-initials {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .auth-chip-name {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 3px 0 1px;
    }

    .btn-signout {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--ink-2);
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, color .15s;
      padding: 0;
    }

    .btn-signout:hover {
      background: rgba(239, 68, 68, .12);
      color: #ef4444;
    }

    /* ── Google button ── */
    .gbtn {
      padding: 7px 14px 7px 10px;
      font-weight: 700;
      display: flex;
      position: relative;
      overflow: hidden;
      border-radius: 35px;
      align-items: center;
      border: 1.5px solid var(--border-2);
      background: #fff;
      outline: none;
      cursor: pointer;
      color: #222;
      animation: auth-in .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    .gbtn-svg {
      height: 18px;
      margin-right: 8px;
      z-index: 6;
      flex-shrink: 0;
    }

    .gbtn-text {
      z-index: 10;
      font-size: 13px;
      white-space: nowrap;
    }

    .gbtn:hover .gbtn-text {
      animation: gbtn-text .3s forwards;
    }

    @keyframes gbtn-text {
      from {
        color: #222;
      }

      to {
        color: #fff;
      }
    }

    .gbtn:hover::before {
      content: "";
      display: block;
      position: absolute;
      top: 50%;
      left: 9%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      opacity: 0;
      border-radius: 300px;
      animation: gbtn-wave1 2.5s ease-in-out forwards;
    }

    .gbtn:hover::after {
      content: "";
      display: block;
      position: absolute;
      top: 50%;
      left: 9%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      opacity: 0;
      border-radius: 300px;
      animation: gbtn-wave2 2.5s ease-in-out forwards;
    }

    @keyframes gbtn-wave1 {
      0% {
        z-index: 1;
        background: #EB4335;
        width: 0;
        height: 0;
        opacity: 1;
      }

      1% {
        z-index: 1;
        background: #EB4335;
        width: 0;
        height: 0;
        opacity: 1;
      }

      25% {
        z-index: 1;
        background: #EB4335;
        width: 800px;
        height: 800px;
        opacity: 1;
      }

      26% {
        z-index: 3;
        background: #34A853;
        width: 0;
        height: 0;
        opacity: 1;
      }

      50% {
        z-index: 3;
        background: #34A853;
        width: 800px;
        height: 800px;
        opacity: 1;
      }

      100% {
        z-index: 3;
        background: #34A853;
        width: 800px;
        height: 800px;
        opacity: 1;
      }
    }

    @keyframes gbtn-wave2 {
      0% {
        z-index: 2;
        background: #FBBC05;
        width: 0;
        height: 0;
        opacity: 1;
      }

      11% {
        z-index: 2;
        background: #FBBC05;
        width: 0;
        height: 0;
        opacity: 1;
      }

      35% {
        z-index: 2;
        background: #FBBC05;
        width: 800px;
        height: 800px;
        opacity: 1;
      }

      40% {
        z-index: 4;
        background: #4285F4;
        width: 0;
        height: 0;
        opacity: 1;
      }

      64% {
        z-index: 4;
        background: #4285F4;
        width: 800px;
        height: 800px;
        opacity: 1;
      }

      100% {
        z-index: 4;
        background: #4285F4;
        width: 800px;
        height: 800px;
        opacity: 1;
      }
    }

    .gbtn:hover .g-red {
      animation: gbtn-hide .1s .10s forwards;
    }

    .gbtn:hover .g-yellow {
      animation: gbtn-hide .1s .30s forwards;
    }

    .gbtn:hover .g-green {
      animation: gbtn-hide .1s .70s forwards;
    }

    .gbtn:hover .g-blue {
      animation: gbtn-hide .1s 1.1s forwards;
    }

    @keyframes gbtn-hide {
      to {
        filter: brightness(100);
      }
    }

    /* ── Sync status chip ── */
    #syncStatus {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      padding: 4px 10px;
      border-radius: 20px;
      transition: opacity .4s, background .3s, color .3s;
      animation: sync-in .25s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes sync-in {
      from {
        opacity: 0;
        transform: translateX(6px) scale(.95);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sync-local {
      color: var(--muted);
      background: transparent;
    }

    .sync-local .sync-dot {
      background: var(--muted);
      opacity: .5;
    }

    .sync-saving {
      color: var(--warn);
      background: var(--warn-s);
    }

    .sync-saving .sync-dot {
      background: var(--warn);
      animation: sync-pulse 1s ease-in-out infinite;
    }

    .sync-ok {
      color: var(--good);
      background: var(--good-s);
    }

    .sync-ok .sync-dot {
      background: var(--good);
    }

    .sync-offline {
      color: var(--bad);
      background: var(--bad-s);
    }

    .sync-offline .sync-dot {
      background: var(--bad);
    }

    @keyframes sync-pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .4;
        transform: scale(.7);
      }
    }

    /* ─── MOBILE WELCOME (oculto en desktop) ─── */
    .mobile-welcome {
      display: none
    }

    /* ─── TABS ─── */
    .tabs-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 22px;
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      scrollbar-width: none;
      min-height: 42px;
      transition: background var(--t), border-color var(--t);
    }

    .tabs-bar::-webkit-scrollbar {
      display: none
    }

    .tab-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 15px;
      border: none;
      background: transparent;
      color: var(--muted);
      font: 500 12.5px/1 var(--font);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color var(--t), border-color var(--t);
    }

    .tab-btn:hover {
      color: var(--ink-2)
    }

    .tab-btn.active {
      color: var(--tc, var(--accent));
      border-bottom-color: var(--tc, var(--accent));
      font-weight: 600;
      text-shadow: 0 0 16px rgba(226, 232, 240, .3);
    }

    [data-theme="light"] .tab-btn.active {
      text-shadow: none;
    }

    .tab-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--tc, var(--muted));
      flex-shrink: 0;
      opacity: .5;
      transition: opacity var(--t), transform var(--t);
      cursor: pointer;
    }

    .tab-btn.active .tab-dot {
      opacity: 1;
    }

    .tab-dot:hover {
      transform: scale(1.5);
      opacity: 1 !important;
    }

    #colorPickerInput {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .tab-grade {
      font-size: 10.5px;
      font-weight: 700;
      padding: 1.5px 6px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      transition: all var(--t);
    }

    .tab-btn.active .tab-grade {
      background: var(--accent-s);
      color: var(--accent);
    }

    .tab-grade.ok {
      background: var(--good-s) !important;
      color: var(--good) !important
    }

    .tab-grade.warn {
      background: var(--warn-s) !important;
      color: var(--warn) !important
    }

    .tab-grade.no {
      background: var(--bad-s) !important;
      color: var(--bad) !important
    }

    .tab-x {
      opacity: 0;
      width: 14px;
      height: 14px;
      border-radius: 4px;
      display: grid;
      place-items: center;
      transition: opacity .12s, background .12s;
      color: var(--muted);
      flex-shrink: 0;
    }

    .tab-btn:hover .tab-x {
      opacity: 1
    }

    .tab-x:hover {
      background: var(--bad-s) !important;
      color: var(--bad) !important
    }

    .tab-add {
      flex-shrink: 0;
      align-self: center;
      margin: 0 0 0 6px;
      border: 1px dashed var(--border-2);
      background: transparent;
      color: var(--muted);
      font: 500 12px/1 var(--font);
      padding: 5px 10px;
      border-radius: var(--r2);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all var(--t);
    }

    .tab-add:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-s)
    }

    /* ─── MAIN ─── */
    .main {
      padding: 26px 20px 80px;
      max-width: 1240px;
      margin: 0 auto;
      width: 100%
    }

    /* ─── BUTTONS ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: var(--r2);
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-2);
      font: 500 12.5px/1 var(--font);
      cursor: pointer;
      transition: all var(--t);
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px) scale(1.015);
      box-shadow: 0 0 14px rgba(226, 232, 240, .14);
    }

    .btn:active {
      transform: scale(.99);
      box-shadow: none;
    }

    .btn-ghost {
      background: transparent;
      border-color: transparent
    }

    .btn-ghost:hover {
      background: var(--surface-2);
      border-color: var(--border)
    }

    .btn-sm {
      padding: 4px 9px;
      font-size: 12px;
      border-radius: 7px
    }

    .btn-danger:hover {
      border-color: var(--bad) !important;
      color: var(--bad) !important
    }

    @keyframes theme-flip {
      0% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }

      45% {
        transform: scale(0.65) rotate(80deg);
        opacity: 0;
      }

      55% {
        transform: scale(0.65) rotate(100deg);
        opacity: 0;
      }

      100% {
        transform: scale(1) rotate(180deg);
        opacity: 1;
      }
    }

    .icon-btn.flipping {
      animation: theme-flip .45s cubic-bezier(.4, 0, .2, 1) forwards;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted);
      transition: all var(--t);
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(226, 232, 240, .16);
      transform: scale(1.08);
    }

    /* ─── COURSE HEADER ─── */
    .course-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .course-name-input {
      font: 800 26px/1.1 var(--font);
      letter-spacing: -.05em;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      outline: none;
      padding: 0 0 2px;
      flex: 1;
      min-width: 180px;
      transition: border-color var(--t);
    }

    .course-name-input::placeholder {
      color: var(--muted);
    }

    .course-name-input:focus {
      border-bottom-color: var(--accent)
    }

    /* ─── CONTENT GRID ─── */
    .content-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 0 20px;
      align-items: start
    }

    /* ─── SECTION BLOCKS ─── */
    @keyframes blockIn {
      from {
        opacity: 0;
        transform: translateY(7px);
        filter: blur(2px);
      }

      to {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }

    .block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 20px;
      margin-bottom: 14px;
      transition: background var(--t), border-color var(--t);
      animation: blockIn .3s cubic-bezier(.4, 0, .2, 1) both;
      box-shadow: inset 0 1px 0 rgba(226, 232, 240, .06);
    }

    [data-theme="light"] .block {
      box-shadow: inset 0 1px 0 rgba(5, 150, 105, .05);
    }

    .col-left>.block {
      animation-delay: 0ms;
    }

    .col-left>div>.block {
      animation-delay: 55ms;
    }

    .col-right>.block:nth-child(1) {
      animation-delay: 80ms;
    }

    .col-right>.block:nth-child(2) {
      animation-delay: 115ms;
    }

    .col-right>div>.block {
      animation-delay: 150ms;
    }

    .block-title {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 16px;
    }

    .block-title-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: var(--accent-s);
      display: grid;
      place-items: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .c-icon {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: var(--accent-s);
      display: grid;
      place-items: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .block-title .hint {
      margin-left: auto;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 11.5px;
      color: var(--muted);
    }

    .ev-empty-hint {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      white-space: nowrap;
      opacity: .7;
    }
    #mobileEvList { display: none; }
    #mobileResults { display: none; }

    /* ─── FORM ─── */
    input,
    select {
      font: inherit;
      font-size: 13px;
      border: 1px solid var(--border-2);
      border-radius: var(--r2);
      padding: 6px 9px;
      background: var(--surface-2);
      color: var(--ink);
      width: 100%;
      transition: border-color var(--t), box-shadow var(--t);
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-s);
    }

    select {
      cursor: pointer;
      appearance: auto;
      -webkit-appearance: auto
    }

    input[type="checkbox"] {
      width: auto;
      appearance: auto;
      -webkit-appearance: auto
    }

    input[type="checkbox"].cb-circle {
      appearance: none;
      -webkit-appearance: none;
      display: inline-block;
      width: 18px;
      height: 18px;
      min-width: 18px;
      min-height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid var(--border-2);
      background: var(--surface);
      cursor: pointer;
      position: relative;
      transition: all .15s ease;
      vertical-align: middle;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    input[type="checkbox"].cb-circle:hover {
      border-color: var(--good);
    }

    input[type="checkbox"].cb-circle:checked {
      background: var(--good);
      border-color: var(--good);
    }

    input[type="checkbox"].cb-circle::after {
      content: '';
      display: none;
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    input[type="checkbox"].cb-circle:checked::after {
      display: block;
    }

    input.g-ok {
      color: var(--good);
      font-weight: 700
    }

    input.g-warn {
      color: var(--warn);
      font-weight: 700
    }

    input.g-no {
      color: var(--bad);
      font-weight: 700
    }

    input.g-inv {
      border-color: var(--warn);
      color: var(--warn)
    }

    /* ─── TABLE ─── */
    table {
      width: 100%;
      border-collapse: collapse
    }

    th {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      text-align: left;
      padding: 0 4px 10px;
      white-space: nowrap;
    }

    td {
      padding: 5px 4px;
      vertical-align: middle
    }

    td:first-child {
      padding-left: 0
    }

    td:last-child {
      padding-right: 0
    }

    /* Columnas fijas: categoría, peso, nota, borrar no se estiran */
    #evBody td:nth-child(3),
    thead tr th:nth-child(3) {
      width: 130px;
    }

    #evBody td:nth-child(4),
    thead tr th:nth-child(4) {
      width: 76px;
    }

    .ev-nota {
      width: 76px;
      padding-left: 20px !important;
    }

    #evBody td:last-child,
    thead tr th:last-child {
      width: 32px;
    }

    tfoot td {
      padding-top: 12px;
      border-top: 1px solid var(--border)
    }

    .num-inp {
      width: 62px;
      text-align: center
    }

    .ev-name input {
      min-width: 96px
    }

    #evBody td {
      border-bottom: 1px solid var(--border);
      transition: background var(--t), box-shadow var(--t);
    }

    #evBody tr:last-child td {
      border-bottom: none;
    }

    #evBody tr:hover td {
      background: color-mix(in srgb, var(--tc, #6366f1) 8%, transparent);
    }

    #evBody tr:hover td.ev-grip {
      box-shadow: inset 3px 0 0 var(--tc, #6366f1);
    }

    #evBody tr.dragging {
      opacity: .35;
    }

    #evBody tr.drag-over td {
      background: var(--accent-s);
      box-shadow: inset 0 -2px 0 var(--accent);
    }

    .ev-grip {
      width: 22px;
      cursor: grab;
      color: var(--border-2);
      text-align: center;
      padding-right: 2px !important;
      transition: color var(--t);
    }

    #evBody tr:hover .ev-grip {
      color: var(--tc, #6366f1);
    }

    #evBody [data-del] {
      opacity: 0;
      transition: opacity var(--t);
    }

    #evBody tr:hover [data-del] {
      opacity: 1;
    }

    /* Grade input colored backgrounds */
    #evBody .g-ok {
      background: var(--good-s);
      border-color: var(--good-b);
      font-weight: 700;
    }

    #evBody .g-warn {
      background: var(--warn-s);
      border-color: var(--warn-b);
      font-weight: 700;
    }

    #evBody .g-no {
      background: var(--bad-s);
      border-color: var(--bad-b);
      font-weight: 700;
    }

    /* ─── SEG CONTROL ─── */
    .seg {
      display: inline-flex;
      border: 1px solid var(--border-2);
      border-radius: var(--r2);
      overflow: hidden;
      margin-bottom: 14px;
      background: var(--surface);
    }

    .seg-btn {
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      padding: 6px 14px;
      font: 600 12px/1 var(--font);
      cursor: pointer;
      transition: all var(--t);
    }

    .seg-btn:not(:last-child) {
      border-right: 1px solid var(--border-2);
    }

    .seg-btn:hover {
      background: var(--surface-2);
      color: var(--ink);
    }

    .seg-btn.on {
      background: var(--tc, #6366f1);
      color: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .15), 0 1px 4px color-mix(in srgb, var(--tc, #6366f1) 40%, transparent);
    }

    /* ─── CHIPS ─── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid transparent;
      line-height: 1.5;
      white-space: nowrap;
      transition: all .15s ease;
    }

    .chip.ok {
      background: var(--good-s);
      color: var(--good);
      border-color: var(--good-b);
      box-shadow: 0 0 8px rgba(74, 222, 128, .12);
    }

    .chip.no {
      background: var(--bad-s);
      color: var(--bad);
      border-color: var(--bad-b);
      box-shadow: 0 0 8px rgba(248, 113, 113, .12);
    }

    .chip.warn {
      background: var(--warn-s);
      color: var(--warn);
      border-color: var(--warn-b);
    }

    .chip.neu {
      background: var(--surface-2);
      color: var(--muted);
      border-color: var(--border)
    }

    [data-theme="light"] .chip.ok {
      box-shadow: none;
    }

    [data-theme="light"] .chip.no {
      box-shadow: none;
    }

    /* ─── STATUS DOT ─── */
    .status-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid transparent;
      transition: all .15s ease;
    }

    .status-dot.ok {
      background: var(--good-s);
      color: var(--good);
      border-color: var(--good-b);
    }

    .status-dot.no {
      background: var(--bad-s);
      color: var(--bad);
      border-color: var(--bad-b);
    }

    .status-dot.pend {
      background: var(--surface-2);
      color: var(--muted);
      border-color: var(--border-2);
      font-size: 14px;
      line-height: 1;
    }

    /* ─── GRADE HERO ─── */
    .grade-hero {
      margin-bottom: 20px;
      padding: 18px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: box-shadow .4s ease;
    }

    .grade-hero[data-gc="ok"] {
      box-shadow: inset 0 1px 0 rgba(74, 222, 128, .1), 0 0 0 1px rgba(74, 222, 128, .08);
    }

    .grade-hero[data-gc="warn"] {
      box-shadow: inset 0 1px 0 rgba(251, 146, 60, .1), 0 0 0 1px rgba(251, 146, 60, .08);
    }

    .grade-hero[data-gc="no"] {
      box-shadow: inset 0 1px 0 rgba(248, 113, 113, .1), 0 0 0 1px rgba(248, 113, 113, .08);
    }

    .gh-top {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 14px;
    }

    .gh-grade {
      font: 800 54px/1 var(--font);
      letter-spacing: -.05em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: color .4s ease;
    }

    .gh-grade.ok {
      color: var(--good);
      text-shadow: 0 0 28px rgba(74, 222, 128, .35);
    }

    .gh-grade.warn {
      color: var(--warn);
      text-shadow: 0 0 28px rgba(251, 146, 60, .35);
    }

    .gh-grade.no {
      color: var(--bad);
      text-shadow: 0 0 28px rgba(248, 113, 113, .35);
    }

    .gh-grade.nd {
      color: var(--border-2);
      text-shadow: none;
    }

    [data-theme="light"] .gh-grade.ok {
      text-shadow: none;
    }

    [data-theme="light"] .gh-grade.warn {
      text-shadow: none;
    }

    [data-theme="light"] .gh-grade.no {
      text-shadow: none;
    }

    .gh-grade-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding-bottom: 5px;
    }

    .gh-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted)
    }

    .gh-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .gh-bar-track {
      position: relative;
      height: 7px;
      border-radius: 4px;
      overflow: hidden;
      background: linear-gradient(90deg, var(--bad) 0%, var(--warn) 48%, var(--good) 100%);
      transition: box-shadow .5s ease;
    }

    .grade-hero[data-gc="ok"] .gh-bar-track {
      box-shadow: 0 0 10px rgba(74, 222, 128, .25);
    }

    .grade-hero[data-gc="warn"] .gh-bar-track {
      box-shadow: 0 0 10px rgba(251, 146, 60, .25);
    }

    .grade-hero[data-gc="no"] .gh-bar-track {
      box-shadow: 0 0 10px rgba(248, 113, 113, .25);
    }

    .gh-bar-cover {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      background: var(--surface);
      border-radius: 0 4px 4px 0;
      transition: width .75s cubic-bezier(.4, 0, .2, 1);
    }

    [data-theme="light"] .gh-bar-cover {
      background: var(--bg-2);
    }

    .gh-bar-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 7px;
    }

    .gh-bar-scale {
      font-size: 10px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .gh-meta {
      font-size: 11.5px;
      color: var(--muted)
    }

    .gh-header {
      display: none;
      /* visible solo en mobile */
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    /* En desktop el .gh-label va dentro de .gh-grade-info (como antes); en mobile va en .gh-header */
    .gh-grade-info::before {
      content: 'Promedio actual';
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .gh-exem-badge {
      display: none;
      /* solo visible en mobile (media query activa display:inline-flex) */
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: .02em;
    }

    .gh-exem-badge.ok {
      background: rgba(74, 222, 128, .15);
      color: var(--good);
    }

    .gh-exem-badge.no {
      background: rgba(248, 113, 113, .15);
      color: var(--bad);
    }

    .gh-exem-badge.warn {
      background: rgba(251, 146, 60, .15);
      color: var(--warn);
    }

    /* ─── BANNER ─── */
    .banner {
      border-radius: var(--r2);
      padding: 10px 14px;
      font: 600 13px/1.4 var(--font);
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      border: 1px solid transparent;
    }

    .banner.ok {
      background: var(--good-s);
      color: var(--good);
      border-color: var(--good-b)
    }

    .banner.no {
      background: var(--bad-s);
      color: var(--bad);
      border-color: var(--bad-b)
    }

    .banner.warn {
      background: var(--warn-s);
      color: var(--warn);
      border-color: var(--warn-b)
    }

    .banner.neu {
      background: var(--surface-2);
      color: var(--muted);
      border-color: var(--border)
    }

    /* ─── NOTA FINAL ─── */
    .nf-formula {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px;
      border-radius: var(--r2);
      background: var(--surface-2);
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .nf-term {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .nf-val {
      font: 800 24px/1 var(--font);
      letter-spacing: -.04em;
      font-variant-numeric: tabular-nums;
    }

    .nf-val.ok {
      color: var(--good)
    }

    .nf-val.warn {
      color: var(--warn)
    }

    .nf-val.no {
      color: var(--bad)
    }

    .nf-val.nd {
      color: var(--muted)
    }

    .nf-lbl {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      white-space: nowrap;
    }

    .nf-op {
      font-size: 20px;
      font-weight: 300;
      color: var(--border-2);
      align-self: center;
    }

    .nf-scenarios {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .nf-scenario {
      padding: 11px 13px;
      border-radius: var(--r2);
      border: 1px solid var(--border);
      background: var(--surface-2);
      transition: all .2s;
    }

    .nf-scenario-active {
      border-color: var(--good-b) !important;
      background: var(--good-s) !important;
    }

    .nf-scenario-muted {
      opacity: .5;
    }

    .nf-scen-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .nf-scen-val {
      font: 800 22px/1 var(--font);
      letter-spacing: -.04em;
      font-variant-numeric: tabular-nums;
    }

    .nf-scen-val.ok {
      color: var(--good)
    }

    .nf-scen-val.warn {
      color: var(--warn)
    }

    .nf-scen-val.no {
      color: var(--bad)
    }

    .nf-scen-val.nd {
      color: var(--muted)
    }

    .nf-scen-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .exam-sim-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }

    .exam-sim-row span {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .exam-sim-row input {
      width: 60px;
    }

    /* ─── EXEM BREAKDOWN ─── */
    .exem-breakdown {
      margin: 0 0 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .exem-breakdown {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .exem-rule-result {
      border-radius: var(--r2);
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface);
    }

    .exem-rule-result.ok {
      border-color: rgba(74, 222, 128, .25);
    }

    .exem-rule-result.no {
      border-color: rgba(248, 113, 113, .2);
    }

    .exem-rule-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .exem-rule-num {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
    }

    .exem-conds {
      display: flex;
      flex-direction: column;
    }

    .cond-notif {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-left: 3px solid var(--border-2);
      border-bottom: 1px solid var(--border);
      transition: background .2s;
    }

    .cond-notif:last-child {
      border-bottom: none;
    }

    .cond-notif.ok {
      border-left-color: var(--good);
      background: var(--good-s);
    }

    .cond-notif.no {
      border-left-color: var(--bad);
      background: var(--bad-s);
    }

    .cond-notif.pend {
      border-left-color: var(--border-2);
    }

    .cond-notif-icon {
      font-size: 13px;
      flex-shrink: 0;
      line-height: 1.4;
    }

    .cond-notif.ok .cond-notif-icon {
      color: var(--good);
    }

    .cond-notif.no .cond-notif-icon {
      color: var(--bad);
    }

    .cond-notif.pend .cond-notif-icon {
      color: var(--muted);
    }

    .cond-notif-body {
      flex: 1;
      min-width: 0;
    }

    .cond-notif-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .cond-notif-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .exem-legend {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.8;
      padding: 8px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
    }

    .or-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: .18em;
      color: var(--accent);
      background: var(--accent-s);
      border: 1px solid rgba(226, 232, 240, .14);
      border-radius: 999px;
      padding: 3px 10px;
      align-self: center;
    }

    /* ─── COLLAPSIBLE ─── */
    .coll .c-head {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      font: 600 12px/1 var(--font);
      color: var(--ink);
      text-align: left;
    }

    .c-sum {
      margin-left: 4px;
      font-size: 11.5px;
      color: var(--muted);
      font-weight: 400;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .c-chev {
      margin-left: auto;
      color: var(--muted);
      transition: transform .2s ease;
      flex-shrink: 0;
      font-size: 11px
    }

    .coll.open .c-chev {
      transform: rotate(180deg)
    }

    .coll.open .c-sum {
      display: none
    }

    .c-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .22s ease
    }

    .c-body>.c-in {
      overflow: hidden;
      min-height: 0
    }

    .coll.open .c-body {
      grid-template-rows: 1fr
    }

    .c-in {
      padding-top: 15px
    }

    /* ─── CALC BLOCK ─── */
    .calc-blk {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 13px;
      margin-bottom: 10px;
      transition: border-color .2s, background .2s;
    }

    .calc-blk.done {
      border-color: var(--good-b);
      background: var(--good-s);
    }

    .calc-blk.partial {
      border-color: var(--warn-b);
      background: var(--warn-s);
    }

    .calc-q {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 9px
    }

    .calc-res {
      margin-top: 9px
    }

    .exim-need-rule {
      margin-bottom: 10px;
    }

    .exim-need-rule:last-child {
      margin-bottom: 0;
    }

    .exim-need-hdr {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .exim-need-item {
      font-size: 12px;
      padding: 3px 0;
      display: flex;
      gap: 6px;
    }

    .exim-need-item.ok {
      color: var(--good);
    }

    .exim-need-item.no {
      color: var(--ink-2);
    }

    .calc-big {
      font-size: 30px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.04em
    }

    .calc-big.ok {
      color: var(--good)
    }

    .calc-big.warn {
      color: var(--warn)
    }

    .calc-big.no {
      color: var(--bad)
    }

    .inline-r {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap
    }

    .inline-r input {
      width: 75px
    }

    .il {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap
    }

    /* ─── EXEMPTION RULES EDITOR ─── */
    .rule-card {
      border: 1px solid var(--border);
      border-radius: var(--r2);
      overflow: hidden;
      margin-bottom: 8px;
    }

    .rule-card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .rule-num {
      font-size: 9.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .13em;
      color: var(--muted)
    }

    .rule-logic {
      font-size: 11px;
      color: var(--muted)
    }

    .rule-card-body {
      padding: 10px 12px;
      background: var(--surface-2)
    }

    .cond-item {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 5px 6px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .cond-item:last-child {
      border-bottom: none
    }

    /* fila 1 col 1 */
    .cond-item>.cond-fields {
      grid-column: 1;
      grid-row: 1;
      align-self: center;
    }

    /* fila 2 col 1 */
    .cond-item>.cond-status {
      grid-column: 1;
      grid-row: 2;
    }

    /* fila 1 col 2 — botón × */
    .cond-item>.btn {
      grid-column: 2;
      grid-row: 1;
      align-self: center;
    }

    .cond-fields {
      display: flex;
      gap: 5px;
      align-items: center;
      min-width: 0;
    }

    .cond-fields select {
      width: auto;
      flex-shrink: 0
    }

    .cond-fields input {
      width: 70px;
      flex-shrink: 0
    }

    .cond-fields .sub {
      min-width: 145px;
      flex-shrink: 0;
    }

    .cond-fields .op {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      padding: 0 2px;
    }

    .cond-status {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0
    }

    .or-sep-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 4px 0
    }

    /* ─── CAT PANEL ─── */
    .cat-panel {
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 11px;
      margin: 0 0 13px;
      background: var(--surface-2)
    }

    .cat-panel-t {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 9px
    }

    .cat-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px
    }

    .cat-row .cn {
      flex: 1;
      font-weight: 600;
      font-size: 13px
    }

    .cat-row .num-inp {
      width: 76px
    }

    .cat-row .cc {
      font-size: 11.5px;
      color: var(--muted);
      width: 54px;
      text-align: right
    }

    .relcell {
      display: flex;
      align-items: center;
      gap: 5px
    }

    .autow {
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 12.5px;
      display: block;
      text-align: center;
      white-space: nowrap
    }

    .rel-inp {
      width: 44px
    }

    /* ─── CUSTOM DIALOG ─── */
    .cat-dialog-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fdIn .15s ease;
    }

    @keyframes fdIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .cat-dialog-box {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      padding: 22px;
      width: 100%;
      max-width: 340px;
      animation: slideUp .18s cubic-bezier(.4, 0, .2, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(10px);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    .cat-dialog-ttl {
      font: 700 15px/1 var(--font);
      letter-spacing: -.02em;
      margin-bottom: 14px;
    }

    .cat-dialog-input-wrap {
      margin-bottom: 16px;
    }

    .cat-dialog-input-wrap label {
      display: block;
      font-size: 11.5px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600
    }

    .cat-dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-primary {
      background: transparent;
      border-color: transparent;
      color: var(--ink-2);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      transform: translateY(-1px) scale(1.015);
      box-shadow: 0 0 14px rgba(226, 232, 240, .14);
    }

    .btn-primary:active {
      transform: scale(.99);
      box-shadow: none;
    }

    .btn-danger-fill {
      background: transparent;
      border-color: transparent;
      color: var(--ink-2);
      font-weight: 600;
    }

    .btn-danger-fill:hover {
      background: var(--bad);
      border-color: var(--bad);
      color: #fff;
      transform: translateY(-1px) scale(1.015);
    }

    .btn-danger-fill:active {
      transform: scale(.99);
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center
    }

    .empty-mark {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      margin: 0 auto 20px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      display: grid;
      place-items: center;
      color: var(--accent)
    }

    .empty-state h3 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 7px
    }

    .empty-state p {
      color: var(--muted);
      max-width: 300px;
      margin: 0 auto 22px;
      line-height: 1.6;
      font-size: 13.5px
    }

    /* ─── MISC ─── */
    .hidden {
      display: none !important
    }

    .muted {
      color: var(--muted)
    }

    .small {
      font-size: 12px
    }

    .modehint {
      font-size: 12px;
      color: var(--muted);
      margin: -8px 0 13px
    }

    .sec-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin: 14px 0 8px;
      display: block
    }

    .fml {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 5px
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0
    }

    footer {
      text-align: center;
      padding: 14px 20px 32px;
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.6
    }

    /* ─── MOBILE BOTTOM NAV ─── */
    .mnav {
      display: none
    }

    .mnav-sheet-overlay {
      display: none
    }

        display: none
      }

      }

      .mnav-avatar img {

        border-radius: 50%;
      }

      /* Bottom sheet overlay */
      .mnav-sheet-overlay {

        position: fixed;
        inset: 0;

        pointer-events: none;
        transition: background .3s;
      }

      .mnav-sheet-overlay.open {
        background: rgba(0, 0, 0, .5);
        pointer-events: all;
      }

      .mnav-sheet {
        background: var(--surface);
        border-radius: clamp(18px, 4.5vw, 24px) clamp(18px, 4.5vw, 24px) 0 0;
        padding-bottom: calc(clamp(12px, 3vw, 20px) + env(safe-area-inset-bottom));

      }

      .mnav-sheet-overlay.open .mnav-sheet {
        transform: translateY(0);
      }

      .bs-handle {

      }

      /* Header del sheet con logo */
      .bs-header {
        display: flex;
        align-items: center;
        gap: clamp(8px, 2.5vw, 12px);

      }

        height: 28px;

      .bs-brand {
        font-size: clamp(14px, 4.2vw, 17px);
        font-weight: 800;

      }

      /* Lista de ramos en sheet */
      .bs-course-item {
        display: flex;
        align-items: center;
        gap: clamp(10px, 3vw, 14px);
        padding: clamp(13px, 3.8vw, 16px) clamp(16px, 5vw, 22px);

      }

      }

      transition: opacity .22s;
    }

    .ramos-popup-overlay.open {
      opacity: 1;
    }

    .ramos-popup-box {
      width: 100%;
      max-width: 360px;
      border-radius: 28px;
      background: rgba(24, 28, 44, 0.72);
      border: 1px solid rgba(255, 255, 255, .18);
      backdrop-filter: blur(48px) saturate(2.4);
      -webkit-backdrop-filter: blur(48px) saturate(2.4);
      box-shadow: 0 28px 90px rgba(0, 0, 0, .55), inset 0 1px 0 rgba(255, 255, 255, .25);
      overflow: hidden;
      transform: scale(.86);
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    .ramos-popup-overlay.open .ramos-popup-box {
      transform: scale(1)
    }

    [data-theme="light"] .ramos-popup-box {
      background: rgba(255, 255, 255, .8);
      border-color: rgba(255, 255, 255, .9);
      box-shadow: 0 28px 90px rgba(0, 0, 0, .18), inset 0 1px 0 rgba(255, 255, 255, 1);
    }

    .ramos-popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, .12);
    }

    [data-theme="light"] .ramos-popup-header {
      border-bottom-color: rgba(0, 0, 0, .08)
    }

    .ramos-popup-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.04em;
      color: rgba(255, 255, 255, .95);
    }

    [data-theme="light"] .ramos-popup-title {
      color: var(--ink)
    }

    .ramos-popup-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, .14);
      color: rgba(255, 255, 255, .75);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background .15s;
      padding: 0;
      flex-shrink: 0;
    }

    [data-theme="light"] .ramos-popup-close {
      background: rgba(0, 0, 0, .07);
      color: var(--ink-2)
    }

    .ramos-popup-close:hover {
      background: rgba(255, 255, 255, .24)
    }

    [data-theme="light"] .ramos-popup-close:hover {
      background: rgba(0, 0, 0, .13)
    }

    .ramos-popup-list {
      max-height: clamp(200px, 52vh, 420px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .ramos-popup-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: background .12s;
    }

    .ramos-popup-item:active {
      background: rgba(255, 255, 255, .07)
    }

    [data-theme="light"] .ramos-popup-item:active {
      background: rgba(0, 0, 0, .05)
    }

    .rp-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .rp-name {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: rgba(255, 255, 255, .92);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    [data-theme="light"] .rp-name {
      color: var(--ink)
    }

    .ramos-popup-item.rp-active .rp-name {
      color: #a5b4fc
    }

    [data-theme="light"] .ramos-popup-item.rp-active .rp-name {
      color: var(--accent)
    }

    .rp-grade {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, .55);
      flex-shrink: 0
    }

    [data-theme="light"] .rp-grade {
      color: var(--ink-2)
    }

    .ramos-popup-footer {
      border-top: 1px solid rgba(255, 255, 255, .1);
      padding: 4px 0 4px
    }

    [data-theme="light"] .ramos-popup-footer {
      border-top-color: rgba(0, 0, 0, .07)
    }

    .ramos-popup-add {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      font: 600 14px/1 var(--font);
      color: #a5b4fc;
      transition: background .12s;
    }

    [data-theme="light"] .ramos-popup-add {
      color: var(--accent)
    }

    .ramos-popup-add:active {
      background: rgba(255, 255, 255, .07)
    }

    [data-theme="light"] .ramos-popup-add:active {
      background: rgba(0, 0, 0, .05)
    }

    /* ─── BOTONES DE ACCESO RÁPIDO (config / eximición) — solo mobile ─── */
    .mobile-course-actions {
      display: none
    }

    @media (max-width: 600px) {
      .mobile-course-actions {
        display: flex !important;
        gap: 8px;
        padding: clamp(8px, 2.5vw, 12px) 0 0;
        flex-wrap: wrap;
      }

      .mca-btn {
        display: inline-flex;
        align-items: center;
        gap: clamp(4px, 1.5vw, 7px);
        padding: clamp(7px, 2vw, 10px) clamp(10px, 3vw, 14px);
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: clamp(9px, 2.5vw, 12px);
        font: 600 clamp(12px, 3.2vw, 13px)/1 var(--font);
        color: var(--ink-2);
        cursor: pointer;
        transition: background .15s, color .15s;
      }

      .mca-btn:active {
        background: var(--surface-2);
        color: var(--ink)
      }
    }

    /* ─── MOBILE SETTINGS/EXEM SHEET — estilos específicos ─── */
    .msh-section {
      padding: clamp(14px, 3.5vw, 18px) clamp(16px, 5vw, 22px);
      border-bottom: 1px solid var(--border);
    }

    .msh-section:last-child {
      border-bottom: none
    }

    .msh-label {
      font-size: clamp(11px, 3vw, 12px);
      font-weight: 600;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 10px;
      display: block;
    }

    .msh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .msh-row:last-child {
      margin-bottom: 0
    }

    .msh-row label {
      font-size: clamp(13px, 3.5vw, 14px);
      color: var(--ink);
      flex: 1
    }

    .msh-inp {
      width: clamp(70px, 20vw, 90px);
      height: 38px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--ink);
      font: 600 14px/1 var(--font);
      flex-shrink: 0;
    }

    .msh-select {
      flex-shrink: 0;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--ink);
      font: 14px var(--font);
      padding: 0 8px;
    }

    .msh-rule-card {
      background: var(--surface-2);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .msh-cond-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
    }

    .msh-cond-row:first-of-type {
      border-top: none;
      padding-top: 0
    }

    .or-badge {
      text-align: center;
      padding: 4px 0 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-2);
      letter-spacing: .06em;
    }

    /* ═══════════════════════════════════════════════════════
       REDISEÑO VISUAL MOBILE — solo ≤ 600 px
       Todo lo siguiente aplica SOLO a mobile.
       El desktop no se toca.
    ═══════════════════════════════════════════════════════ */
    @media (max-width: 600px) {

      /* El saludo ahora va en el topbar — ocultar el welcome duplicado */
      .mobile-welcome {
        display: none !important;
      }

      /* ── Colores más profundos en dark mode ── */
      :root {
        --bg: #0d0f1c;
        --bg-2: #111422;
        --surface: #14172a;
        --surface-2: #1a1d2e;
        --border: rgba(255, 255, 255, .07);
        --border-2: rgba(255, 255, 255, .13);
      }

      /* ── Topbar: ocultar elementos desktop, mostrar mobile ── */
      .topbar .brand,
      .topbar .topbar-gap,
      .topbar .topbar-right > :not(#btnTheme) {
        display: none !important;
      }
      .topbar .m-hdr-left  { order: 1; }
      .topbar .m-hdr-right { order: 2; }
      .topbar .topbar-right { order: 3; margin-left: 8px; }

      .topbar {
        height: auto;
        padding: clamp(10px, 3vw, 14px) clamp(14px, 4.5vw, 20px);
        min-height: 56px;
      }

      .m-hdr-left {
        display: flex;
        align-items: center;
        gap: clamp(9px, 2.5vw, 12px);
        flex: 1;
        min-width: 0;
      }

      .m-hdr-right {
        display: flex;
        align-items: center;
        flex-shrink: 0;
        margin-left: 12px;
      }

      .m-hdr-avatar {
        width: clamp(34px, 9vw, 40px);
        height: clamp(34px, 9vw, 40px);
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #fff;
      }

      .m-hdr-text {
        min-width: 0;
      }

      .m-hdr-greeting {
        font-size: clamp(15px, 4.2vw, 18px);
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -.025em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .m-hdr-sub {
        font-size: clamp(11px, 2.8vw, 12px);
        color: var(--muted);
        margin-top: 1px;
      }

      .m-hdr-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: clamp(11px, 2.8vw, 12px);
        font-weight: 700;
        padding: 6px clamp(10px, 3vw, 14px);
        border-radius: 20px;
        letter-spacing: .01em;
        white-space: nowrap;
        transition: background .3s, color .3s;
      }

      .m-hdr-badge.ok {
        background: rgba(74, 222, 128, .15);
        color: var(--good);
      }

      .m-hdr-badge.saving {
        background: rgba(255, 255, 255, .09);
        color: var(--muted);
      }

      .m-hdr-badge.offline {
        background: rgba(251, 146, 60, .12);
        color: var(--warn);
      }

      .m-hdr-badge.local {
        background: rgba(255, 255, 255, .06);
        color: var(--muted);
      }

      /* ── Nav: pill activo con etiqueta ── */
      .mnav-label {
        display: none;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: -.01em;
        line-height: 1;
      }

      .mnav-btn.active .mnav-label {
        display: inline;
      }

      .mnav-btn {
        flex: 0 0 auto;
        width: 50px;
        transition: background .2s, width .2s cubic-bezier(.4, 0, .2, 1);
      }

      .mnav-btn.active {
        flex: 0 0 auto;
        min-width: 96px;
        gap: 5px;
        background: #5b52f5 !important;
        color: #fff !important;
      }

      [data-theme="light"] .mnav-btn.active {
        background: #6366f1 !important;
        color: #fff !important;
      }

      /* ── Grade Hero (NP card) — gradiente con color del ramo ── */
      .grade-hero {
        border-radius: clamp(18px, 5vw, 24px);
        padding: clamp(16px, 4.5vw, 22px);
        margin-bottom: clamp(14px, 4vw, 20px);
        background: linear-gradient(135deg,
            color-mix(in srgb, var(--tc, #6366f1) 22%, transparent) 0%,
            transparent 100%) !important;
        border-color: color-mix(in srgb, var(--tc, #6366f1) 25%, transparent) !important;
        box-shadow: none !important;
        position: relative;
        overflow: hidden;
      }

      /* Burbuja decorativa — igual al diseño Figma */
      .grade-hero::before {
        content: '';
        position: absolute;
        right: -20px;
        top: -20px;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--tc, #6366f1) 10%, transparent);
        pointer-events: none;
      }

      .gh-header {
        display: flex;
        margin-bottom: clamp(8px, 2.5vw, 12px);
      }

      .gh-label {
        font-size: clamp(10px, 2.6vw, 11px);
        letter-spacing: .10em;
        color: rgba(200, 200, 230, 0.55);
      }

      .gh-top {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        margin-bottom: 12px;
      }

      .gh-grade {
        font-size: clamp(44px, 13vw, 56px);
        text-shadow: none !important;
      }

      .gh-grade-info {
        padding-bottom: 0;
      }

      .gh-sub {
        color: rgba(200, 200, 230, 0.5);
        font-size: clamp(11px, 3vw, 12px);
      }

      /* Progress bar: usa el color del ramo en el frente, bg muy sutil */
      .gh-bar-track {
        background: rgba(255, 255, 255, 0.08) !important;
        box-shadow: none !important;
        height: 6px;
      }

      /* El "cover" (parte no evaluada) ahora es transparente;
         el color activo viene de un pseudo-elemento posicionado antes del cover */
      .gh-bar-track::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(90deg, var(--tc, #6366f1), var(--good));
        border-radius: 4px;
        z-index: 0;
      }

      .gh-bar-cover {
        background: rgba(13, 13, 26, 0.85) !important;
        z-index: 1;
        position: absolute;
        border-radius: 0 4px 4px 0;
      }

      [data-theme="light"] .gh-bar-cover {
        background: rgba(248, 250, 252, 0.85) !important;
      }

      .gh-bar-footer {
        margin-top: 6px;
      }

      .gh-bar-scale,
      .gh-meta {
        color: rgba(200, 200, 230, 0.35);
        font-size: 10px;
      }

      .gh-grade-info::before {
        display: none;
      }

      .gh-exem-badge {
        display: inline-flex;
      }

      /* ── Eval items como cards ──
         flex-wrap en <tr>: row1 = nombre (100%), row2 = cat|peso|nota|del
         (flex-wrap es más fiable que grid en <tr> de tabla en Chrome/Safari)
      */
      table:has(#evBody) { display: none !important; }
      #mobileEvList { display: block; }

      #evBody tr {
        display: flex !important;
        flex-wrap: wrap;
        align-items: center;
        column-gap: clamp(6px, 2vw, 10px);
        row-gap: 0;
        background: var(--surface);
        border-radius: 14px;
        padding: clamp(12px, 3.5vw, 14px);
        border: 1px solid var(--border);
      }

      /* Resetear todos los td para participar en flex */
      #evBody tr > td {
        display: flex !important;
        align-items: center;
        border: none !important;
        padding: 0 !important;
        background: transparent !important;
        width: auto !important;
      }

      /* td1: grip → oculto */
      #evBody tr td.ev-grip { display: none !important; }

      /* td2: nombre → 100% ancho, fuerza salto a la siguiente "fila" */
      #evBody tr td.ev-name {
        flex: 0 0 100% !important;
        order: 0;
        padding-bottom: clamp(6px, 1.8vw, 8px) !important;
        border-bottom: 1px solid var(--border) !important;
        margin-bottom: clamp(6px, 1.8vw, 8px);
      }

      #evBody tr td.ev-name input {
        background: transparent;
        border: none;
        font-size: clamp(14px, 3.8vw, 16px);
        font-weight: 700;
        color: var(--ink);
        padding: 0;
        height: auto;
        width: 100%;
        outline: none;
      }

      #evBody tr td.ev-name input::placeholder { color: var(--muted); }

      /* td3: categoría → fila2, crece para ocupar el espacio */
      #evBody tr td:nth-child(3) {
        order: 1;
        flex: 1 1 auto;
        min-width: 0;
      }

      #evBody tr td:nth-child(3) select {
        appearance: none;
        -webkit-appearance: none;
        background: color-mix(in srgb, var(--tc, #6366f1) 18%, transparent);
        color: color-mix(in srgb, var(--tc, #6366f1) 100%, #fff 20%);
        border: none;
        padding: 3px 10px 3px 8px;
        border-radius: 20px;
        font-size: clamp(11px, 3vw, 12px);
        font-weight: 700;
        cursor: pointer;
        max-width: 140px;
        height: auto;
        outline: none;
      }

      [data-theme="light"] #evBody tr td:nth-child(3) select {
        background: color-mix(in srgb, var(--tc, #6366f1) 13%, transparent);
        color: var(--tc, #6366f1);
      }

      /* td4: peso → fila2, junto a categoría, aspecto de texto */
      #evBody tr td:nth-child(4) {
        order: 2;
        flex: 0 0 auto;
        width: auto !important;
      }

      #evBody tr td:nth-child(4) .autow {
        font-size: clamp(11px, 3vw, 12px);
        color: var(--muted);
        font-weight: 600;
      }

      #evBody tr td:nth-child(4) input.num-inp {
        appearance: textfield !important;
        -moz-appearance: textfield !important;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        font-size: clamp(11px, 3vw, 12px) !important;
        font-weight: 600 !important;
        color: var(--muted) !important;
        width: clamp(28px, 8vw, 36px) !important;
        height: auto !important;
        padding: 0 !important;
        text-align: left !important;
        outline: none;
      }

      /* td5: nota → fila2, empujada a la derecha */
      #evBody tr td.ev-nota {
        order: 3;
        flex: 0 0 auto;
        margin-left: auto;
        justify-content: flex-end;
      }

      #evBody tr td.ev-nota input.num-inp {
        appearance: textfield;
        -moz-appearance: textfield;
        background: transparent;
        border: none;
        font-size: clamp(26px, 7.5vw, 32px);
        font-weight: 800;
        letter-spacing: -.04em;
        width: clamp(58px, 16vw, 70px);
        height: auto;
        padding: 0;
        text-align: right;
        color: var(--ink-2);
        outline: none;
        font-variant-numeric: tabular-nums;
      }

      #evBody tr td.ev-nota input.num-inp:focus { color: var(--ink); }

      #evBody tr td.ev-nota input.num-inp.g-ok   { color: var(--good) !important; background: transparent !important; border-color: transparent !important; box-shadow: none !important; }
      #evBody tr td.ev-nota input.num-inp.g-warn  { color: var(--warn) !important; background: transparent !important; border-color: transparent !important; box-shadow: none !important; }
      #evBody tr td.ev-nota input.num-inp.g-no    { color: var(--bad)  !important; background: transparent !important; border-color: transparent !important; box-shadow: none !important; }

      /* td6: eliminar → fila2, esquina derecha */
      #evBody tr td:nth-child(6) {
        order: 4;
        flex: 0 0 28px;
        width: 28px !important;
        justify-content: center;
      }

      #evBody tr td:nth-child(6) button {
        width: 24px;
        height: 24px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: .4;
      }

      #evBody tr:active { background: var(--surface-2); }

      #evBody td { border-bottom: none !important; }

      table thead { display: none !important; }

      table tfoot tr,
      table tfoot td { display: block; border: none; padding: 0; background: transparent; }

      /* ── Botón agregar evaluación ── */
      #addEv {
        width: 100%;
        margin-top: 8px;
        padding: clamp(12px, 3.5vw, 15px);
        border: 1.5px dashed var(--border-2);
        border-radius: 14px;
        background: transparent;
        color: var(--muted);
        font-size: clamp(13px, 3.5vw, 14px);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        cursor: pointer;
        transition: border-color .2s, color .2s;
      }

      #addEv:active {
        border-color: var(--tc, #6366f1);
        color: var(--tc, #6366f1);
      }

      /* Nota vacía → pill redondeado (no input en blanco) */
      #evBody tr td.ev-nota input.num-inp:placeholder-shown {
        font-size: clamp(12px, 3.2vw, 13px) !important;
        font-weight: 500 !important;
        width: auto !important;
        min-width: 36px !important;
        background: rgba(255, 255, 255, 0.06) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        border-radius: 20px !important;
        padding: 5px 12px !important;
        color: rgba(200, 200, 230, 0.35) !important;
        text-align: center !important;
        letter-spacing: 0 !important;
        appearance: none;
      }

      /* ── Título de página en mobile ── */
      .m-page-title {
        display: none;
      }

      body[data-mnav="ramos"] .m-page-title,
      body[data-mnav="resumen"] .m-page-title {
        display: block;
        padding: clamp(14px, 4vw, 18px) clamp(16px, 4.5vw, 20px) clamp(8px, 2vw, 10px);
        font-size: clamp(22px, 6.5vw, 26px);
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -.035em;
        line-height: 1;
      }

      /* ── Banner: oculto en mobile (la info la da el badge en el NP card) ── */
      .banner {
        display: none;
      }

      /* ── Block y block-title en mobile ── */
      .block {
        border: none;
        background: transparent;
        padding: 0;
        margin-bottom: clamp(20px, 5vw, 28px);
      }

      .block-title {
        font-size: clamp(10px, 2.8vw, 11px);
        letter-spacing: .09em;
        margin-bottom: clamp(10px, 3vw, 14px);
        padding: 0;
      }

      /* ── Nota final (fórmula) ── */
      .nf-formula {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 16px;
