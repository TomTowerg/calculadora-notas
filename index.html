<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradiant</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Gradiant">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap"
    rel="stylesheet">
  <style>
    /* ─── TOKENS ─── */
    :root {
      color-scheme: dark;
      --bg: #161920;
      --bg-2: #1c1f28;
      --surface: #20243a;
      --surface-2: #262a3e;
      --border: #333858;
      --border-2: #3e4368;
      --ink: #f0f4f8;
      --ink-2: #9aa8bc;
      --muted: #7282a0;
      --accent: #e2e8f0;
      --accent-d: #b8c4d4;
      --accent-s: rgba(226, 232, 240, .09);
      --good: #4ade80;
      --good-s: rgba(74, 222, 128, .18);
      --good-b: rgba(74, 222, 128, .34);
      --bad: #f87171;
      --bad-s: rgba(248, 113, 113, .18);
      --bad-b: rgba(248, 113, 113, .34);
      --warn: #fb923c;
      --warn-s: rgba(251, 146, 60, .18);
      --warn-b: rgba(251, 146, 60, .34);
      --r: 13px;
      --r2: 9px;
      --font: "Inter", "Segoe UI", system-ui, sans-serif;
      --t: .16s ease;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f8fafc;
      --bg-2: #f1f5f9;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --border-2: #cbd5e1;
      --ink: #0f172a;
      --ink-2: #334155;
      --muted: #64748b;
      --accent: #334155;
      --accent-d: #1e293b;
      --accent-s: rgba(51, 65, 85, .09);
      --good: #16a34a;
      --good-s: #f0fdf4;
      --good-b: #bbf7d0;
      --bad: #dc2626;
      --bad-s: #fff1f2;
      --bad-b: #fecdd3;
      --warn: #d97706;
      --warn-s: #fffbeb;
      --warn-b: #fde68a;
    }

    /* ─── RESET ─── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      transition: background var(--t), color var(--t);
    }

    [data-theme="dark"] body {
      background:
        radial-gradient(ellipse 100% 50% at 50% -10%, rgba(226, 232, 240, .04) 0%, transparent 55%),
        var(--bg);
    }

    /* ─── TOPBAR ─── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 52px;
      background: rgba(10, 12, 16, .92);
      backdrop-filter: blur(16px) saturate(1.6);
      -webkit-backdrop-filter: blur(16px) saturate(1.6);
      border-bottom: 1px solid rgba(226, 232, 240, .08);
      box-shadow: 0 1px 0 rgba(226, 232, 240, .04), 0 4px 20px rgba(0, 0, 0, .5);
      padding: 0 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background var(--t), border-color var(--t);
    }

    [data-theme="light"] .topbar {
      background: rgba(255, 255, 255, .9);
      border-bottom-color: rgba(0, 0, 0, .12);
      box-shadow: 0 1px 0 rgba(0, 0, 0, .05), 0 2px 12px rgba(0, 0, 0, .08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }

    .brand-mark img {
      width: 34px;
      height: 34px;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(15, 22, 35, .4));
    }

    .brand-name {
      font-size: 15.5px;
      font-weight: 800;
      letter-spacing: -.045em;
      color: #0f1623;
      -webkit-text-fill-color: #0f1623;
    }

    [data-theme="dark"] .brand-name {
      color: #eef2ff;
      -webkit-text-fill-color: #eef2ff;
    }

    .topbar-gap {
      flex: 1
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Auth area ── */
    #authArea {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes auth-in {
      from { opacity: 0; transform: translateX(10px) scale(.93); }
      to   { opacity: 1; transform: none; }
    }

    .auth-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 3px 3px 3px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      animation: auth-in .3s cubic-bezier(.34,1.56,.64,1);
      transition: border-color .15s, background .15s;
    }

    .auth-chip:hover {
      border-color: var(--border-2);
    }

    .auth-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    .auth-initials {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .auth-chip-name {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 3px 0 1px;
    }

    .btn-signout {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--ink-2);
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, color .15s;
      padding: 0;
    }

    .btn-signout:hover {
      background: rgba(239, 68, 68, .12);
      color: #ef4444;
    }

    /* ── Google button ── */
    .gbtn {
      padding: 7px 14px 7px 10px;
      font-weight: 700;
      display: flex;
      position: relative;
      overflow: hidden;
      border-radius: 35px;
      align-items: center;
      border: 1.5px solid var(--border-2);
      background: #fff;
      outline: none;
      cursor: pointer;
      color: #222;
      animation: auth-in .3s cubic-bezier(.34,1.56,.64,1);
    }

    .gbtn-svg {
      height: 18px;
      margin-right: 8px;
      z-index: 6;
      flex-shrink: 0;
    }

    .gbtn-text {
      z-index: 10;
      font-size: 13px;
      white-space: nowrap;
    }

    .gbtn:hover .gbtn-text {
      animation: gbtn-text .3s forwards;
    }

    @keyframes gbtn-text {
      from {
        color: #222;
      }

      to {
        color: #fff;
      }
    }

    .gbtn:hover::before {
      content: "";
      display: block;
      position: absolute;
      top: 50%;
      left: 9%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      opacity: 0;
      border-radius: 300px;
      animation: gbtn-wave1 2.5s ease-in-out forwards;
    }

    .gbtn:hover::after {
      content: "";
      display: block;
      position: absolute;
      top: 50%;
      left: 9%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      opacity: 0;
      border-radius: 300px;
      animation: gbtn-wave2 2.5s ease-in-out forwards;
    }

    @keyframes gbtn-wave1 {
      0% {
        z-index: 1;
        background: #EB4335;
        width: 0;
        height: 0;
        opacity: 1;
      }

      1% {
        z-index: 1;
        background: #EB4335;
        width: 0;
        height: 0;
        opacity: 1;
      }

      25% {
        z-index: 1;
        background: #EB4335;
        width: 800px;
        height: 800px;
        opacity: 1;
      }

      26% {
        z-index: 3;
        background: #34A853;
        width: 0;
        height: 0;
        opacity: 1;
      }

      50% {
        z-index: 3;
        background: #34A853;
        width: 800px;
        height: 800px;
        opacity: 1;
      }

      100% {
        z-index: 3;
        background: #34A853;
        width: 800px;
        height: 800px;
        opacity: 1;
      }
    }

    @keyframes gbtn-wave2 {
      0% {
        z-index: 2;
        background: #FBBC05;
        width: 0;
        height: 0;
        opacity: 1;
      }

      11% {
        z-index: 2;
        background: #FBBC05;
        width: 0;
        height: 0;
        opacity: 1;
      }

      35% {
        z-index: 2;
        background: #FBBC05;
        width: 800px;
        height: 800px;
        opacity: 1;
      }

      40% {
        z-index: 4;
        background: #4285F4;
        width: 0;
        height: 0;
        opacity: 1;
      }

      64% {
        z-index: 4;
        background: #4285F4;
        width: 800px;
        height: 800px;
        opacity: 1;
      }

      100% {
        z-index: 4;
        background: #4285F4;
        width: 800px;
        height: 800px;
        opacity: 1;
      }
    }

    .gbtn:hover .g-red {
      animation: gbtn-hide .1s .10s forwards;
    }

    .gbtn:hover .g-yellow {
      animation: gbtn-hide .1s .30s forwards;
    }

    .gbtn:hover .g-green {
      animation: gbtn-hide .1s .70s forwards;
    }

    .gbtn:hover .g-blue {
      animation: gbtn-hide .1s 1.1s forwards;
    }

    @keyframes gbtn-hide {
      to {
        filter: brightness(100);
      }
    }

    /* ── Sync status chip ── */
    #syncStatus {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      padding: 4px 10px;
      border-radius: 20px;
      transition: opacity .4s, background .3s, color .3s;
      animation: sync-in .25s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes sync-in {
      from {
        opacity: 0;
        transform: translateX(6px) scale(.95);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sync-local {
      color: var(--muted);
      background: transparent;
    }

    .sync-local .sync-dot {
      background: var(--muted);
      opacity: .5;
    }

    .sync-saving {
      color: var(--warn);
      background: var(--warn-s);
    }

    .sync-saving .sync-dot {
      background: var(--warn);
      animation: sync-pulse 1s ease-in-out infinite;
    }

    .sync-ok {
      color: var(--good);
      background: var(--good-s);
    }

    .sync-ok .sync-dot {
      background: var(--good);
    }

    .sync-offline {
      color: var(--bad);
      background: var(--bad-s);
    }

    .sync-offline .sync-dot {
      background: var(--bad);
    }

    @keyframes sync-pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .4;
        transform: scale(.7);
      }
    }

    /* ─── TABS ─── */
    .tabs-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 22px;
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      scrollbar-width: none;
      min-height: 42px;
      transition: background var(--t), border-color var(--t);
    }

    .tabs-bar::-webkit-scrollbar {
      display: none
    }

    .tab-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 15px;
      border: none;
      background: transparent;
      color: var(--muted);
      font: 500 12.5px/1 var(--font);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color var(--t), border-color var(--t);
    }

    .tab-btn:hover {
      color: var(--ink-2)
    }

    .tab-btn.active {
      color: var(--tc, var(--accent));
      border-bottom-color: var(--tc, var(--accent));
      font-weight: 600;
      text-shadow: 0 0 16px rgba(226, 232, 240, .3);
    }

    [data-theme="light"] .tab-btn.active {
      text-shadow: none;
    }

    .tab-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--tc, var(--muted));
      flex-shrink: 0;
      opacity: .5;
      transition: opacity var(--t), transform var(--t);
      cursor: pointer;
    }

    .tab-btn.active .tab-dot {
      opacity: 1;
    }

    .tab-dot:hover {
      transform: scale(1.5);
      opacity: 1 !important;
    }

    #colorPickerInput {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .tab-grade {
      font-size: 10.5px;
      font-weight: 700;
      padding: 1.5px 6px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      transition: all var(--t);
    }

    .tab-btn.active .tab-grade {
      background: var(--accent-s);
      color: var(--accent);
    }

    .tab-grade.ok {
      background: var(--good-s) !important;
      color: var(--good) !important
    }

    .tab-grade.warn {
      background: var(--warn-s) !important;
      color: var(--warn) !important
    }

    .tab-grade.no {
      background: var(--bad-s) !important;
      color: var(--bad) !important
    }

    .tab-x {
      opacity: 0;
      width: 14px;
      height: 14px;
      border-radius: 4px;
      display: grid;
      place-items: center;
      transition: opacity .12s, background .12s;
      color: var(--muted);
      flex-shrink: 0;
    }

    .tab-btn:hover .tab-x {
      opacity: 1
    }

    .tab-x:hover {
      background: var(--bad-s) !important;
      color: var(--bad) !important
    }

    .tab-add {
      flex-shrink: 0;
      align-self: center;
      margin: 0 0 0 6px;
      border: 1px dashed var(--border-2);
      background: transparent;
      color: var(--muted);
      font: 500 12px/1 var(--font);
      padding: 5px 10px;
      border-radius: var(--r2);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all var(--t);
    }

    .tab-add:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-s)
    }

    /* ─── MAIN ─── */
    .main {
      padding: 26px 20px 80px;
      max-width: 1240px;
      margin: 0 auto;
      width: 100%
    }

    /* ─── BUTTONS ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: var(--r2);
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-2);
      font: 500 12.5px/1 var(--font);
      cursor: pointer;
      transition: all var(--t);
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px) scale(1.015);
      box-shadow: 0 0 14px rgba(226, 232, 240, .14);
    }

    .btn:active {
      transform: scale(.99);
      box-shadow: none;
    }

    .btn-ghost {
      background: transparent;
      border-color: transparent
    }

    .btn-ghost:hover {
      background: var(--surface-2);
      border-color: var(--border)
    }

    .btn-sm {
      padding: 4px 9px;
      font-size: 12px;
      border-radius: 7px
    }

    .btn-danger:hover {
      border-color: var(--bad) !important;
      color: var(--bad) !important
    }

    @keyframes theme-flip {
      0% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }

      45% {
        transform: scale(0.65) rotate(80deg);
        opacity: 0;
      }

      55% {
        transform: scale(0.65) rotate(100deg);
        opacity: 0;
      }

      100% {
        transform: scale(1) rotate(180deg);
        opacity: 1;
      }
    }

    .icon-btn.flipping {
      animation: theme-flip .45s cubic-bezier(.4, 0, .2, 1) forwards;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted);
      transition: all var(--t);
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(226, 232, 240, .16);
      transform: scale(1.08);
    }

    /* ─── COURSE HEADER ─── */
    .course-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .course-name-input {
      font: 800 26px/1.1 var(--font);
      letter-spacing: -.05em;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      outline: none;
      padding: 0 0 2px;
      flex: 1;
      min-width: 180px;
      transition: border-color var(--t);
    }

    .course-name-input::placeholder {
      color: var(--muted);
    }

    .course-name-input:focus {
      border-bottom-color: var(--accent)
    }

    /* ─── CONTENT GRID ─── */
    .content-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 0 20px;
      align-items: start
    }

    /* ─── SECTION BLOCKS ─── */
    @keyframes blockIn {
      from {
        opacity: 0;
        transform: translateY(7px);
        filter: blur(2px);
      }

      to {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }

    .block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 20px;
      margin-bottom: 14px;
      transition: background var(--t), border-color var(--t);
      animation: blockIn .3s cubic-bezier(.4, 0, .2, 1) both;
      box-shadow: inset 0 1px 0 rgba(226, 232, 240, .06);
    }

    [data-theme="light"] .block {
      box-shadow: inset 0 1px 0 rgba(5, 150, 105, .05);
    }

    .col-left>.block {
      animation-delay: 0ms;
    }

    .col-left>div>.block {
      animation-delay: 55ms;
    }

    .col-right>.block:nth-child(1) {
      animation-delay: 80ms;
    }

    .col-right>.block:nth-child(2) {
      animation-delay: 115ms;
    }

    .col-right>div>.block {
      animation-delay: 150ms;
    }

    .block-title {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 16px;
    }

    .block-title-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: var(--accent-s);
      display: grid;
      place-items: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .c-icon {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: var(--accent-s);
      display: grid;
      place-items: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .block-title .hint {
      margin-left: auto;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 11.5px;
      color: var(--muted);
    }

    .ev-empty-hint {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      white-space: nowrap;
      opacity: .7;
    }

    /* ─── FORM ─── */
    input,
    select {
      font: inherit;
      font-size: 13px;
      border: 1px solid var(--border-2);
      border-radius: var(--r2);
      padding: 6px 9px;
      background: var(--surface-2);
      color: var(--ink);
      width: 100%;
      transition: border-color var(--t), box-shadow var(--t);
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-s);
    }

    select {
      cursor: pointer;
      appearance: auto;
      -webkit-appearance: auto
    }

    input[type="checkbox"] {
      width: auto;
      appearance: auto;
      -webkit-appearance: auto
    }

    input[type="checkbox"].cb-circle {
      appearance: none;
      -webkit-appearance: none;
      display: inline-block;
      width: 18px;
      height: 18px;
      min-width: 18px;
      min-height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid var(--border-2);
      background: var(--surface);
      cursor: pointer;
      position: relative;
      transition: all .15s ease;
      vertical-align: middle;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    input[type="checkbox"].cb-circle:hover {
      border-color: var(--good);
    }

    input[type="checkbox"].cb-circle:checked {
      background: var(--good);
      border-color: var(--good);
    }

    input[type="checkbox"].cb-circle::after {
      content: '';
      display: none;
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    input[type="checkbox"].cb-circle:checked::after {
      display: block;
    }

    input.g-ok {
      color: var(--good);
      font-weight: 700
    }

    input.g-warn {
      color: var(--warn);
      font-weight: 700
    }

    input.g-no {
      color: var(--bad);
      font-weight: 700
    }

    input.g-inv {
      border-color: var(--warn);
      color: var(--warn)
    }

    /* ─── TABLE ─── */
    table {
      width: 100%;
      border-collapse: collapse
    }

    th {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      text-align: left;
      padding: 0 4px 10px;
      white-space: nowrap;
    }

    td {
      padding: 5px 4px;
      vertical-align: middle
    }

    td:first-child {
      padding-left: 0
    }

    td:last-child {
      padding-right: 0
    }

    /* Columnas fijas: categoría, peso, nota, borrar no se estiran */
    #evBody td:nth-child(3),
    thead tr th:nth-child(3) {
      width: 130px;
    }

    #evBody td:nth-child(4),
    thead tr th:nth-child(4) {
      width: 76px;
    }

    .ev-nota {
      width: 76px;
      padding-left: 20px !important;
    }

    #evBody td:last-child,
    thead tr th:last-child {
      width: 32px;
    }

    tfoot td {
      padding-top: 12px;
      border-top: 1px solid var(--border)
    }

    .num-inp {
      width: 62px;
      text-align: center
    }

    .ev-name input {
      min-width: 96px
    }

    #evBody td {
      border-bottom: 1px solid var(--border);
      transition: background var(--t), box-shadow var(--t);
    }

    #evBody tr:last-child td {
      border-bottom: none;
    }

    #evBody tr:hover td {
      background: color-mix(in srgb, var(--tc, #6366f1) 8%, transparent);
    }

    #evBody tr:hover td.ev-grip {
      box-shadow: inset 3px 0 0 var(--tc, #6366f1);
    }

    #evBody tr.dragging {
      opacity: .35;
    }

    #evBody tr.drag-over td {
      background: var(--accent-s);
      box-shadow: inset 0 -2px 0 var(--accent);
    }

    .ev-grip {
      width: 22px;
      cursor: grab;
      color: var(--border-2);
      text-align: center;
      padding-right: 2px !important;
      transition: color var(--t);
    }

    #evBody tr:hover .ev-grip {
      color: var(--tc, #6366f1);
    }

    #evBody [data-del] {
      opacity: 0;
      transition: opacity var(--t);
    }

    #evBody tr:hover [data-del] {
      opacity: 1;
    }

    /* Grade input colored backgrounds */
    #evBody .g-ok {
      background: var(--good-s);
      border-color: var(--good-b);
      font-weight: 700;
    }

    #evBody .g-warn {
      background: var(--warn-s);
      border-color: var(--warn-b);
      font-weight: 700;
    }

    #evBody .g-no {
      background: var(--bad-s);
      border-color: var(--bad-b);
      font-weight: 700;
    }

    /* ─── SEG CONTROL ─── */
    .seg {
      display: inline-flex;
      border: 1px solid var(--border-2);
      border-radius: var(--r2);
      overflow: hidden;
      margin-bottom: 14px;
      background: var(--surface);
    }

    .seg-btn {
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      padding: 6px 14px;
      font: 600 12px/1 var(--font);
      cursor: pointer;
      transition: all var(--t);
    }

    .seg-btn:not(:last-child) {
      border-right: 1px solid var(--border-2);
    }

    .seg-btn:hover {
      background: var(--surface-2);
      color: var(--ink);
    }

    .seg-btn.on {
      background: var(--tc, #6366f1);
      color: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .15), 0 1px 4px color-mix(in srgb, var(--tc, #6366f1) 40%, transparent);
    }

    /* ─── CHIPS ─── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid transparent;
      line-height: 1.5;
      white-space: nowrap;
      transition: all .15s ease;
    }

    .chip.ok {
      background: var(--good-s);
      color: var(--good);
      border-color: var(--good-b);
      box-shadow: 0 0 8px rgba(74, 222, 128, .12);
    }

    .chip.no {
      background: var(--bad-s);
      color: var(--bad);
      border-color: var(--bad-b);
      box-shadow: 0 0 8px rgba(248, 113, 113, .12);
    }

    .chip.warn {
      background: var(--warn-s);
      color: var(--warn);
      border-color: var(--warn-b);
    }

    .chip.neu {
      background: var(--surface-2);
      color: var(--muted);
      border-color: var(--border)
    }

    [data-theme="light"] .chip.ok {
      box-shadow: none;
    }

    [data-theme="light"] .chip.no {
      box-shadow: none;
    }

    /* ─── STATUS DOT ─── */
    .status-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid transparent;
      transition: all .15s ease;
    }

    .status-dot.ok {
      background: var(--good-s);
      color: var(--good);
      border-color: var(--good-b);
    }

    .status-dot.no {
      background: var(--bad-s);
      color: var(--bad);
      border-color: var(--bad-b);
    }

    .status-dot.pend {
      background: var(--surface-2);
      color: var(--muted);
      border-color: var(--border-2);
      font-size: 14px;
      line-height: 1;
    }

    /* ─── GRADE HERO ─── */
    .grade-hero {
      margin-bottom: 20px;
      padding: 18px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: box-shadow .4s ease;
    }

    .grade-hero[data-gc="ok"] {
      box-shadow: inset 0 1px 0 rgba(74, 222, 128, .1), 0 0 0 1px rgba(74, 222, 128, .08);
    }

    .grade-hero[data-gc="warn"] {
      box-shadow: inset 0 1px 0 rgba(251, 146, 60, .1), 0 0 0 1px rgba(251, 146, 60, .08);
    }

    .grade-hero[data-gc="no"] {
      box-shadow: inset 0 1px 0 rgba(248, 113, 113, .1), 0 0 0 1px rgba(248, 113, 113, .08);
    }

    .gh-top {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 14px;
    }

    .gh-grade {
      font: 800 54px/1 var(--font);
      letter-spacing: -.05em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: color .4s ease;
    }

    .gh-grade.ok {
      color: var(--good);
      text-shadow: 0 0 28px rgba(74, 222, 128, .35);
    }

    .gh-grade.warn {
      color: var(--warn);
      text-shadow: 0 0 28px rgba(251, 146, 60, .35);
    }

    .gh-grade.no {
      color: var(--bad);
      text-shadow: 0 0 28px rgba(248, 113, 113, .35);
    }

    .gh-grade.nd {
      color: var(--border-2);
      text-shadow: none;
    }

    [data-theme="light"] .gh-grade.ok {
      text-shadow: none;
    }

    [data-theme="light"] .gh-grade.warn {
      text-shadow: none;
    }

    [data-theme="light"] .gh-grade.no {
      text-shadow: none;
    }

    .gh-grade-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding-bottom: 5px;
    }

    .gh-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted)
    }

    .gh-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .gh-bar-track {
      position: relative;
      height: 7px;
      border-radius: 4px;
      overflow: hidden;
      background: linear-gradient(90deg, var(--bad) 0%, var(--warn) 48%, var(--good) 100%);
      transition: box-shadow .5s ease;
    }

    .grade-hero[data-gc="ok"] .gh-bar-track {
      box-shadow: 0 0 10px rgba(74, 222, 128, .25);
    }

    .grade-hero[data-gc="warn"] .gh-bar-track {
      box-shadow: 0 0 10px rgba(251, 146, 60, .25);
    }

    .grade-hero[data-gc="no"] .gh-bar-track {
      box-shadow: 0 0 10px rgba(248, 113, 113, .25);
    }

    .gh-bar-cover {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      background: var(--surface);
      border-radius: 0 4px 4px 0;
      transition: width .75s cubic-bezier(.4, 0, .2, 1);
    }

    [data-theme="light"] .gh-bar-cover {
      background: var(--bg-2);
    }

    .gh-bar-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 7px;
    }

    .gh-bar-scale {
      font-size: 10px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .gh-meta {
      font-size: 11.5px;
      color: var(--muted)
    }

    /* ─── BANNER ─── */
    .banner {
      border-radius: var(--r2);
      padding: 10px 14px;
      font: 600 13px/1.4 var(--font);
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      border: 1px solid transparent;
    }

    .banner.ok {
      background: var(--good-s);
      color: var(--good);
      border-color: var(--good-b)
    }

    .banner.no {
      background: var(--bad-s);
      color: var(--bad);
      border-color: var(--bad-b)
    }

    .banner.warn {
      background: var(--warn-s);
      color: var(--warn);
      border-color: var(--warn-b)
    }

    .banner.neu {
      background: var(--surface-2);
      color: var(--muted);
      border-color: var(--border)
    }

    /* ─── NOTA FINAL ─── */
    .nf-formula {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px;
      border-radius: var(--r2);
      background: var(--surface-2);
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .nf-term {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .nf-val {
      font: 800 24px/1 var(--font);
      letter-spacing: -.04em;
      font-variant-numeric: tabular-nums;
    }

    .nf-val.ok {
      color: var(--good)
    }

    .nf-val.warn {
      color: var(--warn)
    }

    .nf-val.no {
      color: var(--bad)
    }

    .nf-val.nd {
      color: var(--muted)
    }

    .nf-lbl {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      white-space: nowrap;
    }

    .nf-op {
      font-size: 20px;
      font-weight: 300;
      color: var(--border-2);
      align-self: center;
    }

    .nf-scenarios {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .nf-scenario {
      padding: 11px 13px;
      border-radius: var(--r2);
      border: 1px solid var(--border);
      background: var(--surface-2);
      transition: all .2s;
    }

    .nf-scenario-active {
      border-color: var(--good-b) !important;
      background: var(--good-s) !important;
    }

    .nf-scenario-muted {
      opacity: .5;
    }

    .nf-scen-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .nf-scen-val {
      font: 800 22px/1 var(--font);
      letter-spacing: -.04em;
      font-variant-numeric: tabular-nums;
    }

    .nf-scen-val.ok {
      color: var(--good)
    }

    .nf-scen-val.warn {
      color: var(--warn)
    }

    .nf-scen-val.no {
      color: var(--bad)
    }

    .nf-scen-val.nd {
      color: var(--muted)
    }

    .nf-scen-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .exam-sim-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }

    .exam-sim-row span {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .exam-sim-row input {
      width: 60px;
    }

    /* ─── EXEM BREAKDOWN ─── */
    .exem-breakdown {
      margin: 0 0 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .exem-breakdown {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .exem-rule-result {
      border-radius: var(--r2);
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface);
    }

    .exem-rule-result.ok {
      border-color: rgba(74, 222, 128, .25);
    }

    .exem-rule-result.no {
      border-color: rgba(248, 113, 113, .2);
    }

    .exem-rule-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .exem-rule-num {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
    }

    .exem-conds {
      display: flex;
      flex-direction: column;
    }

    .cond-notif {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-left: 3px solid var(--border-2);
      border-bottom: 1px solid var(--border);
      transition: background .2s;
    }

    .cond-notif:last-child {
      border-bottom: none;
    }

    .cond-notif.ok {
      border-left-color: var(--good);
      background: var(--good-s);
    }

    .cond-notif.no {
      border-left-color: var(--bad);
      background: var(--bad-s);
    }

    .cond-notif.pend {
      border-left-color: var(--border-2);
    }

    .cond-notif-icon {
      font-size: 13px;
      flex-shrink: 0;
      line-height: 1.4;
    }

    .cond-notif.ok .cond-notif-icon {
      color: var(--good);
    }

    .cond-notif.no .cond-notif-icon {
      color: var(--bad);
    }

    .cond-notif.pend .cond-notif-icon {
      color: var(--muted);
    }

    .cond-notif-body {
      flex: 1;
      min-width: 0;
    }

    .cond-notif-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .cond-notif-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .exem-legend {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.8;
      padding: 8px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
    }

    .or-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: .18em;
      color: var(--accent);
      background: var(--accent-s);
      border: 1px solid rgba(226, 232, 240, .14);
      border-radius: 999px;
      padding: 3px 10px;
      align-self: center;
    }

    /* ─── COLLAPSIBLE ─── */
    .coll .c-head {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      font: 600 12px/1 var(--font);
      color: var(--ink);
      text-align: left;
    }

    .c-sum {
      margin-left: 4px;
      font-size: 11.5px;
      color: var(--muted);
      font-weight: 400;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .c-chev {
      margin-left: auto;
      color: var(--muted);
      transition: transform .2s ease;
      flex-shrink: 0;
      font-size: 11px
    }

    .coll.open .c-chev {
      transform: rotate(180deg)
    }

    .coll.open .c-sum {
      display: none
    }

    .c-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .22s ease
    }

    .c-body>.c-in {
      overflow: hidden;
      min-height: 0
    }

    .coll.open .c-body {
      grid-template-rows: 1fr
    }

    .c-in {
      padding-top: 15px
    }

    /* ─── CALC BLOCK ─── */
    .calc-blk {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 13px;
      margin-bottom: 10px;
      transition: border-color .2s, background .2s;
    }

    .calc-blk.done {
      border-color: var(--good-b);
      background: var(--good-s);
    }

    .calc-blk.partial {
      border-color: var(--warn-b);
      background: var(--warn-s);
    }

    .calc-q {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 9px
    }

    .calc-res {
      margin-top: 9px
    }

    .exim-need-rule {
      margin-bottom: 10px;
    }

    .exim-need-rule:last-child {
      margin-bottom: 0;
    }

    .exim-need-hdr {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .exim-need-item {
      font-size: 12px;
      padding: 3px 0;
      display: flex;
      gap: 6px;
    }

    .exim-need-item.ok {
      color: var(--good);
    }

    .exim-need-item.no {
      color: var(--ink-2);
    }

    .calc-big {
      font-size: 30px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.04em
    }

    .calc-big.ok {
      color: var(--good)
    }

    .calc-big.warn {
      color: var(--warn)
    }

    .calc-big.no {
      color: var(--bad)
    }

    .inline-r {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap
    }

    .inline-r input {
      width: 75px
    }

    .il {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap
    }

    /* ─── EXEMPTION RULES EDITOR ─── */
    .rule-card {
      border: 1px solid var(--border);
      border-radius: var(--r2);
      overflow: hidden;
      margin-bottom: 8px;
    }

    .rule-card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .rule-num {
      font-size: 9.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .13em;
      color: var(--muted)
    }

    .rule-logic {
      font-size: 11px;
      color: var(--muted)
    }

    .rule-card-body {
      padding: 10px 12px;
      background: var(--surface-2)
    }

    .cond-item {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 5px 6px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .cond-item:last-child {
      border-bottom: none
    }

    /* fila 1 col 1 */
    .cond-item>.cond-fields {
      grid-column: 1;
      grid-row: 1;
      align-self: center;
    }

    /* fila 2 col 1 */
    .cond-item>.cond-status {
      grid-column: 1;
      grid-row: 2;
    }

    /* fila 1 col 2 — botón × */
    .cond-item>.btn {
      grid-column: 2;
      grid-row: 1;
      align-self: center;
    }

    .cond-fields {
      display: flex;
      gap: 5px;
      align-items: center;
      min-width: 0;
    }

    .cond-fields select {
      width: auto;
      flex-shrink: 0
    }

    .cond-fields input {
      width: 70px;
      flex-shrink: 0
    }

    .cond-fields .sub {
      min-width: 145px;
      flex-shrink: 0;
    }

    .cond-fields .op {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      padding: 0 2px;
    }

    .cond-status {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0
    }

    .or-sep-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 4px 0
    }

    /* ─── CAT PANEL ─── */
    .cat-panel {
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 11px;
      margin: 0 0 13px;
      background: var(--surface-2)
    }

    .cat-panel-t {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 9px
    }

    .cat-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px
    }

    .cat-row .cn {
      flex: 1;
      font-weight: 600;
      font-size: 13px
    }

    .cat-row .num-inp {
      width: 76px
    }

    .cat-row .cc {
      font-size: 11.5px;
      color: var(--muted);
      width: 54px;
      text-align: right
    }

    .relcell {
      display: flex;
      align-items: center;
      gap: 5px
    }

    .autow {
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 12.5px;
      display: block;
      text-align: center;
      white-space: nowrap
    }

    .rel-inp {
      width: 44px
    }

    /* ─── CUSTOM DIALOG ─── */
    .cat-dialog-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fdIn .15s ease;
    }

    @keyframes fdIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .cat-dialog-box {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      padding: 22px;
      width: 100%;
      max-width: 340px;
      animation: slideUp .18s cubic-bezier(.4, 0, .2, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(10px);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    .cat-dialog-ttl {
      font: 700 15px/1 var(--font);
      letter-spacing: -.02em;
      margin-bottom: 14px;
    }

    .cat-dialog-input-wrap {
      margin-bottom: 16px;
    }

    .cat-dialog-input-wrap label {
      display: block;
      font-size: 11.5px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600
    }

    .cat-dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-primary {
      background: transparent;
      border-color: transparent;
      color: var(--ink-2);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      transform: translateY(-1px) scale(1.015);
      box-shadow: 0 0 14px rgba(226, 232, 240, .14);
    }

    .btn-primary:active {
      transform: scale(.99);
      box-shadow: none;
    }

    .btn-danger-fill {
      background: transparent;
      border-color: transparent;
      color: var(--ink-2);
      font-weight: 600;
    }

    .btn-danger-fill:hover {
      background: var(--bad);
      border-color: var(--bad);
      color: #fff;
      transform: translateY(-1px) scale(1.015);
    }

    .btn-danger-fill:active {
      transform: scale(.99);
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center
    }

    .empty-mark {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      margin: 0 auto 20px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      display: grid;
      place-items: center;
      color: var(--accent)
    }

    .empty-state h3 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 7px
    }

    .empty-state p {
      color: var(--muted);
      max-width: 300px;
      margin: 0 auto 22px;
      line-height: 1.6;
      font-size: 13.5px
    }

    /* ─── MISC ─── */
    .hidden {
      display: none !important
    }

    .muted {
      color: var(--muted)
    }

    .small {
      font-size: 12px
    }

    .modehint {
      font-size: 12px;
      color: var(--muted);
      margin: -8px 0 13px
    }

    .sec-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin: 14px 0 8px;
      display: block
    }

    .fml {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 5px
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0
    }

    footer {
      text-align: center;
      padding: 14px 20px 32px;
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.6
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 860px) {
      .content-grid {
        grid-template-columns: 1fr
      }

      .main {
        padding: 16px 14px 60px
      }

      .nf-scenarios {
        grid-template-columns: 1fr
      }
    }

    @media (max-width: 520px) {
      .course-name-input {
        font-size: 20px
      }

      .btn-label {
        display: none
      }

      .gh-grade {
        font-size: 42px
      }
    }
  </style>
</head>

<body>
  <div style="display:flex;flex-direction:column;min-height:100vh">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="brand">

    <!-- TABS -->
    <div class="tabs-bar" id="tabsBar"></div>

    <!-- MAIN -->
    <main class="main" id="mainPanel"></main>

    <!-- CUSTOM CATEGORY DIALOG -->

      aria-labelledby="catDialogTtl">

        <div class="cat-dialog-input-wrap">

        </div>
        <div class="cat-dialog-footer">

    <input type="color" id="colorPickerInput">

    <!-- GENERIC MODAL -->
    <div id="modalOverlay" class="cat-dialog-overlay hidden" role="dialog" aria-modal="true"
      aria-labelledby="modalTitle">
      <div class="cat-dialog-box">
        <div class="cat-dialog-ttl" id="modalTitle"></div>
        <div id="modalMsg" style="font-size:13.5px;color:var(--ink-2);line-height:1.55;margin-bottom:20px;"></div>
        <div class="cat-dialog-footer">
          <button class="btn btn-ghost btn-sm" id="modalCancel">Cancelar</button>
          <button class="btn btn-sm btn-primary" id="modalConfirm">Aceptar</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module">
    /* ── Firebase (CDN modular, versión fija) ── */
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth, signInWithPopup, GoogleAuthProvider,
      onAuthStateChanged, signOut
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    /* ── Firebase config (pública por diseño; seguridad = reglas Firestore) ── */
    const firebaseConfig = {
      apiKey: "AIzaSyB_BJZ2ehL_bye-6Z4hM_4ArgV5yWusB2Q",
      authDomain: "gradiant-6da72.firebaseapp.com",
      projectId: "gradiant-6da72",
      storageBucket: "gradiant-6da72.firebasestorage.app",
      messagingSenderId: "866991632250",
      appId: "1:866991632250:web:d08646b634583d115db0c3",
    };

    /* Si Firebase falla, la app sigue funcionando en modo local sin errores */
    let fbAuth = null, fbDb = null;
    try {
      const fbApp = initializeApp(firebaseConfig);
      fbAuth = getAuth(fbApp);
      fbDb = getFirestore(fbApp);
    } catch (e) {
      console.warn('[Gradiant] Firebase no disponible, modo local activo.', e);
    }

    /* ── Variables de sincronización ── */
    let currentUser = null;   // usuario autenticado actual
    let _unsubSnapshot = null;   // cancelar listener onSnapshot al cerrar sesión
    let _syncDebounce = null;   // timer para escritura diferida a Firestore
    let _lastWrittenAt = 0;      // timestamp del último doc que escribimos (para ignorar el eco)

    /* ── Iconos SVG ── */
    function ic(name, sz) {
      sz = sz || 15;
      const d = {
        moon: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
        sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>',
        list: '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
        sliders: '<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>',
        shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/>',
        target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
        barchart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
        plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
        x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
        cap: '<path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>',
        check: '<polyline points="20 6 9 17 4 12"/>',
        grip: '<polyline points="8 9 12 5 16 9" stroke-width="2" fill="none"/><polyline points="8 15 12 19 16 15" stroke-width="2" fill="none"/>',
      };
      return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;display:inline-block;vertical-align:middle">${d[name] || ''}</svg>`;
    }

    function statusDot(state) {
      if (state === 'ok') return `<span class="status-dot ok">${ic('check', 11)}</span>`;
      if (state === 'no') return `<span class="status-dot no">${ic('x', 11)}</span>`;
      return `<span class="status-dot pend">·</span>`;
    }

    /* ── Grade Hero ── */
    function gradeHero(k, pass) {
      const grade = k.avgGraded;
      const gc = gClass(grade, pass);
      // Bar: % of course weight already evaluated (gradedW/totalW)
      const pctEval = k.totalW > 0 ? Math.min(100, Math.max(0, (k.gradedW / k.totalW) * 100)) : 0;
      const coverW = (100 - pctEval).toFixed(2);
      const pend = k.pending.length;
      const rendPct = Math.round(pctEval);
      return `
  <div class="grade-hero" data-gc="${gc}">
    <div class="gh-top">
      <div class="gh-grade ${gc}">${fmt(grade)}</div>
      <div class="gh-grade-info">
        <span class="gh-label">Promedio actual</span>
        <span class="gh-sub">${fmtW(k.gradedW)}% del ramo evaluado · ${pend} pendiente${pend !== 1 ? 's' : ''}</span>
      </div>
    </div>
    <div class="gh-bar-track" title="${rendPct}% del ramo rendido">
      <div class="gh-bar-cover" style="width:${coverW}%"></div>
    </div>
    <div class="gh-bar-footer">
      <span class="gh-bar-scale">0%</span>
      <span class="gh-meta">${rendPct}% del ramo rendido</span>
      <span class="gh-bar-scale">100%</span>
    </div>
  </div>`;
    }

    /* ── Storage ── */
    const KEY = 'gradecalc_v2';
    const Store = {
      async load() {
        try { if (window.storage) { const r = await window.storage.get(KEY); return r ? JSON.parse(r.value) : null; } } catch (e) { }
        try { const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; } catch (e) { }
        return null;
      },
      async save(s) {
        const j = JSON.stringify(s);
        try { if (window.storage) { await window.storage.set(KEY, j); return; } } catch (e) { }
        try { localStorage.setItem(KEY, j); } catch (e) { }
      }
    };
    let saveTimer = null;
    function persist() {
      state.updatedAt = Date.now();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => Store.save(state), 250);
      syncToFirestore();
    }

    /* ── Estado ── */
    const DEFAULT_CATS = ['Prueba', 'Control', 'Tarea', 'Proyecto', 'Laboratorio', 'Otro'];
    let state = { courses: [], active: null, categories: [...DEFAULT_CATS], ui: { config: false, exem: false }, theme: 'light' };

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    const COURSE_PALETTE = [
      '#6366f1', /* índigo   */
      '#3b82f6', /* azul     */
      '#06b6d4', /* cyan     */
      '#10b981', /* esmeralda*/
      '#f59e0b', /* ámbar    */
      '#ef4444', /* rojo     */
      '#ec4899', /* rosa     */
      '#8b5cf6', /* violeta  */
      '#f97316', /* naranja  */
      '#14b8a6', /* teal     */
      '#84cc16', /* lima     */
      '#e879f9', /* fucsia   */
      '#0ea5e9', /* sky      */
      '#a3e635', /* verde lima*/
      '#fb7185', /* rosa claro*/
      '#a78bfa', /* lavanda  */
    ];
    function nextColor() {
      const used = state.courses.length;
      return COURSE_PALETTE[used % COURSE_PALETTE.length];
    }

    function newCourse(name, color) {
      return {
        id: uid(), name: name || 'Nuevo ramo', pass: 4.0,
        hasExam: true, npWeight: 60, examWeight: 40, examGrade: null,
        weightMode: 'eval', catWeights: {}, decimals: 1,
        color: color || nextColor(),
        evals: [], exemption: { enabled: true, rules: [{ conds: [] }] }
      };
    }
    function demoCourse() {
      const c = newCourse('Estadística');
      c.evals = [
        { id: uid(), name: 'Prueba 1', cat: 'Prueba', weight: 25, grade: '5.5' },
        { id: uid(), name: 'Prueba 2', cat: 'Prueba', weight: 25, grade: '' },
        { id: uid(), name: 'Prueba 3', cat: 'Prueba', weight: 25, grade: '' },
        { id: uid(), name: 'Controles', cat: 'Control', weight: 10, grade: '6.2' },
        { id: uid(), name: 'Proyecto', cat: 'Proyecto', weight: 15, grade: '' },
      ];
      c.exemption = {
        enabled: true, rules: [
          { conds: [{ type: 'catAvg', cat: 'Prueba', op: '>=', val: '4.5' }] },
          { conds: [{ type: 'minAll', op: '>=', val: '4.0' }] },
        ]
      };
      return c;
    }
    function ensureFields(c, i) {
      if (!c.weightMode) c.weightMode = 'eval';
      if (!c.catWeights) c.catWeights = {};
      if (c.decimals == null) c.decimals = 1;
      if (!c.pass) c.pass = 4.0;
      if (!c.exemption) c.exemption = { enabled: false, rules: [{ conds: [] }] };
      if (c.examGrade === undefined) c.examGrade = null;
      if (c.hasExam === undefined) c.hasExam = true;
      if (!c.color) c.color = COURSE_PALETTE[(i || 0) % COURSE_PALETTE.length];
    }
    function ensureUI() { if (!state.ui) state.ui = { config: false, exem: false }; }

    /* ── Utils ── */
    let DEC = 1;
    const rN = (x, d) => Math.round((x + 1e-9) * Math.pow(10, d)) / Math.pow(10, d);
    const r1 = x => Math.round((x + 1e-9) * 10) / 10;
    const r2 = x => Math.round((x + 1e-9) * 100) / 100;
    const num = v => { const n = parseFloat(v); return isFinite(n) ? n : null; };
    function fmt(x) { return x == null ? '—' : rN(x, DEC).toFixed(DEC); }
    function fmtD(x, d) { return x == null ? '—' : rN(x, d).toFixed(d); }
    function fmtW(x) { const r = r1(x); return Math.round(r) === r ? r.toFixed(0) : r.toFixed(1); }
    function passOf(c) { return num(c.pass) ?? 4.0; }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m])); }
    function escA(s) { return esc(s).replace(/'/g, '&#39;'); }
    function mergedCats(c) { const s = [...state.categories]; c.evals.forEach(e => { if (e.cat && !s.includes(e.cat)) s.push(e.cat); }); return s; }
    function usedCats(c) { const s = []; c.evals.forEach(e => { if (e.cat && !s.includes(e.cat)) s.push(e.cat); }); return s; }
    function catOpts(sel, c) { return mergedCats(c).map(x => `<option ${x === sel ? 'selected' : ''}>${esc(x)}</option>`).join('') + `<option value="__add__">+ Nueva categoría…</option>`; }

    /* ── Pesos ── */
    function effWeights(c) {
      const map = {};
      if (c.weightMode === 'category') {
        const byCat = {};
        c.evals.forEach(ev => { (byCat[ev.cat] = byCat[ev.cat] || []).push(ev); });
        Object.keys(byCat).forEach(cat => {
          const total = num((c.catWeights || {})[cat]) || 0, members = byCat[cat];
          let sum = 0; members.forEach(ev => { sum += (num(ev.share) || 1); });
          members.forEach(ev => { map[ev.id] = sum > 0 ? total * ((num(ev.share) || 1) / sum) : 0; });
        });
      } else { c.evals.forEach(ev => { map[ev.id] = num(ev.weight) || 0; }); }
      return map;
    }

    /* ── Cálculos ── */
    function calc(c) {
      const ew = effWeights(c);
      let totalW = 0, gradedW = 0, gradedSum = 0;
      const graded = [], pending = [];
      c.evals.forEach(ev => {
        const w = ew[ev.id] || 0; totalW += w;
        const g = num(ev.grade);
        if (g != null) { gradedW += w; gradedSum += (w / 100) * g; graded.push({ ev, w, g }); }
        else if (w > 0) { pending.push({ ev, w }); }
      });
      const avgGraded = gradedW > 0 ? gradedSum / (gradedW / 100) : null;
      const allGraded = pending.length === 0 && c.evals.length > 0;
      const npEst = c.evals.length === 0 ? null : (allGraded ? gradedSum : avgGraded);
      return { ew, totalW, gradedW, pendingW: totalW - gradedW, gradedSum, avgGraded, allGraded, npEst, graded, pending };
    }
    function catAverage(c, cat, ew) {
      let w = 0, s = 0, anyPending = false, count = 0;
      c.evals.forEach(ev => {
        if (ev.cat !== cat) return; count++;
        const g = num(ev.grade), wt = (ew ? ew[ev.id] : num(ev.weight)) || 0;
        if (g == null) anyPending = true; else { w += wt; s += wt * g; }
      });
      if (count === 0) return { avg: null, empty: true, anyPending };
      return { avg: w > 0 ? s / w : null, empty: false, anyPending };
    }
    function evalCond(c, cd, k) {
      const val = num(cd.val);
      if (val == null) return { state: 'pend', text: 'Sin configurar', label: 'Condición incompleta', sub: 'Ingresa un valor mínimo requerido' };
      const r = n => Math.round(n * 10) / 10;
      if (cd.type === 'np') {
        const np = k.npEst;
        if (np == null) return { state: 'pend', text: 'NP: sin notas', label: 'Nota de Presentación (NP)', sub: 'Sin evaluaciones ingresadas aún' };
        const ok = r(np) >= r(val);
        const st = k.allGraded ? (ok ? 'ok' : 'no') : 'pend';
        return {
          state: st, text: `NP: ${fmt(np)} ≥ ${fmt(val)}`, label: 'Nota de Presentación (NP)',
          sub: `Actual: ${fmt(np)} — Requiere: ≥ ${fmt(val)}${!k.allGraded ? ' — faltan evaluaciones' : ''}`
        };
      }
      if (cd.type === 'minAll') {
        if (k.graded.length === 0) return { state: 'pend', text: 'Mínima: sin notas', label: 'Mínima en todas las evaluaciones', sub: 'Sin notas ingresadas aún' };
        const min = Math.min(...k.graded.map(x => x.g)), ok = r(min) >= r(val);
        const pend = k.pending.length > 0;
        return {
          state: pend ? (ok ? 'pend' : 'no') : (ok ? 'ok' : 'no'),
          text: `Mínima: ${fmt(min)} ≥ ${fmt(val)}`, label: 'Mínima en todas las evaluaciones',
          sub: `Nota más baja: ${fmt(min)} — Requiere: ≥ ${fmt(val)}${pend ? ' — faltan evaluaciones' : ''}`
        };
      }
      if (cd.type === 'catAvg') {
        const ca = catAverage(c, cd.cat, k.ew);
        if (ca.empty) return { state: 'pend', text: `Prom. ${cd.cat}: sin eval.`, label: `Promedio de ${cd.cat}`, sub: 'Sin evaluaciones de esta categoría' };
        if (ca.avg == null) return { state: 'pend', text: `Prom. ${cd.cat}: sin notas`, label: `Promedio de ${cd.cat}`, sub: 'Sin notas ingresadas en esta categoría' };
        const ok = r(ca.avg) >= r(val);
        return {
          state: ca.anyPending ? (ok ? 'pend' : 'no') : (ok ? 'ok' : 'no'),
          text: `Prom. ${cd.cat}: ${fmt(ca.avg)} ≥ ${fmt(val)}`, label: `Promedio de ${cd.cat}`,
          sub: `Promedio actual: ${fmt(ca.avg)} — Requiere: ≥ ${fmt(val)}${ca.anyPending ? ' — faltan evaluaciones' : ''}`
        };
      }
      if (cd.type === 'eval') {
        const ev = c.evals.find(e => e.id === cd.evalId);
        if (!ev) return { state: 'pend', text: 'Evaluación no encontrada', label: 'Evaluación específica', sub: 'La evaluación ya no existe' };
        const g = num(ev.grade);
        if (g == null) return { state: 'pend', text: `${ev.name}: sin nota`, label: ev.name, sub: 'Sin nota ingresada' };
        return {
          state: r(g) >= r(val) ? 'ok' : 'no', text: `${ev.name}: ${fmt(g)} ≥ ${fmt(val)}`, label: ev.name,
          sub: `Nota obtenida: ${fmt(g)} — Requiere: ≥ ${fmt(val)}`
        };
      }
      return { state: 'pend', text: '—', label: '—', sub: '' };
    }
    function exemStatus(c, k) {
      if (!c.exemption.enabled || c.exemption.rules.every(r => r.conds.length === 0)) return { overall: 'off', groups: [] };
      let anyOk = false, anyPend = false;
      const groups = c.exemption.rules.map(rule => {
        if (rule.conds.length === 0) return { state: 'empty', conds: [] };
        const cs = rule.conds.map(cd => ({ cd, res: evalCond(c, cd, k) }));
        let g = 'ok';
        if (cs.some(x => x.res.state === 'no')) g = 'no';
        else if (cs.some(x => x.res.state === 'pend')) g = 'pend';
        if (g === 'ok') anyOk = true; if (g === 'pend') anyPend = true;
        return { state: g, conds: cs };
      });
      return { overall: anyOk ? 'ok' : (anyPend ? 'pend' : 'no'), groups };
    }

    /* ── Tema ── */
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.colorScheme = t;
      const btn = document.getElementById('btnTheme');
      if (btn) btn.innerHTML = t === 'dark' ? ic('sun', 15) : ic('moon', 15);
    }

    /* ── Helpers ── */
    function activeCourse() { return state.courses.find(c => c.id === state.active); }
    function gClass(g, pass) {
      if (g == null) return 'nd';
      const r = n => Math.round(n * 10) / 10;
      if (r(g) === r(pass)) return 'warn';
      return r(g) > r(pass) ? 'ok' : 'no';
    }
    function colorizeGrade(input, pass) {
      const v = num(input.value);
      input.classList.remove('g-ok', 'g-warn', 'g-no', 'g-inv');
      if (!input.value.trim()) return;
      if (v == null) { input.classList.add('g-inv'); return; }
      const cl = gClass(v, pass);
      input.classList.add(cl === 'ok' ? 'g-ok' : cl === 'warn' ? 'g-warn' : 'g-no');
    }
    function wSumChip(c) {
      const sum = c.evals.reduce((a, e) => a + (num(e.weight) || 0), 0);
      return Math.abs(r1(sum) - 100) < 0.05
        ? `<span class="chip ok">✓ ${fmtW(sum)}%</span>`
        : `<span class="chip warn">⚠ ${fmtW(sum)}% · debe ser 100</span>`;
    }
    function cwSumChip(c) {
      const sum = usedCats(c).reduce((a, cat) => a + (num(c.catWeights[cat]) || 0), 0);
      return Math.abs(r1(sum) - 100) < 0.05
        ? `<span class="chip ok">✓ ${fmtW(sum)}%</span>`
        : `<span class="chip warn">⚠ ${fmtW(sum)}% · debe ser 100</span>`;
    }
    function condChip(res) {
      return res.state === 'ok' ? `<span class="chip ok">${ic('check', 10)} cumple</span>`
        : res.state === 'no' ? '<span class="chip no">no cumple</span>'
          : '<span class="chip neu">pendiente</span>';
    }

    /* ── Custom dialog para categorías ── */
    let catDialogCb = null;
    function showCatDialog(cb) {
      catDialogCb = cb;
      const inp = document.getElementById('catDialogInput');
      inp.value = '';
      document.getElementById('catDialogOverlay').classList.remove('hidden');
      setTimeout(() => inp.focus(), 50);
    }
    function closeCatDialog(name) {
      document.getElementById('catDialogOverlay').classList.add('hidden');
      if (catDialogCb) { catDialogCb(name); catDialogCb = null; }
    }
    function initCatDialog() {
      document.getElementById('catDialogConfirm').onclick = () => {
        const n = document.getElementById('catDialogInput').value.trim();
        if (!n) { document.getElementById('catDialogInput').focus(); return; }
        if (!state.categories.includes(n)) state.categories.push(n);
        closeCatDialog(n);
      };
      document.getElementById('catDialogCancel').onclick = () => closeCatDialog(null);
      document.getElementById('catDialogInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('catDialogConfirm').click();
        if (e.key === 'Escape') closeCatDialog(null);
      });
      document.getElementById('catDialogOverlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeCatDialog(null);
      });
    }

    /* ── Tabs ── */
    function renderTabs() {
      const bar = document.getElementById('tabsBar');
      bar.innerHTML = '';
      state.courses.forEach(c => {
        const k = calc(c), pass = passOf(c);
        const g = k.npEst, gc = gClass(g, pass);
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (c.id === state.active ? ' active' : '');
        btn.style.setProperty('--tc', c.color || '#6366f1');
        btn.innerHTML = `<span class="tab-dot"></span><span>${esc(c.name || 'Ramo')}</span><span class="tab-grade ${g != null ? gc : ''}">${g != null ? fmtD(g, +c.decimals || 1) : '·'}</span><span class="tab-x" title="Eliminar">${ic('x', 11)}</span>`;
        btn.onclick = e => { if (!e.target.closest('.tab-x') && !e.target.closest('.tab-dot')) { state.active = c.id; persist(); render(); } };
        btn.querySelector('.tab-x').onclick = e => { e.stopPropagation(); deleteCourse(c.id); };
        btn.querySelector('.tab-dot').onclick = e => {
          e.stopPropagation();
          const picker = document.getElementById('colorPickerInput');
          picker.value = c.color || '#6366f1';
          picker.oninput = ev => {
            c.color = ev.target.value;
            btn.style.setProperty('--tc', c.color);
            btn.querySelector('.tab-dot').style.background = c.color;
          };
          picker.onchange = () => { persist(); };
          picker.click();
        };
        bar.appendChild(btn);
      });
      const add = document.createElement('button');
      add.className = 'tab-add';
      add.innerHTML = `${ic('plus', 11)} Ramo`;
      add.onclick = () => { const c = newCourse(); state.courses.push(c); state.active = c.id; persist(); render(); };
      bar.appendChild(add);
    }

    /* ── Evaluaciones ── */
    function evalsCard(c) {
      const ew = effWeights(c), isCat = c.weightMode === 'category';
      const rows = c.evals.map((ev, i) => `
    <tr data-i="${i}" draggable="true">
      <td class="ev-grip">${ic('grip', 14)}</td>
      <td class="ev-name"><input data-f="name" value="${escA(ev.name)}" placeholder="Nombre"></td>
      <td><select data-f="cat" style="width:auto;min-width:84px">${catOpts(ev.cat, c)}</select></td>
      <td>${isCat
          ? `<span class="autow" data-evid="${ev.id}">${fmtW(ew[ev.id] || 0)}%</span>`
          : `<input class="num-inp" data-f="weight" inputmode="decimal" value="${ev.weight ?? ''}" placeholder="%">`}</td>
      <td class="ev-nota"><input class="num-inp" data-f="grade" inputmode="decimal" value="${ev.grade ?? ''}" placeholder="—"></td>
      <td><button class="btn btn-sm btn-ghost btn-danger" data-del="${i}">${ic('x', 12)}</button></td>
    </tr>`).join('');
      const foot = isCat ? '' : `&nbsp;&nbsp;${wSumChip(c)}`;
      return `
  <div class="block">
    <div class="block-title"><span class="block-title-icon">${ic('list', 12)}</span> Evaluaciones</div>
    <div class="seg">
      <button class="seg-btn ${isCat ? '' : 'on'}" data-mode="eval">Por evaluación</button>
      <button class="seg-btn ${isCat ? 'on' : ''}" data-mode="category">Por grupo</button>
    </div>
    <p class="modehint">${isCat
          ? 'Asigna un % a cada grupo; se reparte automáticamente entre sus evaluaciones.'
          : 'Cada evaluación lleva su propio porcentaje.'}</p>
    ${isCat ? catPanel(c) : ''}
    <table>
      <thead><tr><th></th><th>Evaluación</th><th>Categoría</th><th>Ponderación %</th><th class="ev-nota">Nota</th><th></th></tr></thead>
      <tbody id="evBody">${rows || `<tr><td colspan="6" class="muted small" style="padding:12px 0">Sin evaluaciones. Agrega la primera.</td></tr>`}</tbody>
      <tfoot><tr><td colspan="6"><div style="display:flex;align-items:center;gap:8px"><button class="btn btn-sm" id="addEv">${ic('plus', 12)} Agregar evaluación</button>${foot}<span class="ev-empty-hint">nota vacía → aún no rendida</span></div></td></tr></tfoot>
    </table>
  </div>`;
    }
    function catPanel(c) {
      const cats = usedCats(c);
      const rows = cats.map(cat => {
        const count = c.evals.filter(e => e.cat === cat).length;
        return `<div class="cat-row">
      <span class="cn">${esc(cat)}</span>
      <input class="num-inp" data-cw="${escA(cat)}" inputmode="decimal" value="${c.catWeights[cat] ?? ''}" placeholder="%">
      <span class="cc">${count} eval.</span>
    </div>`;
      }).join('') || '<p class="small muted">Agrega evaluaciones para asignar pesos por categoría.</p>';
      return `<div class="cat-panel">
    <div class="cat-panel-t">Ponderación de cada grupo (debe sumar 100%)</div>
    ${rows}<div id="catSum">${cwSumChip(c)}</div>
  </div>`;
    }

    /* ── Configuración ── */
    function cfgSum(c) {
      const pass = passOf(c).toFixed(1);
      if (!c.hasExam) return `Aprob. ${pass} · Sin examen`;
      const np = r1(num(c.npWeight) || 0), ex = r1(num(c.examWeight) || 0);
      return `Aprob. ${pass} · NP ${np}% / Ex ${ex}%`;
    }
    function settingsCard(c) {
      const open = !!(state.ui && state.ui.config);
      const hasExam = c.hasExam !== false;
      const fmlText = hasExam
        ? `NF = ${((num(c.npWeight) || 0) / 100).toFixed(2)}·NP + ${((num(c.examWeight) || 0) / 100).toFixed(2)}·E`
        : 'NF = NP (sin examen)';
      return `
  <div class="block coll ${open ? 'open' : ''}">
    <button class="c-head" data-toggle="config">
      <span class="c-icon">${ic('sliders', 12)}</span><span>Configuración del ramo</span>
      <span class="c-sum">${esc(cfgSum(c))}</span>
      <span class="c-chev">▾</span>
    </button>
    <div class="c-body"><div class="c-in">
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;font-size:13px;color:var(--ink-2);user-select:none">
        <input type="checkbox" id="sHasExam" class="cb-circle" ${hasExam ? 'checked' : ''}>
        Este ramo tiene examen final
      </label>
      <div id="examWeightFields" style="${!hasExam ? 'display:none' : ''}">
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
          <div style="flex:1;display:flex;flex-direction:column;gap:5px"><label class="small muted">Aprob.</label><input id="sPass" class="num-inp" style="width:100%" inputmode="decimal" value="${c.pass}"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:5px"><label class="small muted">Peso NP (%)</label><input id="sNp" class="num-inp" style="width:100%" inputmode="decimal" value="${c.npWeight}"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:5px"><label class="small muted">Peso Examen (%)</label><input id="sEx" class="num-inp" style="width:100%" inputmode="decimal" value="${c.examWeight}"></div>
        </div>
        <p class="fml" id="fmlNF">${fmlText}</p>

      <div id="noExamFields" style="${hasExam ? 'display:none' : ''}">
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
          <div style="flex:1;display:flex;flex-direction:column;gap:5px"><label class="small muted">Aprob.</label><input id="sPass" class="num-inp" style="width:100%" inputmode="decimal" value="${c.pass}"></div>
        </div>
        <p class="fml">NF = NP (la nota final es tu promedio de evaluaciones)</p>
