    function _bindMobileConfigSheet(c) {
      const hasExamEl = document.getElementById('ms-hasExam');
      hasExamEl?.addEventListener('change', () => {
        c.hasExam = hasExamEl.checked;
        const sec = document.getElementById('ms-examSection');
        if (sec) sec.style.display = c.hasExam ? '' : 'none';
        persist(); refreshResults(c);
      });
      const inputs = { 'ms-np': 'npWeight', 'ms-ex': 'examWeight', 'ms-pass': 'pass' };
      Object.entries(inputs).forEach(([id, key]) => {
        document.getElementById(id)?.addEventListener('input', e => {
          c[key] = e.target.value; persist(); refreshResults(c);
        });
      });
      document.getElementById('ms-dec')?.addEventListener('change', e => {
        c.decimals = +e.target.value; DEC = c.decimals; persist(); render();
        /* reabrir sheet tras re-render */
        requestAnimationFrame(() => openMobileConfigSheet(activeCourse() || c));
      });
    }

    /* ── Mobile sheet de Eximición (Etapa C) ── */
    function openMobileExemSheet(c) {
      const content = document.getElementById('bsContent');
      if (!content) return;
      _renderMobileExemContent(c, content);
      document.getElementById('mnavSheetOverlay').classList.add('open');
    }

    function _renderMobileExemContent(c, container) {
      const on = c.exemption.enabled;
      const k = calc(c);
      const rulesHtml = on ? c.exemption.rules.map((rule, gi) => {
        const condsHtml = rule.conds.map((cd, ci) => {
          const types = [['np', 'NP estimado'], ['minAll', 'Todas las notas'], ['catAvg', 'Prom. categoría'], ['eval', 'Una evaluación']];
          const typeSel = `<select class="msh-select" style="flex:1;height:34px;font-size:13px" data-mef="type" data-g="${gi}" data-c="${ci}">${types.map(t => `<option value="${t[0]}" ${cd.type === t[0] ? 'selected' : ''}>${t[1]}</option>`).join('')}</select>`;
          const res = evalCond(c, cd, k);
          const chip = res.state === 'ok' ? '<span class="chip ok" style="font-size:10px">✓</span>' : res.state === 'no' ? '<span class="chip no" style="font-size:10px">✗</span>' : '<span class="chip neu" style="font-size:10px">?</span>';
          return `<div class="msh-cond-row">
            ${typeSel}
            <span style="color:var(--ink-2);font-size:13px">≥</span>
            <input class="msh-inp" style="width:56px;flex-shrink:0" inputmode="decimal" data-mef="val" data-g="${gi}" data-c="${ci}" value="${escA(cd.val ?? '')}">
            ${chip}
            <button class="btn btn-sm btn-ghost btn-danger" data-mdelcond="${gi}.${ci}" style="padding:4px">${ic('x', 11)}</button>
          </div>`;
        }).join('');
        const ruleState = exemStatus(c, k).groups?.[gi];
        const ruleChip = ruleState && ruleState.state !== 'empty'
          ? `<span class="chip ${ruleState.state}" style="font-size:10px;margin-left:auto">${ruleState.state === 'ok' ? 'se cumple' : ruleState.state === 'no' ? 'no se cumple' : 'pendiente'}</span>` : '';
        return `<div class="msh-rule-card" data-g="${gi}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="font-size:12px;font-weight:700;color:var(--ink-2)">Regla ${gi + 1}</span>
            ${ruleChip}
            ${c.exemption.rules.length > 1 ? `<button class="btn btn-sm btn-ghost btn-danger" data-mdelrule="${gi}" style="margin-left:auto;padding:3px 6px">${ic('x', 11)}</button>` : ''}
          </div>
          ${condsHtml || '<p class="small muted" style="margin-bottom:8px">Sin condiciones.</p>'}
          <button class="btn btn-sm" data-maddcond="${gi}" style="margin-top:6px;font-size:12px">${ic('plus', 11)} Condición</button>
        </div>`;
      }).concat(c.exemption.rules.length > 1 ? [] : []).join('<div class="or-badge">O</div>') : '';

      container.innerHTML = `
        <div class="bs-header">
          <span class="bs-brand">Eximición</span>
        </div>
        <div class="msh-section">
          <div class="msh-row">
            <label for="me-on">Activar reglas de eximición</label>
            <input type="checkbox" id="me-on" class="cb-circle" ${on ? 'checked' : ''}>
          </div>
        </div>
        ${on ? `<div class="msh-section" id="me-rules">${rulesHtml}<button class="btn btn-sm" id="me-addRule" style="margin-top:4px">${ic('plus', 12)} Regla alternativa</button></div>` : '<div class="msh-section"><p class="small muted">Desactivada: siempre se rinde examen.</p></div>'}`;
      _bindMobileExemSheet(c, container);
    }

    function _bindMobileExemSheet(c, container) {
      const onEl = document.getElementById('me-on');
      onEl?.addEventListener('change', () => {
        c.exemption.enabled = onEl.checked;
        if (onEl.checked && !c.exemption.rules.length) c.exemption.rules = [{ conds: [] }];
        persist(); refreshResults(c);
        _renderMobileExemContent(c, container);
      });
      document.getElementById('me-addRule')?.addEventListener('click', () => {
        c.exemption.rules.push({ conds: [] }); persist();
        _renderMobileExemContent(c, container);
      });
      container.querySelectorAll('[data-mdelrule]').forEach(b => b.addEventListener('click', () => {
        c.exemption.rules.splice(+b.dataset.mdelrule, 1);
        if (!c.exemption.rules.length) c.exemption.rules = [{ conds: [] }];
        persist(); refreshResults(c);
        _renderMobileExemContent(c, container);
      }));
      container.querySelectorAll('[data-maddcond]').forEach(b => b.addEventListener('click', () => {
        const gi = +b.dataset.maddcond;
        c.exemption.rules[gi].conds.push({ type: 'np', op: '>=', val: '', cat: (usedCats(c)[0] || state.categories[0] || 'Prueba'), evalId: (c.evals[0]?.id || '') });
        persist(); _renderMobileExemContent(c, container);
      }));
      container.querySelectorAll('[data-mdelcond]').forEach(b => b.addEventListener('click', () => {
        const [gi, ci] = b.dataset.mdelcond.split('.').map(Number);
        c.exemption.rules[gi].conds.splice(ci, 1);
        persist(); refreshResults(c);
        _renderMobileExemContent(c, container);
      }));
      container.querySelectorAll('[data-mef]').forEach(el => {
        const gi = +el.dataset.g, ci = +el.dataset.c, f = el.dataset.mef;
        el.addEventListener(el.tagName === 'SELECT' ? 'change' : 'input', () => {
          c.exemption.rules[gi].conds[ci][f] = el.value;
          persist(); refreshResults(c);
          if (el.tagName === 'SELECT') _renderMobileExemContent(c, container);
        });
      });
    }

    function _themeLabel() { return state.theme === 'dark' ? 'Oscuro ☾' : 'Claro ☀︎'; }

        const k = calc(c), grade = k.np != null ? k.np.toFixed(+c.decimals || 1) : '—';
        const active = c.id === state.active;
        return `<button class="bs-course-item${active ? ' bs-active' : ''}" data-cid="${escA(c.id)}">
          <span class="bs-course-dot" style="background:${escA(c.color || '#6366f1')}"></span>
          <span class="bs-course-name">${esc(c.name || 'Ramo')}</span>
          <span class="bs-course-grade">${grade}</span>
          ${active ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : ''}

          <span class="bs-brand">Ramos</span>

          Agregar ramo
        </button>`;
    }

    function _bindRamosSheet() {
      /* clonar sync status */
      const src = document.getElementById('syncStatus');
      const dst = document.getElementById('bsSyncClone');
      if (src && dst) { dst.innerHTML = src.innerHTML; dst.className = src.className; }
      /* seleccionar ramo */
      document.querySelectorAll('.bs-course-item').forEach(btn => {
        btn.addEventListener('click', () => {
          state.active = btn.dataset.cid;
          persist(); render();
          mnavCloseSheet();
          mnavSetActive('ramos');
        });
      });
      /* agregar ramo */
      document.getElementById('bsAddCourse')?.addEventListener('click', () => {
        const c = newCourse();
        state.courses.push(c); state.active = c.id;
        persist(); render();
        mnavCloseSheet();
        mnavSetActive('ramos');
      });
    }

          <div style="padding:8px 20px 16px">
            <button class="gbtn" id="bsSignIn" style="width:100%;justify-content:center">
              <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid" viewBox="0 0 256 262" class="gbtn-svg"><path fill="#4285F4" d="M255.878 133.451c0-10.734-.871-18.567-2.756-26.69H130.55v48.448h71.947c-1.45 12.04-9.283 30.172-26.69 42.356l-.244 1.622 38.755 30.023 2.685.268c24.659-22.774 38.875-56.282 38.875-96.027" class="g-blue"/><path fill="#34A853" d="M130.55 261.1c35.248 0 64.839-11.605 86.453-31.622l-41.196-31.913c-11.024 7.688-25.82 13.055-45.257 13.055-34.523 0-63.824-22.773-74.269-54.25l-1.531.13-40.298 31.187-.527 1.465C35.393 231.798 79.49 261.1 130.55 261.1" class="g-green"/><path fill="#FBBC05" d="M56.281 156.37c-2.756-8.123-4.351-16.827-4.351-25.82 0-8.994 1.595-17.697 4.206-25.82l-.073-1.73L15.26 71.312l-1.335.635C5.077 89.644 0 109.517 0 130.55s5.077 40.905 13.925 58.602l42.356-32.782" class="g-yellow"/><path fill="#EB4335" d="M130.55 50.479c24.514 0 41.05 10.589 50.479 19.438l36.844-35.974C195.245 12.91 165.798 0 130.55 0 79.49 0 35.393 29.301 13.925 71.947l42.211 32.783c10.59-31.477 39.891-54.251 74.414-54.251" class="g-red"/></svg>
              <span class="gbtn-text">Sign in with Google</span>
            </button>
          </div>`;
      }
    }

    function _bindPerfilSheet() {
      document.getElementById('bsSignOut')?.addEventListener('click', () => {
        mnavCloseSheet();
        signOut(fbAuth).catch(e => console.error('[Gradiant] signOut error', e));
      });
      document.getElementById('bsSignIn')?.addEventListener('click', () =>
        signInWithPopup(fbAuth, new GoogleAuthProvider()).catch(e => console.error('[Gradiant] signIn error', e)));
    }

    function initMobileNav() {
      const nav = document.getElementById('mobileNav');
      const overlay = document.getElementById('mnavSheetOverlay');
      if (!nav) return;
      document.body.dataset.mnav = 'ramos';
      const _pt = document.getElementById('mPageTitle');
      if (_pt) _pt.textContent = '';
      /* Cerrar sheet al tocar el fondo */
      overlay?.addEventListener('click', e => { if (e.target === overlay) mnavCloseSheet(); });
      nav.addEventListener('click', e => {
        const btn = e.target.closest('.mnav-btn');
        if (!btn) return;
        const section = btn.dataset.section;
        const current = document.body.dataset.mnav;
        if (section === 'resumen') {
          mnavCloseSheet();
          mnavSetActive('resumen');
        } else if (section === 'ramos') {
          if (current === 'ramos') {
            /* Ya en ramos → abrir popup de selección */
            openRamosPopup();
          } else {
            /* Venía de otra sección → solo cambiar vista, sin abrir sheet */
            mnavCloseSheet();
            mnavSetActive('ramos');
          }
        } else if (section === 'perfil') {
          /* Perfil siempre abre su sheet */
          mnavOpenSheet('perfil');
        }
      });
    }

    /* ── Teclado: forzar punto como separador decimal ──
       Intercepta la coma antes de que aparezca en el input y la convierte en punto.
       Funciona en iOS y Android independientemente del idioma del sistema. */
    document.addEventListener('beforeinput', e => {
      if (e.data !== ',') return;
      const t = e.target;
      if (!t.matches('[inputmode="decimal"]')) return;
      e.preventDefault();
      const s = t.selectionStart, en = t.selectionEnd;
      t.value = t.value.slice(0, s) + '.' + t.value.slice(en);
      t.setSelectionRange(s + 1, s + 1);
      t.dispatchEvent(new Event('input', { bubbles: true }));
    });

    /* Seguridad extra: si una coma llega igual (ej. pegado), reemplazarla */
    document.addEventListener('input', e => {
      const t = e.target;
      if (!t.matches('[inputmode="decimal"]') || !t.value.includes(',')) return;
      const pos = t.selectionStart;
      t.value = t.value.replace(/,/g, '.');
      try { t.setSelectionRange(pos, pos); } catch (_) { }
    }, true);

    /* ── Init ── */
    initCatDialog();
    initModal();
    initMobileNav();
    (async function () {
      const loaded = await Store.load();
      if (loaded && Array.isArray(loaded.courses) && loaded.courses.length) {
        state = loaded;
        if (!state.categories) state.categories = [...DEFAULT_CATS];
        ensureUI(); state.courses.forEach(ensureFields);
        if (!state.active && state.courses[0]) state.active = state.courses[0].id;
      } else {
        /* updatedAt=0 para que la nube siempre gane en un dispositivo nuevo */
        state = { courses: [], active: null, categories: [...DEFAULT_CATS], ui: { config: false, exem: false }, theme: 'light', updatedAt: 0 };
        Store.save(state);
      }
      applyTheme(state.theme || 'light');
      render();
      updateSyncStatus('local');
    })();

    /* Arrancar listener de auth (después del render inicial para no bloquear la UI) */
    if (fbAuth) {
      onAuthStateChanged(fbAuth, onUserLogin);
    } else {
      renderAuthArea(null);
    }

    /* Registrar service worker para PWA */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(e =>
        console.warn('[Gradiant] SW no registrado:', e)
      );
    }
  </script>
